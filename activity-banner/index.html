<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="utf-8">
<title>NZIHL — Activity Banner</title>
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<style>
@font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable.woff2') format('woff2');}
@font-face{font-family:'Inter';font-style:italic;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable-Italic.woff2') format('woff2');}
  /* ============================================================
     NZIHL / NZWIHL — per-team ACTIVITY BANNER (no scorebug)
     A transparent, otherwise-EMPTY 1920x1080 source for the YoloBox.
       • No Singular score bug — this layer is deliberately clean so it can
         sit OVER whatever scorebug each club already runs.
       • The only thing that ever appears is the live goal / penalty banner,
         driven by the league box score (same parser as the Red Devils
         scorebug + Game Summary).
     Static per-team URL:  activity-banner/?team=<slug>
       e.g. ?team=canterbury-red-devils, ?team=botany-swarm, ?team=auckland-steel …
     ============================================================ */
  :root{
    --ink:#E5242B;    /* current event team accent (set per-event) */
    --dark:#5A0E12;   /* current event team shade  (set per-event) */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:transparent;overflow:hidden;
    font-family:Inter,-apple-system,"Segoe UI",sans-serif;
    font-feature-settings:"tnum" 1,"cv05" 1;-webkit-font-smoothing:antialiased;}

  /* full broadcast frame; YoloBox captures this 1:1 (fit-scaled only for desktop preview).
     Nothing is painted here until a banner fires — the page is an empty transparent 1920x1080. */
  #stage{position:absolute;left:0;top:0;width:1920px;height:1080px;
    transform-origin:0 0;overflow:hidden;}

  /* --- live banner (full width, BOTTOM of frame) ---
     Moved from top:0 to bottom:0 (Mat, 2026-07-06): every Activity Banner is being re-cut so the
     transparent 1920x1080 source drops straight into the bottom-third/lower-third slot with no
     resize or reposition in the switcher — every pixel of the banner sits flush against the
     bottom edge of the frame, matching how it'll actually be composited on air. */
  /* banner height matches the scorebug bar (~66px) + a hair */
  /* Flat solid fill = the team's official Half-Dark "Scorebug BG" colour (--dark in REG); no
     fade/gradient, so white text sits on a uniform high-contrast bed across the whole bar. */
  #bnr{position:absolute;left:0;bottom:0;width:1920px;height:78px;z-index:5;
    display:flex;align-items:center;
    background:var(--dark);
    box-shadow:0 -8px 24px rgba(0,0,0,.42);
    clip-path:inset(0 100% 0 0);opacity:0;display:none;
    will-change:clip-path,opacity;}
  #bnr.show{display:flex;clip-path:inset(0 0 0 0);opacity:1;
    transition:clip-path .25s cubic-bezier(.4,0,.2,1),opacity .16s ease;}
  #bnr.hide{display:flex;clip-path:inset(0 0 0 100%);opacity:1;
    transition:clip-path .25s cubic-bezier(.4,0,.2,1);}
  .bend{flex:0 0 150px;height:78px;display:flex;align-items:center;justify-content:center;}
  .bend img{max-width:74px;max-height:60px;object-fit:contain;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));}

  /* --- goal-scorer avatar (added 2026-07-01, aligned-to-name 2026-07-01) ---
     100px circle — deliberately taller than the 78px bar, vertically centered on the bar's
     MIDDLE via top:50%/translateY(-50%) so it overhangs top+bottom evenly by design (Mat's call:
     "centre at the vertical centre... even though there will be overhang"). Now that the bar sits
     at bottom:0 (2026-07-06), the CLIPPED side flipped: bottom overhang gets clipped by the
     #stage frame's bottom edge, top overhang bleeds visibly into the transparent frame above.
     It tracks a specific word rather than sitting in a fixed slot: a zero-width inline spacer (.gsp)
     is baked into goalHTML() immediately before the <span class="team"> (Mat: left of the TEAM NAME,
     not the scorer's name — moved here 2026-07-01 after first trying left-of-name), and once the
     photo confirms it loads, JS widens that spacer (reserving a gap right before the team name in the
     centered sentence), re-fits the text, then measures the spacer's rendered position and moves this
     absolutely-positioned circle to sit exactly there — so it reads "[PHOTO] TEAM GOAL scored by
     SURNAME" no matter how the surrounding text re-centers. GOALS only — never penalties. No initials fallback
     here (unlike Game Summary): a missing/unmatched photo just shows nothing (spacer stays 0-width),
     added only on a confirmed Image() onload so a broken-image icon can never flash on screen. */
  .gav{position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:100px;height:100px;border-radius:50%;overflow:hidden;
    background:#1b2029;box-shadow:0 4px 16px rgba(0,0,0,.55),0 0 0 3px rgba(255,255,255,.14);
    display:none;}
  .gav.show{display:block;}
  .gav img{width:100%;height:100%;object-fit:cover;object-position:50% 16%;}
  /* invisible layout-only spacer — width is set by JS once a photo is confirmed, reserving the
     avatar's footprint right next to the name inside the centered, nowrap sentence. */
  .gsp{display:inline-block;width:0;height:1px;vertical-align:middle;}
  /* line-height 1.25 keeps descenders (p, g, y) inside the line box so overflow:hidden can't clip them */
  .btxt{flex:1 1 auto;min-width:0;text-align:center;white-space:nowrap;overflow:hidden;
    color:#fff;font-weight:800;line-height:1.25;letter-spacing:.005em;padding:0 16px;
    text-shadow:0 2px 8px rgba(0,0,0,.45);}
  .btxt .team{font-weight:900;letter-spacing:.01em;}
  .btxt .kw{font-weight:900;color:#fff;}
  .btxt .lc{font-weight:600;opacity:.9;text-transform:none;}
  .btxt .who{font-weight:900;}
  .btxt .ast{font-weight:600;opacity:.92;}
  .btxt .dur{font-weight:900;font-variant-numeric:tabular-nums;}
  .btxt .sep{opacity:.55;font-weight:700;padding:0 .15em;}

  /* --- PRE-GAME CONFIDENCE ALERT (added 2026-07-08) ---
     Purpose: a one-shot, self-checking banner so a producer who has just added this source
     to their switcher/preview can confirm (a) they loaded the CORRECT banner/team, (b) it
     sits in the CORRECT location in their layout, and (c) it will fire once the game starts.
     Reuses the exact same geometry as #bnr (bottom:0, full width, 78px) so "correct location"
     is literally true — same bar, same crest slots — but is a SEPARATE element so its one-shot
     7s lifecycle never interacts with the goal/penalty queue. Solid #000000 fill (not a team
     colour) since it's neutral pre-game info, not a scoring event.
     HARD RULE: must NEVER appear once the game has started — no exceptions. Enforced by a
     kickoff-time check both before AND after the (async) crest images load, so a slow image
     load can never let it slip past kickoff. It fires once per page load, then never again. */
  #pre{position:absolute;left:0;bottom:0;width:1920px;height:78px;z-index:6;
    display:flex;align-items:center;
    background:#000000;
    box-shadow:0 -8px 24px rgba(0,0,0,.42);
    clip-path:inset(0 100% 0 0);opacity:0;display:none;
    will-change:clip-path,opacity;}
  #pre.show{display:flex;clip-path:inset(0 0 0 0);opacity:1;
    transition:clip-path .25s cubic-bezier(.4,0,.2,1),opacity .16s ease;}
  #pre.hide{display:flex;clip-path:inset(0 0 0 100%);opacity:1;
    transition:clip-path .25s cubic-bezier(.4,0,.2,1);}
  .ptxt{flex:1 1 auto;min-width:0;text-align:center;color:#fff;padding:0 16px;}
  .pline1{font-weight:900;letter-spacing:.01em;line-height:1.2;
    white-space:nowrap;overflow:hidden;text-shadow:0 2px 8px rgba(0,0,0,.45);}
  .pline2{font-weight:600;opacity:.85;line-height:1.2;margin-top:2px;
    white-space:nowrap;overflow:hidden;text-shadow:0 2px 8px rgba(0,0,0,.4);}

  /* --- PLAYER LOWER THIRDS (added 2026-07-12, iterated same day) ---
     A centered, bottom-anchored traditional broadcast lower third — deliberately
     distinct from the full-width #bnr goal/penalty strip. Fired via the phone
     control page (hockey/lowerthirds/) through the Cloudflare Durable Object
     control channel, or rendered statically from a ?preview= URL param by that
     same page's live miniature preview iframe — both paths call the SAME
     showL3()/buildL3Data() functions below (see the JS section), so preview
     and broadcast can never drift.
     Geometry: 1360x245 (noFact 180), centered horizontally, flush against the
     SAME bottom edge as #bnr (bottom:0). Collision RULE (not just geometry):
     an auto goal/penalty banner always interrupts/kills a live or
     about-to-fire L3 — see enqueue()/pollControl() — so the two sharing a
     baseline never actually collide on screen. */
  :root{ --l3ink:#9aa3ad; --l3dark:#181c22; }
  /* FOURTH PASS (Mat, 2026-07-12): back to a full-bleed rectangular portrait
     (no circle) -- the team-ink accent bar that used to sit as a thin 5px
     divider between the photo and the body is now EXTENDED into a full
     border frame wrapping the rectangle instead (so there's no separate
     .l3accent element anymore, the photo's own border IS the accent).
     Also scaled the whole card up (was 1000x180/135) so the photo/text
     fill more of the box top-to-bottom -- less empty vertical space, not
     just a bigger box. */
  #l3{position:absolute;left:50%;bottom:0;transform:translateX(-50%) translateY(16px);
    width:1320px;height:245px;border-radius:14px;overflow:hidden;
    display:none;align-items:stretch;background:var(--l3dark);box-shadow:0 16px 48px rgba(0,0,0,.55);
    opacity:0;z-index:4;
    transition:opacity .32s cubic-bezier(.4,0,.2,1),transform .32s cubic-bezier(.4,0,.2,1);}
  #l3.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0);}
  #l3.noFact{height:180px;}
  /* Photo: SQUARE (Mat, 2026-07-12 -- was a full-bleed portrait rectangle,
     which looked too elongated/stretched; "compress" it into a square by
     matching width to whichever height the card currently has). align-self
     :stretch still tracks the card's live height (245 full / 180 noFact);
     aspect-ratio:1/1 then derives the width from that same height instead
     of a separate fixed flex-basis, so it's always a true square in both
     states, no extra JS needed. Border still IS the frame (no separate
     .l3accent bar); box-sizing:border-box keeps the 6px border inside the
     square rather than adding to it. */
  #l3 .l3photo{flex:0 0 auto;align-self:stretch;aspect-ratio:1/1;overflow:hidden;position:relative;
    box-sizing:border-box;background:#1b2029;border:6px solid var(--l3ink);}
  #l3 .l3photo img{width:100%;height:100%;object-fit:cover;object-position:50% 18%;display:block;}
  /* No-photo fallback is a SECOND choice, not the default: prefer the team
     crest (so a missing headshot still balances the crest already on the right
     side) and only fall back to initials if the team has no registered logo
     at all (DEFV). */
  #l3 .l3photologo{position:absolute;inset:0;display:none;align-items:center;justify-content:center;}
  #l3 .l3photologo img{max-width:70%;max-height:70%;object-fit:contain;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));}
  #l3 .l3initials{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:56px;color:#4a525f;letter-spacing:.02em;}
  #l3 .l3body{flex:1 1 auto;min-width:0;padding:20px 51px;display:flex;flex-direction:column;
    justify-content:center;gap:10px;color:#fff;font-family:Inter,sans-serif;}
  /* Line 1: jersey # + position + name, matching scoringleaders/index.html's
     .pline/.jnum pattern exactly -- jersey number smaller+bold+team-ink
     coloured, position same size as the name but also ink-coloured, name
     itself white. Built as one innerHTML string in showL3() (l3name). */
  /* Base size here now drives jnum/pos only -- the actual name text is
     wrapped in its own .nametext span sized 1.25em relative to this base
     (Mat, 2026-07-12: "make the name only ~25% bigger" than position/jersey,
     not equal to them as it was). .pos also gets a little breathing room
     before the name now (was a single plain space). */
  #l3 .l3name{font-weight:800;font-size:38px;line-height:1.15;letter-spacing:.005em;
    text-align:center;white-space:nowrap;overflow:hidden;text-shadow:0 2px 10px rgba(0,0,0,.4);}
  #l3 .l3name .jnum{font-size:.72em;font-weight:800;color:var(--l3ink);}
  #l3 .l3name .pos{color:var(--l3ink);margin-right:.22em;}
  #l3 .l3name .nametext{font-size:1.25em;}
  /* Line 2: stat row, same weight/size family as line 1 (Scoring Leaders keeps
     its line1/line2 at the same base size -- only the unit labels shrink). */
  #l3 .l3stat{font-weight:800;font-size:38px;color:#fff;
    text-align:center;white-space:nowrap;overflow:hidden;}
  #l3 .l3stat .unit{font-weight:400;font-size:.56em;opacity:.65;}
  #l3 .l3tonight{display:none;margin-top:1px;padding:4px 12px;border-radius:7px;
    background:rgba(255,255,255,.16);font-weight:800;font-size:16px;letter-spacing:.02em;
    align-self:flex-start;}
  #l3 .l3tonight.show{display:inline-block;}
  /* Line 3: fact, matching scoringleaders/index.html's .pline.descr treatment
     (italic, bold, light grey) rather than plain/regular-weight text. */
  #l3 .l3fact{display:none;font-weight:700;font-style:italic;font-size:24px;line-height:1.25;
    color:#c9cdd6;max-height:2.6em;overflow:hidden;
    text-align:center;text-wrap:balance;}   /* centred + balanced across its wrapped lines (Mat, 2026-07-12) */
  #l3.noFact .l3fact{display:none;}
  #l3:not(.noFact) .l3fact.has{display:block;}
  #l3 .l3logowrap{flex:0 0 auto;align-self:stretch;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.04);border-left:1px solid rgba(255,255,255,.09);}
  #l3 .l3logowrap img{max-width:60%;max-height:60%;object-fit:contain;display:none;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));}
  #l3 .l3logowrap img.show{display:block;}

  /* --- test controls (only with ?test=1) --- */
  /* pinned to the TOP now (was bottom:22px) so the dev panel doesn't sit on top of the
     banner, which now lives at the bottom of the frame (2026-07-06). */
  #test{position:absolute;left:24px;top:22px;right:24px;z-index:9;display:none;gap:8px;
    flex-wrap:wrap;align-items:center;font-family:Inter,sans-serif;}
  #test button{font:600 15px Inter,sans-serif;color:#fff;background:#15181d;
    border:1px solid #333a44;border-radius:9px;padding:10px 16px;cursor:pointer;}
  #test button:hover{background:#1d2128;border-color:#4a5562;}
  #teamBtns{display:flex;flex-wrap:wrap;gap:5px 9px;align-items:center;}
  #test .tg{display:inline-flex;align-items:center;gap:3px;}
  #test .tg .ab{color:#aeb6c0;font:700 12px Inter,sans-serif;letter-spacing:.05em;margin-right:2px;}
  #test button.tb{font:700 13px Inter,sans-serif;padding:7px 10px;min-width:30px;letter-spacing:.03em;}
  #test button.tb.gb{border-color:#2f6b46;} #test button.tb.gb:hover{background:#16271d;border-color:#3f8f5e;}
  #test button.tb.pb{border-color:#7a5a1e;} #test button.tb.pb:hover{background:#241d10;border-color:#a87d2a;}
  #test button.tb .k{font-weight:600;opacity:.55;margin-left:5px;font-size:11px;}
  #test button#tAll{background:#1c2630;border-color:#395066;}
  #test .lbl{color:#7e8794;font:600 13px Inter,sans-serif;align-self:center;
    background:#0d0f13;border:1px solid #222;border-radius:8px;padding:8px 12px;}
  #diag{position:absolute;right:18px;bottom:16px;z-index:9;color:#5d646e;
    font:500 12px Inter,sans-serif;display:none;}
</style>
</head>
<body>
<div id="stage">
  <div id="bnr">
    <div class="bend" id="bendL"><img id="blogoL" alt=""></div>
    <div class="btxt" id="btxt"></div>
    <div class="bend" id="bendR"><img id="blogoR" alt=""></div>
    <div class="gav" id="gav"><img id="gavImg" alt=""></div>
  </div>

  <div id="pre">
    <div class="bend"><img id="preLogoL" alt=""></div>
    <div class="ptxt" id="ptxt">
      <div class="pline1" id="preLine1"></div>
      <div class="pline2" id="preLine2"></div>
    </div>
    <div class="bend"><img id="preLogoR" alt=""></div>
  </div>

  <div id="l3">
    <div class="l3photo" id="l3photo">
      <img id="l3img" alt="">
      <div class="l3photologo" id="l3photologo" style="display:none"><img id="l3photologoImg" alt=""></div>
      <div class="l3initials" id="l3initials" style="display:none"></div>
    </div>
    <div class="l3body">
      <div class="l3name" id="l3name"></div>
      <div class="l3stat" id="l3stat"></div>
      <div class="l3tonight" id="l3tonight"></div>
      <div class="l3fact" id="l3fact"></div>
    </div>
    <div class="l3logowrap"><img id="l3logo" alt=""></div>
  </div>

  <div id="test">
    <span class="lbl">TEST · GOAL / PEN · EACH TEAM</span>
    <span id="teamBtns"></span>
    <button id="tAll">▶ Play all</button>
  </div>
  <div id="diag"></div>
</div>

<script>
/* ====================== CONFIG ====================== */
// CORS proxy (your Cloudflare worker.js). Paste the deployed URL here, OR pass ?worker=...
// Until set, the test buttons still work; live box-score polling needs the proxy.
let WORKER = "https://blue-butterfly-aa69.matchavez.workers.dev";   // Cloudflare CORS proxy (worker.js)

const HOLD_GOAL = 12500;   // goal banner visible (ms)
const HOLD_PEN  = 9000;    // penalty banner visible (ms)
const POLL_MS   = 12000;   // box-score poll cadence (<15s SLA)
const RUN_CAP   = 3.25*3600*1000;   // auto-stop polling after 3h15m

const LOGO="https://matchavez.com/nzihl-broadcast-assets/assets/logos/";
// esportsdesk player-headshot source — shared media folder, same convention as Game Summary's
// SHOT/shotURL. Photos are NOT a fixed size (roughly 600x750-600x900, varies per upload), so the
// avatar circle crops with object-fit:cover / object-position 50% 16% (biased toward the face).
const SHOT="https://admin.esportsdesk.com/media/leagues/6795/graphics/";
const shotURL=n=>SHOT+encodeURIComponent(String(n||"").replace(/\s+/g,""))+".jpg";
// NO-CACHE source — admin.esportsdesk.com is the un-cached origin behind nzihl.com / nzwihl.com,
// so live goals/penalties appear with no CDN delay. clientid/leagueid select the league.
const SCRAPE_HOST = "https://admin.esportsdesk.com";
const MANIFESTS=[
  {league:"nzihl",  url:"https://raw.githubusercontent.com/matchavez/nzihl-broadcast-rosters/main/boxscores.json",  clientid:7131, leagueid:35499},
  {league:"nzwihl", url:"https://raw.githubusercontent.com/matchavez/nzwihl-broadcast-rosters/main/boxscores.json", clientid:7132, leagueid:35501},
];
// team visuals keyed by nzihl teamID (ink = accent, dark = shade, logo = file in /assets/logos/)
const REG={
 // dark = official Half-Dark "Scorebug BG" per 2026 style guide (also used as the flat banner fill)
 "674110":{code:"ADM", ink:"#F7BE11", dark:"#081D48", logo:"Pure-NZ-Admirals-2000x2000.png"},
 "675633":{code:"CRD", ink:"#E5242B", dark:"#550000", logo:"Red Devils 2000x2000r.png"},
 "675634":{code:"DUN", ink:"#1E9E63", dark:"#012C1E", logo:"Dunedin_Thunder.png"},
 "675635":{code:"SCS", ink:"#FAC805", dark:"#162543", logo:"Skycity Stampede 2000x2000.png"},
 "674109":{code:"BSW", ink:"#F7AF28", dark:"#441620", logo:"Botany Swarm 2000x2000.png"},
 "675636":{code:"AST", ink:"#9FB6C8", dark:"#18263E", logo:"Auckland-Steel-White.png"},
 "675637":{code:"CIN", ink:"#E0564E", dark:"#550000", logo:"Inferno-White.png"},
 "675638":{code:"DTW", ink:"#1E9E63", dark:"#012C1E", logo:"thunder-women-white.png"},
 "675639":{code:"WLD", ink:"#FAC805", dark:"#162543", logo:"Wakatipu-wild-white.png"},
};
const DEFV={ink:"#9aa3ad", dark:"#262a31", logo:""};
const vis=id=>REG[id]||DEFV;

/* ====================== URL OVERRIDES ====================== */
const Q=new URLSearchParams(location.search);
if(Q.get("worker")) WORKER=Q.get("worker");
const TESTMODE = Q.get("test")==="1";
// Lets activity-banner/ be layered as a SECOND browser source purely for
// Player L3 firing, on top of a production (like scorebug/) that already
// has its own scoreboard + goal/penalty banner + pregame alert -- without
// this, both sources would independently detect the same box-score events
// and show two overlapping banners. Doesn't touch L3 firing/polling at all,
// just the goal/penalty banner + pregame alert this file would otherwise
// also render (Mat, 2026-07-12 -- Canterbury Inferno layering scorebug/ +
// activity-banner/ together: use activity-banner/?team=...&nobanner=1).
const NOBANNER = Q.get("nobanner")==="1";

/* ====================== NAME / TEXT HELPERS ====================== */
const decamel=s=>String(s||"").replace(/([a-z\.])([A-Z])/g,"$1 $2").replace(/([^\s(])\(/g,"$1 (").replace(/\)([^\s)])/g,") $1");
// esportsdesk source data sometimes arrives ALL CAPS or all lower-case. Detect wholesale
// one-case text (not stylised mixed case like "McDonald" or "O'Brien", which is left
// untouched) and normalise to Title Case, capitalising after spaces/hyphens/apostrophes/
// periods so compound surnames like "Ruski-Jones" keep BOTH halves capitalised (ported
// from summary.html's properCase() — was the bug behind "Ruski-Jones" -> "Ruski-jones").
function properCase(s){s=String(s||"");if(!s)return s;
  const letters=s.replace(/[^a-zA-Z]/g,"");if(!letters)return s;
  const allUpper=letters===letters.toUpperCase()&&letters!==letters.toLowerCase();
  const allLower=letters===letters.toLowerCase()&&letters!==letters.toUpperCase();
  if(!allUpper&&!allLower)return s;
  return s.toLowerCase().replace(/(^|[\s\-'.(])([a-z])/g,(m,p1,p2)=>p1+p2.toUpperCase());}
// last-name-only: de-camelCase first, then take the final token (handles
// "First Last", camelCase "FirstLast", and Maori multi-given-name "Te Rangi Henare" -> "Henare")
// first-initial + surname (siblings on a roster can share a surname — the initial
// disambiguates, e.g. two Ruski-Jones players). Applied to every shortened name.
// Per-player surname corrections the generic decamel/initSurname logic can't get
// right on its own -- e.g. genuine two-word surnames it would otherwise treat as
// "given name + surname" and truncate/initial away. Keyed by the raw scraped text
// (case-insensitive, decamel'd). Mirrors the roster pipeline's overrides.py.
// 2026-07-11: de Jonge (Pure NZ Admirals #26) added after Michael reported the
// Activity Banner showing "Jonge" instead of "de Jonge" mid-broadcast.
// SINGLE SOURCE OF TRUTH (2026-07-13): fetched from nzihl-broadcast-assets'
// name-overrides.json by loadNameOverrides() (awaited at the top of start()).
// These two hardcoded values are only the FALLBACK used if that fetch fails
// or times out -- an on-air graphic must never lose a name correction to a
// network hiccup. See NAME_OVERRIDES_URL below.
let SURNAME_OVERRIDES={"de jonge":"De Jonge","hayward jones":"Hayward Jones"};
let PAREN_STRIPS=[{re:/Shattock\s*\(\s*Niskakoski\s*\)/gi,to:"Shattock"}];
const NAME_OVERRIDES_URL="https://raw.githubusercontent.com/matchavez/nzihl-broadcast-assets/main/assets/name-overrides.json";
async function loadNameOverrides(){
  try{
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),2500);
    const r=await fetch(NAME_OVERRIDES_URL,{cache:"no-store",signal:ctrl.signal});
    clearTimeout(t);
    const cfg=await r.json();
    if(cfg&&cfg.surname_text_overrides) SURNAME_OVERRIDES=cfg.surname_text_overrides;
    if(cfg&&Array.isArray(cfg.parenthetical_strips)){
      PAREN_STRIPS=cfg.parenthetical_strips.map(p=>({re:new RegExp(p.find,p.flags||"gi"),to:p.replace}));
    }
  }catch(e){ /* keep the hardcoded fallback above -- never break an on-air graphic over this */ }
}
function stripParens(s){ PAREN_STRIPS.forEach(p=>{ s=s.replace(p.re,p.to); }); return s; }
const surnameOverride=n=>SURNAME_OVERRIDES[decamel(n).trim().replace(/\s+/g," ").toLowerCase()]||null;
function initSurname(n){const forced=surnameOverride(n);if(forced)return forced;const w=decamel(n).trim().split(/\s+/).filter(t=>!/^\(.*\)$/.test(t));return w.length>1?(w[0][0]+". "+w[w.length-1]):(w[0]||"");}
function surnameUC(n){return initSurname(n).toUpperCase();}
function surnameTC(n){return properCase(initSurname(n));}
function assistList(a){
  if(!a||/^unassisted$/i.test(a)) return "";
  return a.split(",").map(s=>surnameTC(s.trim())).filter(Boolean).join(", ");
}
const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

/* ====================== BOX-SCORE PARSER (from Game Summary) ====================== */
const SHIM=u=>WORKER?(WORKER.replace(/\/$/,"")+"?url="+encodeURIComponent(u)):null;
const normP=s=>{s=String(s).toUpperCase();if(s.startsWith("1"))return"1";if(s.startsWith("2"))return"2";if(s.startsWith("3"))return"3";if(/OT|OVER/.test(s))return"OT";if(/SO|SHOOT/.test(s))return"SO";return s;};
function parse(html){
  // esportsdesk wraps a player's jersey#/first-name in a responsive "d-sm-inline d-none"
  // <span> (shown only at wider breakpoints) with the surname as trailing plain text right
  // after it. Usually that's "...</span> Surname" (a real space), but at least one field
  // (assist lists) sometimes omits the space entirely: "...</span>beckstead)". When the
  // first name also happens to be stored lowercase (a known esportsdesk quirk, e.g. "cole"),
  // there's no letter-case boundary left for decamel() to split on either, so the two names
  // silently fuse into one word ("Cole" + "Beckstead" -> "colebeckstead", caught live 2026-07-06).
  // Force a space after every closing </span> up front, before anything reads .textContent —
  // harmless where a space/tag already followed (collapsed back down by the \s+ normalisation
  // every cell-text reader already does), and it fixes this at the source for every field.
  html=html.replace(/<\/span>/gi,"</span> ");
  html=stripParens(html); // 2026-07-13: single-source parenthetical strips (nzihl-broadcast-assets/assets/name-overrides.json)
  const doc=new DOMParser().parseFromString(html,"text/html");
  const txt=el=>el?el.textContent.replace(/\s+/g," ").trim():"";
  const h5=[...doc.querySelectorAll("h5")];
  const findH=re=>h5.find(h=>re.test(h.textContent));
  const tidOf=el=>{const a=el&&el.querySelector&&el.querySelector('a[href*="teamID="]');const m=a&&a.getAttribute("href").match(/teamID=(\d+)/i);return m?m[1]:null;};
  const pidOf=el=>{const a=el&&el.querySelector&&el.querySelector('a[href*="playerID="]');const m=a&&a.getAttribute("href").match(/playerID=(\d+)/i);return m?m[1]:null;};
  const btw=(a,b)=>{const r=[];let e=a&&a.nextElementSibling;while(e&&e!==b){r.push(e);e=e.nextElementSibling;}return r;};
  const tables=[...doc.querySelectorAll("table")];
  const scoreTbl=tables[0]; const srows=[...scoreTbl.querySelectorAll("tr")];
  const team=tr=>{const c=[...tr.children].map(txt);const m=c[0].match(/^(.*?)\s+([A-Z]{2,4})$/);
    return {teamID:tidOf(tr),name:(m?m[1]:c[0]).trim(),code:(m?m[2]:"").trim(),tot:+c[c.length-1]||0};};
  const away=team(srows[1]), home=team(srows[2]);
  // roster: full-name -> teamID
  const skaters=[];
  h5.filter(h=>/SKATERS/i.test(h.textContent)).forEach(h=>{
    let e=h.nextElementSibling,tbl=null;
    while(e&&!/^H5$/.test(e.tagName)){if(e.tagName==="TABLE"){tbl=e;break;}if(e.querySelector&&e.querySelector("table")){tbl=e.querySelector("table");break;}e=e.nextElementSibling;}
    if(tbl)[...tbl.querySelectorAll("tr")].slice(1).forEach(row=>{const id=tidOf(row);if(id)skaters.push({id,pid:pidOf(row),text:txt(row)});});
  });
  const teamOfName=who=>{const s=skaters.find(sk=>sk.text.includes(who));return s?s.id:null;};
  const pidOfName=who=>{const s=skaters.find(sk=>sk.text.includes(who));return s?s.pid:null;};
  function section(h5el,stopEl){
    const items=[];let per="";
    btw(h5el,stopEl).forEach(el=>{
      const t=txt(el);
      if(/^(1ST|2ND|3RD|\dTH|OVERTIME|OT\d*|SHOOTOUT)(\s+PERIOD)?(\s*\d+)?$/i.test(t)&&!(el.querySelector&&el.querySelector("table"))){per=normP(t);return;}
      const tbl=(el.querySelector&&el.querySelector("table"))||(el.tagName==="TABLE"?el:null);
      if(tbl)[...tbl.querySelectorAll("tr")].forEach(r=>{const c=[...r.children].map(txt);if(c[0]&&!/No Penalties/i.test(c[0]))items.push({per,c});});
    });
    return items;
  }
  const ssH=findH(/SCORING SUMMARY/i),psH=findH(/PENALTY SUMMARY/i),skH=findH(/SKATERS/i);
  const goals=ssH?section(ssH,psH).map(o=>{const m=o.c[0].match(/^#?(\d+)\s+(.+?)\s*\((.*)\)\s*$/);
    const who=m?m[2].trim():o.c[0];const id=teamOfName(who);
    return {p:o.per,t:o.c[o.c.length-1]||"",no:m?+m[1]:"",who,a:m?m[3].trim():"",teamID:id,pid:pidOfName(who)};}):[];
  const pens=psH?section(psH,skH).map(o=>{
    const cell=o.c[0];
    const tm=cell.match(/\(([^)]*)\)\s*$/);                      // team is ALWAYS in the trailing parens — incl. team penalties (no player/#)
    const tn=tm?tm[1].trim():"";const id=tn===away.name?away.teamID:tn===home.name?home.teamID:null;
    const pm=cell.match(/^#?(\d+)\s+(.+?)\s*\([^)]*\)\s*$/);     // player penalty = "#no name (team)"
    const who=pm?pm[2].trim():cell.replace(/\s*\([^)]*\)\s*$/,"").trim();  // else label minus (team), e.g. "Team Penalty"
    return {p:o.per,t:o.c[o.c.length-1]||"",no:pm?+pm[1]:"",who,inf:o.c[1]||"",dur:o.c[2]||"",teamID:id};}):[];
  return {away,home,goals,pens};
}

/* ====================== BANNER BUILD + ANIMATE ====================== */
const bnr=document.getElementById("bnr"), btxt=document.getElementById("btxt");
const blogoL=document.getElementById("blogoL"), blogoR=document.getElementById("blogoR");
const gav=document.getElementById("gav"), gavImg=document.getElementById("gavImg");
const pre=document.getElementById("pre"), ptxt=document.getElementById("ptxt");
const preLogoL=document.getElementById("preLogoL"), preLogoR=document.getElementById("preLogoR");
const preLine1=document.getElementById("preLine1"), preLine2=document.getElementById("preLine2");
let avatarToken=0;   // guards against a late photo load landing on the wrong (already-advanced) job
const FONTS = (document.fonts&&document.fonts.ready)?document.fonts.ready:Promise.resolve();
let fontsLoaded=false; FONTS.then(()=>{fontsLoaded=true;});

// Preload-and-gate: resolves once `src` has actually loaded (or errors, or a timeout
// elapses) so the caller can hold the banner reveal until the asset is really there —
// never resolves to a broken/blank image, and never blocks forever on a miss.
const ASSET_TIMEOUT_MS = 1500;   // Mat: "an extra second won't matter" — cap the wait
function loadImage(src, timeoutMs){
  return new Promise(res=>{
    if(!src){ res(null); return; }
    let done=false; const img=new Image();
    const finish=ok=>{ if(done) return; done=true; res(ok?img:null); };
    img.onload=()=>finish(true); img.onerror=()=>finish(false);
    img.src=src;
    setTimeout(()=>finish(false), timeoutMs||ASSET_TIMEOUT_MS);
  });
}

// Some clubs' esportsdesk photos aren't filed under the guessed <FirstLast>.jpg (e.g.
// Dunedin Thunder's whole roster uses ad hoc names like "LukeEASPORT.png"; other teams
// use shortened first names). Same fix as scoringleaders/index.html: on a guess miss,
// pull the real photo path from the scorer's public nzihl.com profile page (via the
// same Worker shim) and retry with that. Cached per playerID so repeat goals by the
// same player in one broadcast don't re-fetch the profile page.
const PHOTO_FALLBACK_CACHE = {};
async function resolvePhotoFallback(pid, teamID, cid, lid){
  if(!pid||!teamID||!cid||!lid) return null;
  if(pid in PHOTO_FALLBACK_CACHE) return PHOTO_FALLBACK_CACHE[pid];
  let result=null;
  try{
    // NZIHL and NZWIHL are separate site instances on the esportsdesk platform —
    // hitting the wrong one 302s to a generic clear.cfm page instead of the real
    // profile (caught live 2026-07-11: every NZWIHL fallback lookup was silently
    // failing this way, even though the players genuinely have photos uploaded —
    // e.g. Canterbury Inferno's Cameron Tobin/Bridie Gibbings/Gabrielle Guerin all
    // resolve fine once pointed at the right host). leagueid 35501 = NZWIHL.
    const host=String(lid)==="35501"?"www.nzwihl.com":"www.nzihl.com";
    const url=`https://${host}/leagues/rosters_profile.cfm?clientID=${cid}&leagueID=${lid}&teamID=${teamID}&playerID=${pid}&printPage=0`;
    const html=await getText(url);
    const m=html.match(/largeHeadshot[^"]*"[^>]*background-image\s*:\s*url\(([^)]+)\)/i);
    if(m){
      let path=m[1].trim().replace(/^["']|["']$/g,"");
      result=path.startsWith("http")?path:"https://admin.esportsdesk.com"+path;
    }
  }catch(e){ /* leave result null — treated as "no photo found" */ }
  PHOTO_FALLBACK_CACHE[pid]=result;
  return result;
}
// Player photo warehouse (nzihl-player-photos) — tried FIRST, before the naive
// esportsdesk guess/fallback below. Headshots don't change mid-game and the
// warehouse's Pages/CDN is faster/more reliable than esportsdesk. Uses the SAME
// getPhotoManifest()/PHOTO_BASE/TEAMID_CODE/CODE_LEAGUE the Player L3 feature
// already defines further down this file (safe to reference here — this function
// is only ever invoked async, well after the whole script has finished its
// initial top-to-bottom run, same pattern buildL3Data()/tonightChipFor() rely on).
// 2026-07-12 estate-wide photo-warehouse migration.
async function warehousePhotoFor(teamID, no){
  if(!teamID || !no) return null;
  const code = TEAMID_CODE[teamID]; if(!code) return null;
  const league = CODE_LEAGUE[code] || "nzihl";
  const manifest = await getPhotoManifest(); if(!manifest) return null;
  const teamPeople = (manifest.leagues && manifest.leagues[league] &&
                       manifest.leagues[league].teams[code] &&
                       manifest.leagues[league].teams[code].people) || {};
  const person = Object.values(teamPeople).find(p=>p.role==="player" && String(p.number)===String(no));
  return (person && person.photo) ? PHOTO_BASE+person.photo : null;
}
// Overall budget for resolving a goal-scorer photo, guess + fallback combined (widened
// from the base 1500ms asset timeout, per Mat 2026-07-11, specifically so the fallback's
// extra network round trip has a real chance to land before the banner reveals with no
// avatar). The initial <FirstLast>.jpg guess gets a short slice of that; whatever's left
// goes to the fallback lookup + its own image load. Still never blocks forever on a miss.
const PHOTO_TOTAL_TIMEOUT_MS = 2800;
const PHOTO_GUESS_TIMEOUT_MS = 900;
function resolvePlayerPhoto(who, pid, teamID, cid, lid, no){
  return new Promise(res=>{
    let done=false;
    const finish=img=>{ if(done) return; done=true; res(img); };
    const overall=setTimeout(()=>finish(null), PHOTO_TOTAL_TIMEOUT_MS);
    function liveFallbackChain(){
      loadImage(shotURL(who), PHOTO_GUESS_TIMEOUT_MS).then(img=>{
        if(done) return;
        if(img){ clearTimeout(overall); finish(img); return; }
        if(!pid){ clearTimeout(overall); finish(null); return; }
        resolvePhotoFallback(pid, teamID, cid, lid).then(url=>{
          if(done) return;
          if(!url){ clearTimeout(overall); finish(null); return; }
          loadImage(url, 1200).then(img2=>{ clearTimeout(overall); finish(img2); });
        });
      });
    }
    // Warehouse first (manifest.json, matched by team+jersey#), then the
    // naive-guess+profile-fallback chain, then null (caller shows initials).
    warehousePhotoFor(teamID, no).then(whUrl=>{
      if(done) return;
      if(!whUrl){ liveFallbackChain(); return; }
      loadImage(whUrl, 1200).then(img=>{
        if(done) return;
        if(img){ clearTimeout(overall); finish(img); return; }
        liveFallbackChain();
      });
    });
  });
}

function goalHTML(g, awayName, homeName){
  const v=vis(g.teamID);
  const team=esc(g.name|| (g.teamID===g.awayID?awayName:homeName) || "");
  const ast=assistList(g.a);
  return `<span class="gsp" id="gsp"></span><span class="team">${team.toUpperCase()}</span> <span class="kw">GOAL</span> `
       + `<span class="lc">scored by</span> <span class="who">${esc(surnameUC(g.who))}</span>`
       + (ast?` <span class="ast">(${esc(ast)})</span>`:``);
}
// box score writes durations as "2 Minutes" / "5 Minutes" -> render as #:00 per spec
function fmtDur(d){d=String(d||"").trim();
  const m=d.match(/(\d+)\s*min/i); if(m) return m[1]+":00";
  if(/^\d+:\d{2}$/.test(d)) return d;
  return d; // e.g. "Game Misconduct", "Match" — leave as written
}
function penHTML(p){
  return `<span class="lc">Penalty by</span> <span class="who">${esc(surnameUC(p.who))}</span>`
       + ` <span class="sep">-</span> <span class="dur">${esc(fmtDur(p.dur))}</span>`
       + ` <span class="lc">for</span> <span class="kw">${esc((p.inf||"").trim())}</span>`;
}

// fit text so it NEVER ellipsises: shrink font until it fits the available width
function fitBanner(){
  let fs=42; btxt.style.fontSize=fs+"px";   // sized to the shorter (78px) bar
  // measure; shrink in 1px steps to a sane floor — never clip/ellipsis
  let guard=80;
  while(btxt.scrollWidth>btxt.clientWidth && fs>20 && guard-->0){ fs-=1; btxt.style.fontSize=fs+"px"; }
}

/* ====================== PRE-GAME CONFIDENCE ALERT ======================
   Fires ONCE, on page load, for 7 seconds, showing "(logo) Away vs Home (logo)  Datetime - Venue"
   on a solid #000000 bar in the SAME bottom-bar location as the live goal/penalty banner — a
   producer previewing this source can confirm the right game is loaded, it sits in the right
   spot, and it'll fire once the game starts. HARD RULE: must never appear once the game has
   started, no exceptions — checked before firing AND again after the async crest loads resolve,
   so a slow/stalled image load can never let it slip past kickoff. */
function fitLine(el, base, min){
  let fs=base; el.style.fontSize=fs+"px";
  let guard=80;
  while(el.scrollWidth>el.clientWidth && fs>min && guard-->0){ fs-=1; el.style.fontSize=fs+"px"; }
}
function fitPregame(){ fitLine(preLine1,30,16); fitLine(preLine2,16,11); }
function fmtPregameDate(gm){
  // Parse the full offset-bearing instant (gm.datetime, e.g. "...+12:00"/"...+13:00")
  // rather than the bare date, then format explicitly in Pacific/Auckland — so the
  // displayed weekday/day/month is always NZ's, even if the machine showing this
  // page has its system clock set to a different timezone. (The kickoff cutoff in
  // showConfidenceAlert() was already timezone-safe — it compares absolute epoch
  // instants — this only fixes the human-readable date text.)
  let dpart=gm.date||"";
  try{ dpart=new Date(gm.datetime||(gm.date+"T00:00:00")).toLocaleDateString("en-NZ",
    {weekday:"short",day:"numeric",month:"short",timeZone:"Pacific/Auckland"}); }catch(e){}
  return (dpart+(gm.time?(" · "+gm.time):"")).trim();
}
function showConfidenceAlert(gm){
  if(!gm||!gm.away||!gm.home) return;
  const startMs = new Date(gm.datetime||gm.date).getTime();
  if(!startMs || Date.now()>=startMs) return;   // already started (or unknown start) — never show
  const av=visByName(gm.away), hv=visByName(gm.home);
  const aSrc = av.logo?LOGO+encodeURIComponent(av.logo):null;
  const hSrc = hv.logo?LOGO+encodeURIComponent(hv.logo):null;
  Promise.all([loadImage(aSrc), loadImage(hSrc)]).then(([aImg,hImg])=>{
    if(Date.now()>=startMs) return;   // re-check post-load: the wait must never push us past kickoff
    preLogoL.style.visibility = aImg ? "" : "hidden"; if(aImg) preLogoL.src=aImg.src;
    preLogoR.style.visibility = hImg ? "" : "hidden"; if(hImg) preLogoR.src=hImg.src;
    preLine1.textContent = `${gm.away.toUpperCase()} VS ${gm.home.toUpperCase()}`;
    preLine2.textContent = `${fmtPregameDate(gm)} - ${gm.venue||""}`;
    pre.style.display="flex"; void pre.offsetWidth;
    fitPregame();
    pre.classList.add("show");
    setTimeout(()=>{
      pre.classList.remove("show"); pre.classList.add("hide");
      setTimeout(()=>{ pre.classList.remove("hide"); pre.style.display="none"; }, 300);
    }, 7000);
  });
}

const queue=[]; let busy=false;
let l3ActiveFireId=null;   // set while an L3 fire is being rendered (even before .show lands)
function enqueue(job){
  // Auto goal/penalty banners always interrupt a live-or-about-to-show L3
  // (Player Lower Thirds) — see the PLAYER LOWER THIRDS section below.
  if(typeof l3!=="undefined" && (l3ActiveFireId || l3.classList.contains("show"))){
    if(typeof l3Token!=="undefined") l3Token++;   // abort any in-flight showL3() before it reveals
    if(typeof hideL3==="function") hideL3();
    l3ActiveFireId=null;
    if(typeof reportInterrupt==="function") reportInterrupt();
  }
  queue.push(job); pump();
}
function pump(){
  if(busy||!queue.length) return; busy=true;
  const job=queue.shift();
  const myToken=++avatarToken;
  document.documentElement.style.setProperty("--ink", job.ink);
  document.documentElement.style.setProperty("--dark", job.dark);
  btxt.innerHTML=job.html;
  // reset avatar; it (and the logos) only get switched on below once confirmed loaded —
  // never an initials fallback here, a miss just stays hidden (see .gav comment in <style>).
  gav.classList.remove("show"); gavImg.removeAttribute("src");
  blogoL.style.visibility="hidden"; blogoR.style.visibility="hidden";

  // 2026-07-04: gate the reveal itself on the logo + (for goals) scorer photo actually
  // having loaded, instead of wiping the bar in immediately and letting those assets pop
  // in late. Each load races a short timeout (ASSET_TIMEOUT_MS) so a missing/slow asset
  // delays the banner by at most that long rather than blocking it — Mat: "an extra
  // second won't matter."
  const logoFile = job.logoFile || vis(job.eventID).logo;
  const logoSrc = logoFile ? LOGO+encodeURIComponent(logoFile) : null;
  const logoP = loadImage(logoSrc);
  const photoP = job.photoWho ? resolvePlayerPhoto(job.photoWho, job.photoPid, job.eventID, CID, LID, job.photoNo) : Promise.resolve(null);
  const gsp = btxt.querySelector(".gsp");   // goalHTML() bakes this in right before the team name; absent for penalties

  bnr.classList.remove("hide");
  bnr.style.display="flex";
  void bnr.offsetWidth;                 // reflow: lock the hidden start state

  Promise.all([logoP, photoP, (fontsLoaded?Promise.resolve():FONTS)]).then(([logoImg, photoImg])=>{
    if(myToken!==avatarToken) return;   // superseded while waiting
    if(logoImg){ blogoL.src=logoImg.src; blogoR.src=logoImg.src; blogoL.style.visibility=""; blogoR.style.visibility=""; }
    if(photoImg && gsp){
      gsp.style.width="112px";          // reserve the avatar's footprint next to the name
      fitBanner();                      // re-fit text now that the gap exists
      const gspR=gsp.getBoundingClientRect(), bnrR=bnr.getBoundingClientRect();
      const scale=(bnrR.width/1920)||1; // #stage may be CSS-scaled for the desktop preview
      gav.style.left=((gspR.left-bnrR.left)/scale)+"px";
      gavImg.src=photoImg.src; gav.classList.add("show");
    } else { fitBanner(); }
    void bnr.offsetWidth;
    bnr.classList.add("show");          // wipe in (L->R), 250ms — logo + photo already in place
    setTimeout(()=>{
      bnr.classList.remove("show"); bnr.classList.add("hide");   // wipe out (L->R), 250ms
      setTimeout(()=>{ bnr.classList.remove("hide"); bnr.style.display="none";
        busy=false; pump(); }, 300);
    }, job.hold);
  });
}
function fireGoal(g, awayID, homeID, awayName, homeName){
  const v=vis(g.teamID);
  enqueue({html:goalHTML({...g,awayID,homeID,awayName,homeName}, awayName, homeName),
    ink:v.ink, dark:v.dark, eventID:g.teamID, hold:HOLD_GOAL, photoWho:g.who, photoPid:g.pid, photoNo:g.no});
}
function firePen(p, awayID, homeID){
  const v=vis(p.teamID);
  enqueue({html:penHTML(p), ink:v.ink, dark:v.dark, eventID:p.teamID, hold:HOLD_PEN});
}

/* ====================== LIVE DETECTION ====================== */
const sigGoal=g=>`G|${g.teamID}|${g.p}|${g.t}|${g.no}|${surnameUC(g.who)}`;
const sigPen =p=>`P|${p.teamID}|${p.p}|${p.t}|${p.no}|${surnameUC(p.who)}|${p.inf}`;
const seen=new Set(); let baselined=false;
let lastGoalCount=0, lastPenCount=0;   // sanity guard against a short/bad esportsdesk read (see tick())
let TARGET=null, AWAYID=null, HOMEID=null, AWAYN="", HOMEN="", CID=null, LID=null;
let PREGAME=null;   // {away,home,venue,date,time,datetime} for the resolved target game, used by the pre-game confidence alert only

async function getJSON(u){const r=await fetch(u,{cache:"no-store"});if(!r.ok)throw 0;return r.json();}
async function getText(u){const r=await fetch(SHIM(u),{cache:"no-store"});if(!r.ok)throw 0;return r.text();}
// NO-CACHE origin: admin.esportsdesk.com mirrors the league sites with no CDN delay.
function boxURL(m,gid){return `${SCRAPE_HOST}/leagues/hockey_boxscores.cfm?clientid=${m.clientid}&leagueid=${m.leagueid}&gameid=${gid}&printPage=1&_=${Date.now()}`;}
const slug=s=>String(s||"").toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
// name -> visuals, for the pre-game confidence alert (fires before any box score exists, so
// there's no teamID yet to key off REG — this maps the manifest's team-name strings instead).
const SLUG_VIS = {
 "pure-nz-admirals": REG["674110"], "canterbury-red-devils": REG["675633"],

async function resolveTarget(){
  const team=Q.get("team"), g=Q.get("g")||Q.get("gameid");
  const lp=(Q.get("l")||Q.get("league")||"").toLowerCase();
  if(g){
    const m=MANIFESTS.find(x=> Q.get("w")==="1"||lp.startsWith("nzw")||lp==="w" ? x.league==="nzwihl":x.league==="nzihl");
    // Best-effort: also pull this game's manifest record so the pre-game confidence alert
    // (away/home/venue/datetime) still works when a specific gameid is forced via ?g=.
    try{ const data=await getJSON(m.url); const gm=(data.games||[]).find(x=>String(x.gameid)===String(g));
      if(gm) PREGAME={away:gm.away,home:gm.home,venue:gm.venue,date:gm.date,time:gm.time,datetime:gm.datetime}; }catch(e){}
    return {m,gid:g};
  }
  // Reuse the ROSTER selector: same boxscores.json (current round) the portal's rosters +
  // box-score links are built from. Pick THIS team's live/next game. Static per-team URL:
  //   activity-banner/?team=canterbury-red-devils  (or dunedin-thunder, botany-swarm, pure-nz-admirals,
  //   skycity-stampede, auckland-steel, canterbury-inferno, dunedin-thunder-women, wakatipu-wild …)
  const slugTeam = slug(team || "canterbury-red-devils");   // default: Red Devils
  // Fallback gameids for games the pipeline hasn't filled yet (manifest gameid=null); self-clears when gm.gameid arrives.
  const KNOWN_GIDS = { "Botany Swarm|Pure NZ Admirals|2026-06-28": 2519938 };
  const cands=[];
  for(const m of MANIFESTS){let data;try{data=await getJSON(m.url);}catch(e){continue;}
    (data.games||[]).forEach(gm=>{
      const gid = gm.gameid || KNOWN_GIDS[[gm.away,gm.home,gm.date].join("|")] || null;
      if(!gid) return;
      if(slug(gm.away)!==slugTeam && slug(gm.home)!==slugTeam) return;
      cands.push({m, gid, dt:new Date(gm.datetime||gm.date).getTime()||0, gm}); });}
  if(!cands.length) return null;
  const now=Date.now(), LIVE=5*3600*1000;                    // a game up to 5h old still counts as "current"
  const live=cands.filter(c=>c.dt>=now-LIVE).sort((a,b)=>a.dt-b.dt);  // soonest live/upcoming first
  const pick=live[0] || cands.sort((a,b)=>b.dt-a.dt)[0];      // else the most recent
  PREGAME = {away:pick.gm.away, home:pick.gm.home, venue:pick.gm.venue, date:pick.gm.date, time:pick.gm.time, datetime:pick.gm.datetime};
  return {m:pick.m, gid:pick.gid};
}

let firstGoal=null, firstPen=null;     // captured for the test buttons
async function tick(){
  if(!TARGET||!WORKER) return;
  CID=TARGET.m.clientid; LID=TARGET.m.leagueid;
  let P; try{ P=parse(await getText(boxURL(TARGET.m,TARGET.gid))); }catch(e){ return; }
  // esportsdesk occasionally returns 200 OK with a short/incomplete page (documented
  // flakiness -- see nzihl-roster-scraper-robustness / nzihl-player-photo-warehouse memory).
  // A genuine box score's goal/penalty counts can only grow during a game. If this poll comes
  // back with FEWER than the last accepted count, treat it as a bad read: skip the whole tick
  // (don't touch seen/baselined), keep whatever's already on screen, and let the next poll
  // retry -- rather than risking baseline corruption or a burst of stale "new" events later.
  if(baselined && (P.goals.length<lastGoalCount || P.pens.length<lastPenCount)) return;
  lastGoalCount=P.goals.length; lastPenCount=P.pens.length;
  if(typeof LAST_PARSE!=="undefined") LAST_PARSE=P;   // feeds the Player Lower Thirds TONIGHT chip
  AWAYID=P.away.teamID; HOMEID=P.home.teamID; AWAYN=P.away.name; HOMEN=P.home.name;
  // tag each goal with a display name (its own team)
  P.goals.forEach(g=>{ g.name = g.teamID===AWAYID?AWAYN : g.teamID===HOMEID?HOMEN : (vis(g.teamID).code||""); });
  if(P.goals[0]) firstGoal=P.goals[0]; if(P.pens[0]) firstPen=P.pens[0];
  if(!baselined){ P.goals.forEach(g=>seen.add(sigGoal(g))); P.pens.forEach(p=>seen.add(sigPen(p))); baselined=true; return; }
  // new goals -- signatures still tracked even when NOBANNER suppresses the
  // actual banner, so toggling nobanner mid-game never backfills a burst of
  // "new" events it had been silently ignoring.
  P.goals.forEach(g=>{const s=sigGoal(g);if(!seen.has(s)){seen.add(s);if(!NOBANNER)fireGoal(g,AWAYID,HOMEID,AWAYN,HOMEN);}});
  // new penalties (one at a time, queued)
  P.pens.forEach(p=>{const s=sigPen(p);if(!seen.has(s)){seen.add(s);if(!NOBANNER)firePen(p,AWAYID,HOMEID);}});
}

/* ====================== PLAYER LOWER THIRDS (added 2026-07-12) ======================
   Fired via the Cloudflare Durable Object control channel (POST/GET
   /control/<team-slug> on the same WORKER as the box-score proxy — see

   hockey/lowerthirds/, OR rendered statically from a ?preview= URL param by

   same buildL3Data()/showL3() below, so preview and broadcast can never

   about-to-fire L3 — enforced in pump() (kills a showing L3 the instant a
   new banner job starts) and pollControl() (rejects a fire that arrives
   while #bnr is already showing). Both report back to the control channel
   via action:"interrupt" so the phone can show "interrupted — still queued".
   NOT built here: the facts engine (nzihl-season-data + stats.json + tonight
   rules, editable-field safety net) — that runs on the PHONE, once, and the
   resulting text rides through the control channel/preview payload as-is.
   This file only ever DISPLAYS whatever fact string it's given (or none). */
// Same CONTROL_TOKEN as lowerthirds/index.html — shared-secret gating writes
// only; reads are open. See worker.js's own comment for the trust model.
const CONTROL_TOKEN = "l3-EXleXBAfHbgn7P1qHeJ81U1K";
const STATS_URLS = {
  nzihl:  "https://raw.githubusercontent.com/matchavez/nzihl-broadcast-rosters/main/stats.json",
  nzwihl: "https://raw.githubusercontent.com/matchavez/nzwihl-broadcast-rosters/main/stats.json",

const PHOTO_MANIFEST_URL = "https://raw.githubusercontent.com/matchavez/nzihl-player-photos/main/manifest.json";
const PHOTO_BASE = "https://raw.githubusercontent.com/matchavez/nzihl-player-photos/main/";
const CODE_LEAGUE = {ADM:"nzihl",BSW:"nzihl",CRD:"nzihl",DUN:"nzihl",MKO:"nzihl",SCS:"nzihl",
                      AST:"nzwihl",CIN:"nzwihl",DTW:"nzwihl",WLD:"nzwihl"};
const normName=s=>String(s||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
const ordinal=n=>{n=+n||0;const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);};

// Simple TTL caches — best-effort, never block a render on a slow/failed fetch.
const _cache = {stats:{}, photos:null, standings:{}};
async function getStats(league){
  const hit=_cache.stats[league];
  if(hit && Date.now()-hit.t<5*60*1000) return hit.data;
  try{ const data=await getJSON(STATS_URLS[league]); _cache.stats[league]={data,t:Date.now()}; return data; }
  catch(e){ return hit?hit.data:null; }
}
async function getPhotoManifest(){
  if(_cache.photos && Date.now()-_cache.photos.t<5*60*1000) return _cache.photos.data;
  try{ const data=await getJSON(PHOTO_MANIFEST_URL); _cache.photos={data,t:Date.now()}; return data; }
  catch(e){ return _cache.photos?_cache.photos.data:null; }
}
async function standingsRowFor(league, code){
  const hit=_cache.standings[league];
  let rows = (hit && Date.now()-hit.t<5*60*1000) ? hit.data : null;
  if(!rows){
    const m = MANIFESTS.find(x=>x.league===league); if(!m) return null;
    try{
      const u=`${SCRAPE_HOST}/leagues/standings.cfm?clientid=${m.clientid}&leagueid=${m.leagueid}&printPage=1&_=${Date.now()}`;
      const doc=new DOMParser().parseFromString(await getText(u),"text/html");
      const tbl=doc.querySelector("table");
      if(tbl){
        rows=[...tbl.querySelectorAll("tr")].slice(1).map((r,i)=>{
          const c=[...r.children].map(x=>x.textContent.replace(/\s+/g," ").trim());
          return {k:normName(c[0]), pos:i+1, gp:+c[1]||0, w:+c[2]||0, l:+c[3]||0, otw:+c[4]||0, otl:+c[5]||0, pts:+c[6]||0};
        }).filter(r=>r.k);
        _cache.standings[league]={data:rows,t:Date.now()};
      }
    }catch(e){ rows = hit?hit.data:null; }
  }
  if(!rows) return null;
  const teamName = (TEAM_DISPLAY_NAMES[code]||code);
  const q=normName(teamName);
  return rows.find(r=>r.k.includes(q)) || null;
}
// Full display names, needed only to match standings.cfm's concatenated
// "TeamNameTLA" cell text (same technique as ticker/index.html's standOf()).
const TEAM_DISPLAY_NAMES = {
  ADM:"Pure NZ Admirals", BSW:"Botany Swarm", CRD:"Canterbury Red Devils",
  DUN:"Dunedin Thunder", MKO:"Auckland Mako", SCS:"SkyCity Stampede",
  AST:"Auckland Steel", CIN:"Canterbury Inferno", DTW:"Dunedin Thunder Women", WLD:"Wakatipu Wild",
};
// teamID -> TLA, needed to match tonight's box-score goal/pen rows (which
// carry teamID, not a short code) against a player identity's team_code.
const TEAMID_CODE = Object.fromEntries(Object.entries(REG).map(([id,v])=>[id,v.code]));

// Tonight's per-player G/A tally from the box score tick() is already polling
// every 12s (LAST_PARSE, set at the end of tick()). Omits the chip entirely
// if the player has no goals/assists yet tonight (no "0G 0A" clutter).
let LAST_PARSE = null;
function tonightChipFor(identity){
  if(!LAST_PARSE || identity.role==="coach") return null;
  const wantCode = identity.team_code, wantSurname = surnameUC(identity.name);
  let g=0,a=0;
  (LAST_PARSE.goals||[]).forEach(ev=>{
    const evCode = TEAMID_CODE[ev.teamID];
    if(evCode!==wantCode) return;
    if(surnameUC(ev.who)===wantSurname) g++;
    const asts = (ev.a||"").split(",").map(x=>surnameUC(x.trim())).filter(Boolean);
    if(asts.includes(wantSurname)) a++;
  });
  if(!g && !a) return null;
  const parts=[]; if(g) parts.push(g+"G"); if(a) parts.push(a+"A");
  return "TONIGHT: "+parts.join(" ");
}

async function buildL3Data(identity){
  const league = CODE_LEAGUE[identity.team_code] || "nzihl";
  const [stats, manifest] = await Promise.all([getStats(league), getPhotoManifest()]);
  const teamStats = stats && stats.teams && stats.teams[identity.team_code];
  const teamPeople = (manifest && manifest.leagues && manifest.leagues[league] &&
                       manifest.leagues[league].teams[identity.team_code] &&
                       manifest.leagues[league].teams[identity.team_code].people) || {};
  // statParts: array of {val,unit} pairs rendered as a fuller Scoring-Leaders-
  // style stat row (bold value + small unit label) instead of a single
  // "13 GP · 6 G · 11 A" text line — see showL3()'s l3stat.innerHTML build.
  let statParts=null, photo=null, tonight=null;
  if(identity.role==="coach"){
    const row = await standingsRowFor(league, identity.team_code);
    if(row) statParts = [
      {val:`${row.w}-${row.l}-${row.otw}-${row.otl}`, unit:"RECORD"},
      {val:ordinal(row.pos), unit:`IN ${league.toUpperCase()}`},
    ];
    const person = Object.values(teamPeople).find(p=>p.role==="coach" && normName(p.name)===normName(identity.name));
    if(person && person.photo) photo = PHOTO_BASE+person.photo;
  } else {
    const list = identity.role==="goalie" ? (teamStats&&teamStats.goalies||[]) : (teamStats&&teamStats.skaters||[]);
    const row = list.find(r=>String(r.number)===String(identity.number));
    if(row){
      statParts = identity.role==="goalie"
        ? [{val:row.gp,unit:"GP"},{val:row.gaa,unit:"GAA"},{val:row.sv_pct,unit:"SV%"},{val:row.so,unit:"SO"}]
        : [{val:row.gp,unit:"GP"},{val:row.g,unit:"G"},{val:row.a,unit:"A"},{val:row.pts,unit:"PTS"},{val:row.pim,unit:"PIM"}];
    }
    // Photo warehouse tags BOTH skaters and goalies role:"player" (goalies are
    // distinguished only by position:"G") — match by number regardless of
    // identity.role being "player" or "goalie".
    const person = Object.values(teamPeople).find(p=>p.role==="player" && String(p.number)===String(identity.number));
    if(person && person.photo) photo = PHOTO_BASE+person.photo;
    tonight = tonightChipFor(identity);
  }
  return {statParts, photo, tonight};
}

function initialsOf(name){
  const parts=String(name||"").trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return "";
  const first=parts[0][0]||"", last=parts[parts.length-1][0]||"";
  return (first+last).toUpperCase();
}

// The ONE render path both live control-channel fires AND ?preview= use.
// identity: {team_code, team_name, role, number, name, position}
// opts: {sticky:boolean, holdMs:number}
async function showL3(identity, fact, includeFact, opts){
  opts = opts || {};
  const myToken = ++l3Token;
  const v = vis(Object.keys(REG).find(id=>REG[id].code===identity.team_code)) || DEFV;
  document.documentElement.style.setProperty("--l3ink", v.ink);
  document.documentElement.style.setProperty("--l3dark", v.dark);

  const data = await buildL3Data(identity);
  if(myToken!==l3Token) return;   // superseded while awaiting stats/photo fetches

  // Line 1: jersey # + position + name, one line, matching
  // scoringleaders/index.html's .pline/.jnum pattern -- jersey number smaller
  // and team-ink-coloured, position also ink-coloured (same size as name),
  // name itself white. Coaches have no jersey number. Replaces the old
  // separate l3name + l3meta lines (Mat, 2026-07-12).
  const nameParts=[];
  if(identity.role!=="coach" && identity.number) nameParts.push(`<span class="jnum">${identity.number}</span>`);
  const posText = identity.role==="coach" ? (identity.position||"Coach")
                                           : (identity.position||(identity.role==="goalie"?"G":""));
  if(posText) nameParts.push(`<span class="pos">${posText}</span>`);
  const displayName = properCase(identity.name||"").toUpperCase() || (identity.name||"");
  nameParts.push(`<span class="nametext">${displayName}</span>`);
  l3name.innerHTML = nameParts.join(" ");

  l3stat.innerHTML = (data.statParts||[])
    .map(p=>`${p.val} <span class="unit">${p.unit}</span>`).join("\u00A0\u00A0");
  if(data.tonight){ l3tonight.textContent=data.tonight; l3tonight.classList.add("show"); }
  else { l3tonight.classList.remove("show"); l3tonight.textContent=""; }

  const factText = (fact||"").trim();
  const showFact = !!includeFact && !!factText;
  l3.classList.toggle("noFact", !showFact);
  l3fact.classList.toggle("has", showFact);
  l3fact.textContent = showFact ? factText : "";

  // Team crest -- used both for the always-on right-side end panel AND as the
  // LEFT-side photo-circle fallback, so a player with no headshot shows the
  // crest on BOTH sides (balanced) instead of a crest vs. bare initials
  // (Mat, 2026-07-12). Fetched once, reused for both slots.
  const logoP = loadImage(v.logo ? LOGO+encodeURIComponent(v.logo) : null, 1800);
  logoP.then(img=>{
    if(myToken!==l3Token) return;
    if(img){ l3logo.src=img.src; l3logo.classList.add("show"); }
    else { l3logo.removeAttribute("src"); l3logo.classList.remove("show"); }
  });

  const showPhotoState = (mode, img)=>{
    // mode: "photo" | "logo" | "initials" -- in priority order.
    l3img.style.display = mode==="photo" ? "" : "none";
    if(mode==="photo") l3img.src = img.src; else l3img.removeAttribute("src");
    // Direct style.display, not a CSS class toggle -- the element's inline
    // style="display:none" default (same pattern as l3initials/l3img below)
    // otherwise wins over a class selector's specificity.
    l3photologo.style.display = mode==="logo" ? "flex" : "none";
    if(mode==="logo") l3photologoImg.src = img.src; else l3photologoImg.removeAttribute("src");
    l3initials.style.display = mode==="initials" ? "flex" : "none";
    if(mode==="initials") l3initials.textContent = initialsOf(identity.name);
  };
  const finishPhoto = ()=>{
    if(myToken!==l3Token) return;
    l3HideTimer && clearTimeout(l3HideTimer);
    l3.classList.add("show");
    // No name/stat is ever truncated with an ellipsis (Mat, 2026-07-12) -- shrink
    // font-size to fit instead, same fitLine() pattern already used for the pregame
    // banner text. Must run AFTER .show lands (l3 is display:none before that, so
    // clientWidth would read 0) -- the reflow forces layout before measuring.
    void l3.offsetWidth;
    fitLine(l3name, 38, 20);
    fitLine(l3stat, 38, 20);
    if(!opts.sticky){
      const holdMs = typeof opts.holdMs==="number" ? opts.holdMs : 10000;
      l3HideTimer = setTimeout(hideL3, Math.max(0, holdMs));
    }
  };
  const photoP = data.photo ? loadImage(data.photo, 1800) : Promise.resolve(null);
  Promise.all([photoP, logoP]).then(([photoImg, logoImg])=>{
    if(myToken!==l3Token) return;
    if(photoImg) showPhotoState("photo", photoImg);
    else if(logoImg) showPhotoState("logo", logoImg);
    else showPhotoState("initials");
    finishPhoto();
  });
}

let l3LastFireId=null, l3PollBusy=false;
let TEAM_SLUG = null;   // set once in start(); default matches resolveTarget()'s own fallback
async function reportInterrupt(){
  if(!TEAM_SLUG) return;
  try{
    await fetch(`${WORKER}/control/${TEAM_SLUG}`,{
      method:"POST", cache:"no-store",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({action:"interrupt", token:CONTROL_TOKEN}),
    });
  }catch(e){ /* best-effort */ }
}
function bannerBusy(){ return bnr.classList.contains("show") || busy; }
async function pollControl(){
  if(l3PollBusy) return; l3PollBusy=true;
  try{
    if(!TEAM_SLUG) return;
    let st;
    try{ const r=await fetch(`${WORKER}/control/${TEAM_SLUG}`,{cache:"no-store"}); st=await r.json(); }
    catch(e){ return; }
    if(!st || st.error) return;   // not deployed yet (NO_DO_BINDING) or transient — degrade silently
    if(st.status==="fired" && st.fire_id && st.fire_id!==l3LastFireId){
      l3LastFireId = st.fire_id;
      if(bannerBusy()){
        reportInterrupt();
      } else if(st.player){
        l3ActiveFireId = st.fire_id;
        const holdMs = st.expires_at ? (st.expires_at-Date.now()) : 10000;
        showL3(st.player, st.fact, st.include_fact, {sticky:false, holdMs});
      }
    } else if(st.status!=="fired"){
      l3LastFireId=null;
    }
  } finally { l3PollBusy=false; }
}

    ? penHTML({who:t.penWho, dur:t.penDur, inf:t.penInf})
    : goalHTML({name:t.name, who:t.goalWho, a:t.goalA||""}, t.name, t.name);
  enqueue({html, ink:t.ink, dark:t.dark, logoFile:t.logo,
           photoWho: kind==="goal" ? t.goalWho : undefined,   // goals only, same field doubles as the display name
           hold: hold || (kind==="pen"?HOLD_PEN:HOLD_GOAL)});
}
// If ?team=<slug> is present alongside ?test=1, scope the demo to just that club
// (e.g. ?test=1&team=botany-swarm shows only Botany Swarm's G/P buttons + label,
// and "Play all" cycles just that one team) instead of all 9 — same test harness,
// narrowed to the team being reviewed.
let ACTIVE_TEST_TEAMS = TEST_TEAMS;
function buildTestButtons(){
  const wrap=document.getElementById("teamBtns");
  const teamParam = Q.get("team");
  const matched = teamParam ? TEST_TEAMS.filter(t=>slug(t.name)===slug(teamParam)) : [];
  ACTIVE_TEST_TEAMS = matched.length ? matched : TEST_TEAMS;
  const lbl=document.querySelector("#test .lbl");
  if(lbl) lbl.textContent = matched.length ? ("TEST · GOAL / PEN · "+matched[0].name.toUpperCase()) : "TEST · GOAL / PEN · EACH TEAM";
  ACTIVE_TEST_TEAMS.forEach(t=>{
    const g=document.createElement("span"); g.className="tg";
    const lab=document.createElement("span"); lab.className="ab"; lab.textContent=t.abbr; g.appendChild(lab);
    const bg=document.createElement("button"); bg.className="tb gb"; bg.textContent="G"; bg.title=t.name+" — goal banner";    bg.onclick=()=>fireTest(t,"goal"); g.appendChild(bg);
    const bp=document.createElement("button"); bp.className="tb pb"; bp.textContent="P"; bp.title=t.name+" — penalty banner"; bp.onclick=()=>fireTest(t,"pen");  g.appendChild(bp);
    wrap.appendChild(g);
  });
}
function playAll(){ ACTIVE_TEST_TEAMS.forEach(t=>{ fireTest(t,"goal",2400); fireTest(t,"pen",2400); }); }   // cycle the active team set: goal then penalty

/* ====================== INIT ====================== */
// Keeps the frame's BOTTOM-CENTRE locked to the window's bottom-centre as the
// window is resized/narrowed (Mat, 2026-07-12) -- important now that the
// Player L3 is itself bottom-centre-anchored inside the frame. The old
// version only scaled from a fixed top-left origin, so on any window whose
// aspect ratio wasn't exactly 16:9 the frame (and the L3 inside it) visibly
// drifted left/up instead of staying centred -- this only ever showed up in
// desktop-preview windows (a real 1920x1080 YoloBox capture is unaffected),
// but it's what made the L3 look off-centre while testing narrower widths.
function fitWindow(){
  const stage=document.getElementById("stage");
  const scale=Math.min(innerWidth/1920, innerHeight/1080);
  const left=(innerWidth-1920*scale)/2;   // always horizontally centred
  const top=innerHeight-1080*scale;       // always bottom-anchored (letterbox lands on top only)
  stage.style.transform=`translate(${left}px,${top}px) scale(${scale})`;
}
addEventListener("resize",fitWindow);

async function start(){
  await loadNameOverrides();
  fitWindow();
  TEAM_SLUG = slug(Q.get("team")||"canterbury-red-devils");
  // Player Lower Thirds preview mode (loaded in the tiny iframe by
  // hockey/lowerthirds/): resolved up front now, not just below, so the
  // pre-game confidence alert can be skipped for it too (Mat, 2026-07-12 --
  // it was popping up over the L3 preview on every pill tap/refresh, which
  // is confusing/distracting in that tiny context; producers already see it
  // fine on the real full-size broadcast source).
  const PREVIEW = Q.get("preview");
  if(TESTMODE){ document.getElementById("test").style.display="flex";
    document.getElementById("diag").style.display="block";
    buildTestButtons();
    document.getElementById("tAll").onclick=playAll; }
  TARGET=await resolveTarget();
  const diag=document.getElementById("diag");
  if(TESTMODE){ diag.textContent = (WORKER?"live ":"no-worker ")+TEAM_SLUG+" · "+(TARGET?("game "+TARGET.gid):"no-game"); }
  if(!PREVIEW && !NOBANNER) showConfidenceAlert(PREGAME);   // pre-game only — internally guards against the game having started; suppressed when layered as an L3-only source (see NOBANNER above)
  if(TARGET&&WORKER){ await tick();
    const t0=Date.now();
    const iv=setInterval(()=>{ if(Date.now()-t0>RUN_CAP){clearInterval(iv);return;} tick(); }, POLL_MS); }

  // ---- Player Lower Thirds ----
  if(PREVIEW){
    // Static preview mode (loaded in an iframe by hockey/lowerthirds/): render
    // once from the URL param, sticky (no auto-hide), no control-channel
    // polling/writes at all. The phone updates the preview by reloading this
    // iframe with a fresh ?preview= value on every pill tap / fact edit.
    try{
      // Q.get() (URLSearchParams) already URI-decodes the param once, and
      // updatePreview() in lowerthirds/index.html only encodeURIComponent's
      // it once when building the iframe src -- so PREVIEW here is already
      // plain JSON text. A second decodeURIComponent() used to be applied
      // on top of that, which threw "URI malformed" (silently swallowed by
      // this catch) for any fact/name containing a literal "%" not followed
      // by two hex digits -- e.g. a goalie SV% fact like "stopped 73.3% of
      // shots" -- so the preview just stayed blank with no visible error.
      // Fixed 2026-07-12 (Mat: "Toby Schuck isn't working"). Falls back to
      // the old double-decode only if single-parse fails, for safety.
      let payload;
      try{ payload = JSON.parse(PREVIEW); }
      catch(e2){ payload = JSON.parse(decodeURIComponent(PREVIEW)); }
      if(payload && payload.player) showL3(payload.player, payload.fact, payload.include_fact, {sticky:true});
    }catch(e){ /* malformed preview payload — show nothing rather than error on screen */ }
  } else if(WORKER){
    pollControl();
    setInterval(pollControl, 750);
  }
}
start();
</script>
