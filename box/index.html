<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>NZIHL Box Score</title>
<style>
  html,body{margin:0;height:100%;background:#0f1115;}
  #stage{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);
         width:100%;max-width:1000px;box-sizing:border-box;overflow:hidden;
         border:6px solid #fff;background:#fff;}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;
         background:#fff;opacity:0;transition:opacity .25s ease;}
  iframe.show{opacity:1;}
  /* team logos overlaid in the top corners of the card */
  .tlogo{position:absolute;top:40px;height:92px;width:auto;max-width:120px;
         object-fit:contain;display:none;z-index:4;pointer-events:none;}
  .tlogo.away{left:28%;}   /* inside the away score (which sits left) */
  .tlogo.home{right:28%;}  /* inside the home score (which sits right) */
  #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
       color:#cbd2dc;font:500 16px/1.5 -apple-system,Segoe UI,Inter,sans-serif;
       text-align:center;padding:24px;}
  #msg a{color:#7db2ff;}
  #dot{position:absolute;right:10px;bottom:9px;width:8px;height:8px;border-radius:50%;
       background:#36d399;box-shadow:0 0 0 0 rgba(54,211,153,.6);
       animation:pulse 2.4s ease-out infinite;z-index:5;opacity:.85;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(54,211,153,.6)}
                   70%{box-shadow:0 0 0 9px rgba(54,211,153,0)}
                   100%{box-shadow:0 0 0 0 rgba(54,211,153,0)}}
</style>
</head>
<body>
<div id="stage">
  <iframe id="fa" title="Box score"></iframe>
  <iframe id="fb" title="Box score"></iframe>
  <img id="logoAway" class="tlogo away" alt="">
  <img id="logoHome" class="tlogo home" alt="">
  <div id="dot" title="Auto-refreshing"></div>
</div>
<div id="msg"></div>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  var g = p.get('g') || p.get('gameid');
  var lg = (p.get('l') || p.get('league') || '').toLowerCase();
  var isW = p.get('w') === '1' || lg.charAt(0) === 'w' || lg === 'nzwihl';
  var secs = Math.max(8, parseInt(p.get('s'), 10) || 35);   // refresh cadence, min 8s (default 35s)

  var msg = document.getElementById('msg');
  if(!g){
    document.getElementById('dot').style.display = 'none';
    msg.style.display = 'flex';
    msg.innerHTML = 'Add a game id to the URL, e.g. <br><code>?g=2519939</code>' +
                    ' &nbsp;(add <code>&amp;w=1</code> for NZWIHL).';
    return;
  }

  var clientid = isW ? 7132 : 7131;
  var leagueid = isW ? 35501 : 35499;
  function src(){
    // NO-CACHE origin: admin.esportsdesk.com mirrors nzihl.com / nzwihl.com with no CDN delay.
    return 'https://admin.esportsdesk.com/leagues/hockey_boxscores.cfm?clientid=' + clientid +
           '&leagueid=' + leagueid + '&gameid=' + encodeURIComponent(g) +
           '&printPage=1&_=' + Date.now();   // cache-bust each load
  }
  document.title = 'Box Score · ' + g;

  var frames = [document.getElementById('fa'), document.getElementById('fb')];
  var active = 0;
  function load(){
    var next = frames[1 - active];
    next.onload = function(){
      next.classList.add('show');
      frames[active].classList.remove('show');
      active = 1 - active;
    };
    next.src = src();   // load into the hidden frame, then swap on ready
  }
  load();
  setInterval(load, secs * 1000);
  document.addEventListener('visibilitychange', function(){ if(!document.hidden) load(); });

  // ---- team logos: nzihl omits them from the print view, so overlay them ourselves.
  // Team identity comes from the roster pipeline's boxscores.json (matched by gameid).
  var LOGO_BASE = 'https://admin.esportsdesk.com/media/leagues/6795/graphics/';
  var LOGOS = {
    // NZIHL (men's)
    'Dunedin Thunder':'thunder.png',
    'Canterbury Red Devils':'reddevils.png',
    'Botany Swarm':'swarm.png',
    'SkyCity Stampede':'stampede.png',
    'Pure NZ Admirals':'PureNZAdmirals2000x2000.jpg',
    // NZWIHL (women's) — same 6795/graphics/ folder; matched by gameid via the feed
    'Dunedin Thunder Women':'thunderW.png',
    'Wakatipu Wild':'wild.png',
    'Auckland Steel':'steel.png',
    'Canterbury Inferno':'inferno.png'
  };
  var FEEDS = [
    'https://raw.githubusercontent.com/matchavez/nzihl-broadcast-rosters/main/boxscores.json',
    'https://raw.githubusercontent.com/matchavez/nzwihl-broadcast-rosters/main/boxscores.json'
  ];
  function place(id, team){
    var fn = LOGOS[team]; if(!fn) return;
    var el = document.getElementById(id);
    el.src = LOGO_BASE + fn; el.style.display = 'block';
  }
  Promise.all(FEEDS.map(function(u){
    return fetch(u, {cache:'no-store'}).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; });
  })).then(function(all){
    var game = null;
    all.forEach(function(d){ if(d && d.games) d.games.forEach(function(gm){ if(String(gm.gameid) === String(g)) game = gm; }); });
    if(!game) return;
    place('logoAway', game.away);
    place('logoHome', game.home);
  }).catch(function(){});
})();
</script>
</body>
</html>
