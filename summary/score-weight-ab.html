<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Game Summary — Score Font-Weight A/B</title>
<style>
@font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable.woff2') format('woff2');}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#000;font-family:Inter,-apple-system,Segoe UI,sans-serif;font-feature-settings:"tnum" 1,"cv05" 1;-webkit-font-smoothing:antialiased;}
body{padding:40px;display:flex;flex-direction:column;align-items:center;gap:36px;}
.label{color:#f4f6fa;font-weight:800;font-size:20px;letter-spacing:.04em;margin-bottom:14px;text-transform:uppercase;}
.label span{color:#878d99;font-weight:600;text-transform:none;letter-spacing:0;}
.panel{width:1000px;}
#stage{width:1000px;height:190px;background:#111111;color:#f4f6fa;overflow:hidden;position:relative;border:1px solid #2a2f3a;}
header{height:100%;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 32px;}
.side{display:flex;align-items:center;gap:20px;}
.side.home{flex-direction:row-reverse;text-align:right;}
.side .logo{width:78px;height:78px;object-fit:contain;flex:0 0 auto;}
.tinfo{flex:1 1 auto;min-width:0;}
.nm{font-weight:800;font-size:21px;line-height:1.04;}
.score{font-size:70px;line-height:.86;flex:0 0 auto;}
.side.away .score{margin-right:38px;}
.side.home .score{margin-left:38px;}
.center{text-align:center;min-width:100px;padding:0 16px;color:#c3c9d4;font-weight:700;font-size:14px;letter-spacing:.05em;}
.wA{font-weight:900;}
.wB{font-weight:800;}
</style>
</head>
<body>

<div class="panel">
  <div class="label">A &mdash; weight 900 <span>(current, live)</span></div>
  <div id="stage">
    <header>
      <div class="side away">
        <img class="logo" src="https://matchavez.com/nzihl-broadcast-assets/assets/logos/Dunedin_Thunder.png" alt="">
        <div class="tinfo"><div class="nm">Dunedin Thunder</div></div>
      </div>
      <div class="score wA" style="color:#1E9E63">5</div>
      <div class="center">FINAL</div>
      <div class="score wA" style="color:#2F6FE0">8</div>
      <div class="side home">
        <img class="logo" src="https://matchavez.com/nzihl-broadcast-assets/assets/logos/Pure-NZ-Admirals-2000x2000.png" alt="">
        <div class="tinfo"><div class="nm">Pure NZ Admirals</div></div>
      </div>
    </header>
  </div>
</div>

<div class="panel">
  <div class="label">B &mdash; weight 800 <span>(proposed)</span></div>
  <div id="stage">
    <header>
      <div class="side away">
        <img class="logo" src="https://matchavez.com/nzihl-broadcast-assets/assets/logos/Dunedin_Thunder.png" alt="">
        <div class="tinfo"><div class="nm">Dunedin Thunder</div></div>
      </div>
      <div class="score wB" style="color:#1E9E63">5</div>
      <div class="center">FINAL</div>
      <div class="score wB" style="color:#2F6FE0">8</div>
      <div class="side home">
        <img class="logo" src="https://matchavez.com/nzihl-broadcast-assets/assets/logos/Pure-NZ-Admirals-2000x2000.png" alt="">
        <div class="tinfo"><div class="nm">Pure NZ Admirals</div></div>
      </div>
    </header>
  </div>
</div>

</body>
</html>
