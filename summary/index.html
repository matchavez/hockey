<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NZIHL Live Game Summary</title>
<script>
// Background mode toggle — ?bg=opaque switches the stage to a translucent-but-
// highly-opaque backdrop (see html.bg-opaque rules below) so it can be composited
// over broadcast video; default (no param, or ?bg=black) is the original solid
// black stage. Set as a class on <html> synchronously (before first paint) so
// there's no flash of the wrong background. (Mat, 2026-07-05)
if (new URLSearchParams(location.search).get('bg') === 'opaque') {
  document.documentElement.classList.add('bg-opaque');
}
</script>
<style>
@font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable.woff2') format('woff2');}
@font-face{font-family:'Inter';font-style:italic;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable-Italic.woff2') format('woff2');}
  :root{ --bg:#111111; --line:#2a2f3a; --line2:#20242e;
    --fg:#f4f6fa; --sub:#c3c9d4; --dim:#878d99; --gold:#FFCF49; --redA:#b42026; --redB:#7c1014; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#000;font-family:Inter,-apple-system,Segoe UI,sans-serif;font-feature-settings:"tnum" 1,"cv05" 1;-webkit-font-smoothing:antialiased;}
  /* ?bg=opaque mode — translucent-but-highly-opaque stage (.92 alpha + 14px
     backdrop blur), so a video/color behind the page shows through faintly.
     Bumped from an initial .80 to .92 per Mat's feedback 2026-07-05 ("still a
     little too visible through it"). See Graphics/Game Summary/ test render. */
  html.bg-opaque, html.bg-opaque body{background:transparent;}
  html.bg-opaque{--bg:rgba(9,9,11,.92);}
  html.bg-opaque #stage{-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);}
  html.bg-opaque .divider{background:rgba(42,42,42,.92);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);}
  html.bg-opaque .col.penalties{background:rgba(20,20,20,.92);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);}
  #fit{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #stage{width:1840px;height:1000px;flex:0 0 auto;position:relative;color:var(--fg);background:var(--bg);overflow:hidden;display:flex;flex-direction:column;}
  #wash{position:absolute;left:0;top:0;width:100%;height:230px;z-index:0;pointer-events:none;filter:blur(48px);opacity:.6;clip-path:inset(0);}
  /* live "scraping" indicator — hidden + still by default; only pulses while a box-score fetch is in flight (see tick()) */
  .livedot{position:absolute;top:16px;left:22px;z-index:6;width:14px;height:14px;border-radius:50%;background:#5fe39a;box-shadow:0 0 0 0 rgba(95,227,154,.6);opacity:0;transition:opacity .2s ease;}
  .livedot.scraping{opacity:1;animation:pl 2.2s ease-out infinite;}
  @keyframes pl{0%{box-shadow:0 0 0 0 rgba(95,227,154,.55)}70%{box-shadow:0 0 0 11px rgba(95,227,154,0)}100%{box-shadow:0 0 0 0 rgba(95,227,154,0)}}
  header{height:208px;flex:0 0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 60px;position:relative;z-index:1;}
  .side{display:flex;align-items:center;gap:26px;}
  .side.home{flex-direction:row-reverse;text-align:right;}
  .side .logo{width:132px;height:132px;object-fit:contain;flex:0 0 auto;}
  .tinfo{flex:1 1 auto;min-width:0;}
  .nm{font-weight:800;font-size:33px;line-height:1.04;}
  /* Spelled-out, tabular stat block (was a single "SOG 43  PP 1/5  PIM 6" line) —
     abbreviations weren't clear to the audience. A fixed-width bounded box (not
     stretched to fill the full name column) with grid-template-columns:1fr auto
     keeps labels left-aligned and values right-aligned inside their own compact
     row, on EITHER side — no more mirroring the whole block as a packed unit.
     Away gets a small left indent off the name's edge; home's box just hugs the
     name's right edge (margin-left:auto) with the same internal alignment.
     (Mat, 2026-07-05) */
  .rec{margin-top:13px;width:255px;display:grid;grid-template-columns:1fr auto;column-gap:12px;row-gap:2px;}
  .side.away .rec{margin-left:6px;}
  .side.home .rec{margin-left:auto;margin-right:6px;}
  .rec .rl{font-size:16px;font-weight:600;color:var(--sub);letter-spacing:.005em;white-space:nowrap;align-self:center;text-align:left;}
  .rec .rv{font-size:23px;font-weight:400;color:var(--fg);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;align-self:center;}
  .score{font-weight:900;font-size:112px;line-height:.86;flex:0 0 auto;}
  .side.away .score{margin-right:52px;}
  .side.home .score{margin-left:52px;}
  .center{text-align:center;min-width:330px;padding:0 22px;}
  .status{font-weight:600;font-size:26px;letter-spacing:.01em;color:var(--gold);}
  .date{font-weight:700;font-size:18px;color:var(--sub);margin-top:4px;}
  .pg{margin:11px auto 0;border-collapse:collapse;}
  .pg th{color:var(--dim);font-weight:800;font-size:13px;letter-spacing:.05em;padding:2px 14px;}
  .pg td{font-weight:400;font-size:23px;color:var(--fg);padding:2px 14px;text-align:center;}
  .pg td.lbl{text-align:left;font-size:17px;color:var(--sub);font-weight:800;}
  .pg .chip{display:inline-block;width:13px;height:13px;border-radius:3px;margin-right:8px;vertical-align:-1px;}
  .divider{height:42px;flex:0 0 auto;position:relative;z-index:1;background:#2a2a2a;display:flex;align-items:center;justify-content:center;gap:14px;color:#fff;font-weight:800;font-size:18px;letter-spacing:.1em;text-transform:uppercase;}
  .divider .sep{color:#ffffff7a;font-weight:700;margin:0 4px;}
  #grid{flex:1 1 auto;min-height:0;display:grid;gap:0;position:relative;z-index:1;}
  .col{min-width:0;height:100%;overflow:hidden;padding:16px 26px 8px;border-right:1px solid var(--line2);}
  .col:last-child{border-right:0;}
  .col h2{font-size:.62em;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--sub);margin-bottom:.5em;text-align:center;white-space:nowrap;}
  .col.penalties h2{color:#e7b3b8;}
  /* Penalty Summary reads as info, not points — set it apart from the scoring
     columns with a barely-there fill (#171717, just a hair lighter than the
     stage's own --bg #111 — tried a red wash, then #222, before landing here)
     plus a double-line rule in place of the single hairline the scoring
     columns use between each other. The scoring column immediately before it
     drops its own hairline (.pre-penalties, added in JS) so there's exactly
     one clean divider, not two stacked lines. (Mat, 2026-07-05) */
  .col.penalties{background:#171717;border-left:6px double rgba(224,150,150,.4);}
  .col.pre-penalties{border-right:0;}
  /* a scoring period with zero goals collapses to a slim strip (rotated
     "X Period - No Scoring" label, light weight) instead of a full-width
     column of empty "No Goals" space — narrowed further to 0.2fr and the
     label text updated per Mat, 2026-07-06. */
  .col.collapsed{display:flex;flex-direction:column;align-items:center;padding:16px 4px 8px;}
  .col.collapsed h2{writing-mode:vertical-rl;transform:rotate(180deg);margin:0;white-space:nowrap;font-weight:300;}
  .goal{display:flex;align-items:center;gap:.5em;padding:.4em 0;border-bottom:1px solid var(--line2);}
  .goal:last-child{border-bottom:0;}
  .accent{flex:0 0 .2em;align-self:stretch;border-radius:.12em;min-width:4px;}
  /* "Bigger and Bolder" goal entries (Mat approved 2026-07-05, prod-testing —
     may back out): raised the photo cap from 74px so sparse periods get a
     noticeably larger, bolder presence. Safe from overrun because .shot's size
     is still driven by the column's em-scaled font-size (set by fitCols, which
     only ever picks a size that already fits) — this only raises the CEILING
     reached in roomy periods, never forces a size that doesn't fit. */
  .shot{flex:0 0 auto;width:2.6em;height:2.6em;max-width:92px;max-height:92px;border-radius:50%;overflow:hidden;background:#1b2029;display:flex;align-items:center;justify-content:center;}
  .shot img{width:100%;height:100%;object-fit:cover;object-position:50% 16%;}
  .shot .ini{font-weight:800;font-size:.82em;color:#aeb6c2;}
  .gmain{flex:1 1 auto;min-width:0;}
  .gname{font-weight:800;font-size:.8em;line-height:1.08;white-space:nowrap;}
  .gname .no{color:var(--dim);font-weight:700;margin-right:.25em;}
  .gsub{display:flex;align-items:baseline;gap:.55em;margin-top:.12em;white-space:nowrap;}
  .gast{flex:1 1 auto;min-width:0;overflow:hidden;font-size:.62em;color:var(--dim);}
  .gast .unassist{font-style:italic;font-weight:200;}
  .gtag{flex:0 0 auto;font-weight:800;font-size:.5em;padding:.16em .5em;border-radius:.4em;letter-spacing:.04em;background:#33271a;color:#ffce7d;}
  .gtime{flex:0 0 auto;font-weight:800;font-size:.64em;color:var(--sub);}
  .psubhd{font-size:.55em;font-weight:800;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin:.6em 0 .25em;text-align:center;}
  .psubhd:first-child{margin-top:0;}
  .pen{display:flex;align-items:center;gap:.5em;padding:.36em 0;border-bottom:1px solid var(--line2);}
  .pen:last-child{border-bottom:0;}
  .pwho{flex:1 1 auto;min-width:0;}
  .pname{font-weight:700;font-size:.72em;line-height:1.08;white-space:nowrap;}
  .pname .no{color:var(--dim);font-weight:700;margin-right:.24em;}
  .psub{display:flex;align-items:baseline;gap:.5em;margin-top:.1em;white-space:nowrap;}
  .pinf{flex:1 1 auto;min-width:0;overflow:hidden;font-size:.58em;color:var(--dim);letter-spacing:.04em;text-transform:uppercase;font-style:italic;font-weight:300;}
  .ppim{flex:0 0 auto;font-weight:700;font-size:.55em;color:#d7adb1;}
  .ptime{flex:0 0 auto;font-weight:800;font-size:.62em;color:var(--sub);}
  #msg{position:absolute;inset:0;z-index:7;display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--sub);font-size:30px;font-weight:600;padding:60px;line-height:1.5;}
</style>
</head>
<body>
<div id="fit"><div id="stage">
  <div id="wash"></div>
  <span class="livedot"></span>
  <header>
    <div class="side away"><img class="logo" id="logoA" alt=""><div class="tinfo"><div class="nm" id="nameA"></div><div class="rec" id="recA"></div></div><div class="score" id="sA"></div></div>
    <div class="center"><div class="status" id="status"></div><div class="date" id="date"></div><table class="pg" id="pgrid"></table></div>
    <div class="side home"><img class="logo" id="logoB" alt=""><div class="tinfo"><div class="nm" id="nameB"></div><div class="rec" id="recB"></div></div><div class="score" id="sB"></div></div>
  </header>
  <div class="divider" id="divider"></div>
  <div id="grid"></div>
  <div id="msg" style="display:none"></div>
</div></div>

<script>
// ---- config ------------------------------------------------------------
// CORS shim in front of nzihl. Paste your deployed Cloudflare Worker URL here (see worker.js).
const WORKER = "https://blue-butterfly-aa69.matchavez.workers.dev";   // Cloudflare CORS proxy (worker.js)
const SHIM = u => WORKER ? (WORKER.replace(/\/$/,"") + "?url=" + encodeURIComponent(u)) : null;
const MANIFESTS = [
  {league:"nzihl",  url:"https://raw.githubusercontent.com/matchavez/nzihl-broadcast-rosters/main/boxscores.json",  clientid:7131, leagueid:35499},
  {league:"nzwihl", url:"https://raw.githubusercontent.com/matchavez/nzwihl-broadcast-rosters/main/boxscores.json", clientid:7132, leagueid:35501},
];
const LOGO="https://matchavez.com/nzihl-broadcast-assets/assets/logos/";
const SHOT="https://admin.esportsdesk.com/media/leagues/6795/graphics/";
// team visuals keyed by nzihl teamID
const REG={
 // dark = official Half-Dark "Scorebug BG" per 2026 style guide (used for the header wash vectors)
 // Admirals: Admiral Blue #2F6FE0 (lightened navy, legibility on the dark stage) is the single accent for score/chips/bars — Mat's call 2026-06-30.
 "674110":{code:"ADM", ink:"#2F6FE0", dark:"#081D48", logo:"Pure-NZ-Admirals-2000x2000.png", venue:"Paradice Avondale"},
 "675633":{code:"CRD", ink:"#E5242B", dark:"#550000", logo:"Red Devils 2000x2000r.png", venue:"Alpine Ice Centre"},
 "675634":{code:"DUN", ink:"#1E9E63", dark:"#012C1E", logo:"Dunedin_Thunder.png", venue:"Dunedin Ice Stadium"},
 "675635":{code:"SCS", ink:"#FAC805", dark:"#162543", logo:"Skycity Stampede 2000x2000.png", venue:"Queenstown Ice Arena"},
 // Swarm: Swarm Rose #C2455A (lightened Swarm Maroon #782738 for legibility on the dark stage; ~3.9:1, matches Admiral Blue) — Mat's call 2026-06-30.
 "674109":{code:"BSW", ink:"#C2455A", dark:"#441620", logo:"Botany Swarm 2000x2000.png", venue:"Paradice Botany"},
 "675636":{code:"AST", ink:"#9FB6C8", dark:"#18263E", logo:"Auckland-Steel-White.png", venue:"Paradice Avondale"},
 "675637":{code:"CIN", ink:"#E0564E", dark:"#550000", logo:"Inferno-White.png", venue:"Alpine Ice Centre"},
 "675638":{code:"DTW", ink:"#1E9E63", dark:"#012C1E", logo:"thunder-women-white.png", venue:"Dunedin Ice Stadium"},
 "675639":{code:"WLD", ink:"#FAC805", dark:"#162543", logo:"Wakatipu-wild-white.png", venue:"Queenstown Ice Arena"},
 // Auckland Mako (NZIHL men) — Mako Steel / Mako Ink per 2026 style guide. TODO @publish: set teamID (left key below) from a parsed Mako box score.
 // "<MAKO_TEAMID>":{code:"MKO", ink:"#8A8F96", dark:"#202222", logo:"Auckland Mako 2000x2000.png", venue:""},
};
const DEFV={ink:"#9aa3ad", dark:"#262a31", logo:"", venue:""};
const vis=id=>REG[id]||DEFV;

// ---- helpers -----------------------------------------------------------
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WD=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const slug=s=>s.toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
const decamel=s=>s.replace(/([a-z\.])([A-Z])/g,"$1 $2").replace(/([^\s(])\(/g,"$1 (").replace(/\)([^\s)])/g,") $1");
const ini=n=>n.split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();
const shotURL=n=>SHOT+encodeURIComponent(n.replace(/\s+/g,""))+".jpg";
const nameInit=n=>{const x=n.split(/\s+/);return x.length<2?n:x[0][0]+". "+x.slice(1).join(" ");};
// first-initial + surname (siblings on a roster can share a surname, e.g. two Ruski-Jones
// players — the initial disambiguates). Applied everywhere a name is shortened.
const initSurname=n=>{const w=decamel(n).trim().split(/\s+/).filter(t=>!/^\(.*\)$/.test(t));return w.length>1?(w[0][0]+". "+w.slice(1).join(" ")):(w[0]||"");};
// esportsdesk source data sometimes arrives ALL CAPS or all lower-case (names, penalty
// infractions). Detect wholesale one-case text (not stylised mixed case like "McDonald" or
// "O'Brien", which is left untouched) and normalise to Title Case for DISPLAY only — raw
// text is still used for roster/headshot lookups so those keep matching. (Mat, 2026-07-01)
function properCase(s){
  if(!s) return s;
  const letters=s.replace(/[^a-zA-Z]/g,"");
  if(!letters) return s;
  const allUpper=letters===letters.toUpperCase() && letters!==letters.toLowerCase();
  const allLower=letters===letters.toLowerCase() && letters!==letters.toUpperCase();
  if(!allUpper && !allLower) return s;
  return s.toLowerCase().replace(/(^|[\s\-'.(])([a-z])/g,(m,p1,p2)=>p1+p2.toUpperCase());
}
function fmtAssist(a){
  if(/^unassisted$/i.test(a)) return '<span class="unassist">Unassisted</span>';
  const parts=a.split(",").map(s=>properCase(decamel(s).trim())).filter(Boolean);
  return parts.map(initSurname).join(", ");
}
const PORDER=[["1","1st Period"],["2","2nd Period"],["3","3rd Period"],["OT","Overtime"]];
const normP=s=>{s=s.toUpperCase();if(s.startsWith("1"))return"1";if(s.startsWith("2"))return"2";if(s.startsWith("3"))return"3";if(/OT|OVER/.test(s))return"OT";if(/SO|SHOOT/.test(s))return"SO";return s;};

// ---- parse the printPage HTML -----------------------------------------
function parse(html){
  // esportsdesk wraps a player's jersey#/first-name in a responsive "d-sm-inline d-none"
  // <span> (shown only at wider breakpoints) with the surname as trailing plain text right
  // after it. Usually that's "...</span> Surname" (a real space), but at least one field
  // (assist lists) sometimes omits the space entirely: "...</span>beckstead)". When the
  // first name also happens to be stored lowercase (a known esportsdesk quirk, e.g. "cole"),
  // there's no letter-case boundary left for decamel() to split on either, so the two names
  // silently fuse into one word ("Cole" + "Beckstead" -> "colebeckstead", caught live 2026-07-06).
  // Force a space after every closing </span> up front, before anything reads .textContent —
  // harmless where a space/tag already followed (collapsed back down by the \s+ normalisation
  // every cell-text reader already does), and it fixes this at the source for every field.
  html=html.replace(/<\/span>/gi,"</span> ");
  const doc=new DOMParser().parseFromString(html,"text/html");
  const txt=el=>el?el.textContent.replace(/\s+/g," ").trim():"";
  const h5=[...doc.querySelectorAll("h5")];
  const findH=re=>h5.find(h=>re.test(h.textContent));
  const tidOf=el=>{const a=el&&el.querySelector&&el.querySelector('a[href*="teamID="]');const m=a&&a.getAttribute("href").match(/teamID=(\d+)/i);return m?m[1]:null;};
  const btw=(a,b)=>{const r=[];let e=a&&a.nextElementSibling;while(e&&e!==b){r.push(e);e=e.nextElementSibling;}return r;};
  const tables=[...doc.querySelectorAll("table")];
  const scoreTbl=tables[0];
  const srows=[...scoreTbl.querySelectorAll("tr")];
  const hdr=[...srows[0].children].map(txt);
  const pcols=hdr.slice(1,-1).map(normP).filter(p=>["1","2","3","OT","SO"].includes(p));
  const team=tr=>{const c=[...tr.children].map(txt);const m=c[0].match(/^(.*?)\s+([A-Z]{2,4})$/);
    return {teamID:tidOf(tr),name:(m?m[1]:c[0]).trim(),code:(m?m[2]:"").trim(),line:c.slice(1,-1).map(n=>+n||0),tot:+c[c.length-1]||0};};
  const away=team(srows[1]), home=team(srows[2]);
  const dTbl=tables.find(t=>/SOG/.test(txt(t.querySelector("tr"))));
  if(dTbl){const dr=[...dTbl.querySelectorAll("tr")];const det=tr=>{const c=[...tr.children].map(txt);return {sog:(c[1]||"").split(" ")[0],pp:c[2]||"",pim:c[3]||""};};
    Object.assign(away,det(dr[1])); Object.assign(home,det(dr[2]));}
  // roster: full-name -> teamID (from skater tables)
  const skaters=[];
  h5.filter(h=>/SKATERS/i.test(h.textContent)).forEach(h=>{
    let e=h.nextElementSibling,tbl=null;
    while(e&&!/^H5$/.test(e.tagName)){if(e.tagName==="TABLE"){tbl=e;break;}if(e.querySelector&&e.querySelector("table")){tbl=e.querySelector("table");break;}e=e.nextElementSibling;}
    if(tbl)[...tbl.querySelectorAll("tr")].slice(1).forEach(row=>{const id=tidOf(row);if(id)skaters.push({id,text:txt(row)});});
  });
  const teamOfName=who=>{const s=skaters.find(sk=>sk.text.includes(who));return s?s.id:null;};
  // period-grouped section parser
  function section(h5el,stopEl){
    const items=[];let per="";
    btw(h5el,stopEl).forEach(el=>{
      const t=txt(el);
      // esportsdesk labels OT "OVERTIME PERIOD 1" (trailing OT number) rather
      // than plain "OVERTIME" / "OT1" — without the optional trailing digit
      // this never matched, so every OT goal/penalty silently kept whatever
      // period tag was last set (3rd), landing OT scoring under "3rd Period".
      // (Mat, 2026-07-04 — caught live: M. Roth's OT goal showing as 3rd.)
      if(/^(1ST|2ND|3RD|\dTH|OVERTIME|OT\d*|SHOOTOUT)(\s+PERIOD)?(\s*\d+)?$/i.test(t)&&!(el.querySelector&&el.querySelector("table"))){per=normP(t);return;}
      const tbl=(el.querySelector&&el.querySelector("table"))||(el.tagName==="TABLE"?el:null);
      if(tbl)[...tbl.querySelectorAll("tr")].forEach(r=>{const c=[...r.children].map(txt);if(c[0]&&!/No Penalties|No Scoring/i.test(c[0]))items.push({per,c});});
    });
    return items;
  }
  const ssH=findH(/SCORING SUMMARY/i),psH=findH(/PENALTY SUMMARY/i),skH=findH(/SKATERS/i);
  const goals=ssH?section(ssH,psH).map(o=>{const m=o.c[0].match(/^#?(\d+)\s+(.+?)\s*\((.*)\)\s*$/);
    const who=m?m[2].trim():o.c[0];const id=teamOfName(who);
    return {p:o.per,t:o.c[o.c.length-1]||"",no:m?+m[1]:"",who,a:m?m[3].trim():"",tag:(o.c[1]||"").replace(/G$/,"").trim(),teamID:id};}):[];
  // robust team match: the SCORING header may abbreviate (e.g. "Dunedin Thunder" vs the penalty's
  // "Dunedin Thunder Women") — compare normalised + contains, with a roster-name fallback.
  const normT=s=>String(s||"").toLowerCase().replace(/[^a-z]/g,"");
  const matchTeam=tn=>{const t=normT(tn);if(!t)return null;for(const T of [away,home]){const n=normT(T.name);if(n&&(t===n||t.includes(n)||n.includes(t)))return T.teamID;}return null;};
  const pens=psH?section(psH,skH).map(o=>{
    const cell=o.c[0];
    const tm=cell.match(/\(([^)]*)\)\s*$/);                      // team is ALWAYS in the trailing parens — incl. team penalties (no player/#)
    const pm=cell.match(/^#?(\d+)\s+(.+?)\s*\([^)]*\)\s*$/);     // player penalty = "#no name (team)"
    const who=pm?pm[2].trim():cell.replace(/\s*\([^)]*\)\s*$/,"").trim();  // else label minus (team), e.g. "Team Penalty"
    const id=matchTeam(tm?tm[1].trim():"") || (pm?teamOfName(who):null);   // parens-team match; fall back to roster lookup of the player
    return {p:o.per,t:o.c[o.c.length-1]||"",no:pm?+pm[1]:"",who,inf:o.c[1]||"",dur:o.c[2]||"",teamID:id};}):[];
  // status / date / time from full text
  const all=doc.body.textContent.replace(/\s+/g," ");
  let status="Live";const fm=all.match(/FINAL\s*\/?\s*(OT|SO)?/i);if(fm)status="Final"+(fm[1]?" / "+fm[1].toUpperCase():"");
  // how far the game has actually progressed — esportsdesk always prints all
  // regulation period headers (1/2/3) in the SCORING table up front, even
  // 11 minutes into the 1st, so we can't rely on pcols alone to know which
  // columns have real data yet. Pull the live "X:XX of the Nth period" /
  // "End of Nth period" clock text (or OT/Shootout wording) instead. Only
  // meaningful while status is "Live" — a Final game keeps every period it
  // actually played, OT/SO included. (Mat, 2026-07-04)
  let curPeriod=null;
  if(status==="Live"){
    const cpm=all.match(/of the (\d+)(?:st|nd|rd|th)\s*period/i) || all.match(/end of (?:the )?(\d+)(?:st|nd|rd|th)/i);
    if(cpm) curPeriod=cpm[1];
    else if(/overtime|(?:^|\s)OT\d*(?:\s|$)/i.test(all)) curPeriod="OT";
    else if(/shoot ?out/i.test(all)) curPeriod="SO";
  }
  let date="";const dm=all.match(/\b(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{1,2})(?:st|nd|rd|th)?,\s*(\d{4})/);
  if(dm){const d=new Date(+dm[3],MON.findIndex(x=>dm[1].startsWith(x)),+dm[2]);date=WD[d.getDay()]+" "+dm[2]+" "+MON[d.getMonth()]+" "+dm[3];}
  const tm=all.match(/\b(\d{1,2}):(\d{2})\s*([AP]M)\b/i);const time=tm?(tm[1]+":"+tm[2]+" "+tm[3].toUpperCase()):"";
  return {pcols,away,home,goals,pens,status,curPeriod,date:(date+(time?" · "+time:"")),teammap:{[away.teamID]:"away",[home.teamID]:"home"}};
}

// ---- render (v9 visuals) ----------------------------------------------
let LEAGUE_NAME="New Zealand Ice Hockey League", VENUE="";
function teamObj(p){const v=vis(p.teamID);return {teamID:p.teamID,name:p.name,code:v.code||p.code,ink:v.ink,dark:v.dark,logo:v.logo,sog:p.sog,pp:p.pp,pim:p.pim,line:p.line,tot:p.tot};}
function washVectors(a,h){document.getElementById("wash").style.background=
  `linear-gradient(90deg, ${a.dark} 0%, ${a.dark} 6%, transparent 42%),`+
  `linear-gradient(270deg, ${h.dark} 0%, ${h.dark} 6%, transparent 42%)`;}
function setLogo(el,t){if(t.logo){el.src=LOGO+encodeURIComponent(t.logo);el.style.visibility="";}else el.style.visibility="hidden";}
function goalEl(x,ink){const el=document.createElement("div");el.className="goal";
  const dispName=initSurname(properCase(x.who));
  el.innerHTML=`<span class="accent" style="background:${ink}"></span>
    <span class="shot"><span class="ini">${ini(x.who)}</span></span>
    <span class="gmain"><div class="gname"><span class="no">${x.no}</span><span class="nmt">${dispName}</span></div>
      <div class="gsub"><span class="gast">${fmtAssist(x.a)}</span>${x.tag?`<span class="gtag">${x.tag}</span>`:""}<span class="gtime">${x.t}</span></div></span>`;
  const shot=el.querySelector(".shot"),img=new Image();
  img.onload=()=>{shot.innerHTML="";shot.appendChild(img);shot.style.boxShadow=`0 0 0 2px ${ink}`;};img.src=shotURL(x.who);
  el.querySelector(".nmt").dataset.full=dispName;return el;}
function penEl(x,ink){const el=document.createElement("div");el.className="pen";
  const dispName=initSurname(properCase(x.who)), dispInf=properCase(x.inf);
  el.innerHTML=`<span class="accent" style="background:${ink}"></span>
    <span class="pwho"><div class="pname"><span class="no">${x.no||''}</span><span class="nmt">${dispName}</span></div>
      <div class="psub"><span class="pinf">${dispInf}</span><span class="ppim">${x.dur}</span><span class="ptime">${x.t}</span></div></span>`;
  el.querySelector(".nmt").dataset.full=dispName;return el;}
// Per-matchup accent overrides — when two teams' accents would clash (same hue), one swaps.
// Botany Swarm (674109) vs Canterbury Red Devils (675633): Swarm Rose #C2455A reads too close
// to Devil Red #E5242B, so Swarm reverts to Swarm Honey #F7AF28 for THIS matchup only. (Mat 2026-06-30)
function applyMatchupAccents(A,H){
  const ids=[A.teamID,H.teamID];
  if(ids.includes("674109") && ids.includes("675633")){ (A.teamID==="674109"?A:H).ink="#F7AF28"; }
}
// Merge "3rd Period" + "Overtime" into a single scoring column whenever a game
// actually reached OT, so the grid tops out at 4 columns (1st, 2nd, 3rd+OT,
// Penalty Summary) instead of 5. Uses the same sub-heading pattern the Penalty
// Summary column already uses to separate periods within one column. When
// there's no OT, 3rd stays its own column exactly like today. (Mat, 2026-07-06)
function buildColumnGroups(periods){
  const has=k=>periods.some(([kk])=>kk===k);
  const hasOT=has("OT"), has3=has("3");
  const groups=[];
  periods.forEach(entry=>{
    const [k]=entry;
    if(k==="OT" && hasOT && has3) return;  // folded into the "3" group below
    if(k==="3" && hasOT && has3){
      const otEntry=periods.find(([kk])=>kk==="OT");
      groups.push([entry, otEntry]);
      return;
    }
    groups.push([entry]);
  });
  return groups;
}
function render(P){
  const A=teamObj(P.away), H=teamObj(P.home);
  applyMatchupAccents(A,H);
  const INK={[A.teamID]:A.ink, [H.teamID]:H.ink};
  const inkOf=id=>INK[id]||vis(id).ink;
  washVectors(A,H);
  setLogo(document.getElementById("logoA"),A); setLogo(document.getElementById("logoB"),H);
  document.getElementById("nameA").textContent=A.name; document.getElementById("nameB").textContent=H.name;
  const rec=t=>`<span class="rl">Shots On Goal</span><span class="rv">${t.sog||"–"}</span>`+
    `<span class="rl">Power Plays</span><span class="rv">${t.pp||"–"}</span>`+
    `<span class="rl">Penalty Minutes</span><span class="rv">${t.pim||"–"}</span>`;
  document.getElementById("recA").innerHTML=rec(A); document.getElementById("recB").innerHTML=rec(H);
  document.getElementById("status").textContent=P.status;
  document.getElementById("date").textContent=P.date;
  document.getElementById("divider").innerHTML=`<span>${LEAGUE_NAME}</span>`+(VENUE?`<span class="sep">|</span><span>${VENUE}</span>`:"");
  const sA=document.getElementById("sA"),sB=document.getElementById("sB");
  sA.textContent=A.tot; sA.style.color=A.ink; sB.textContent=H.tot; sB.style.color=H.ink;
  const keys=P.pcols.length?P.pcols:["1","2","3"];
  // Total column dropped (Mat, 2026-07-06) — redundant with the big score
  // numbers already shown either side of this table.
  document.getElementById("pgrid").innerHTML="<tr><th></th>"+keys.map(k=>`<th>${k}</th>`).join("")+"</tr>"+
    [A,H].map(t=>`<tr><td class="lbl"><span class="chip" style="background:${t.ink}"></span>${t.code||""}</td>`+
      t.line.map(v=>`<td>${v}</td>`).join("")+`</tr>`).join("");
  // scoring columns = regulation/OT periods present in pcols, gated to what's
  // actually been played so far when the game is live (see curPeriod above) —
  // otherwise a game 11 minutes into the 1st already shows empty 2nd/3rd/OT
  // columns just because esportsdesk's header always lists them.
  let periods=PORDER.filter(([k])=>keys.includes(k));
  if(P.curPeriod){
    const ord=["1","2","3","OT","SO"], idx=ord.indexOf(P.curPeriod);
    if(idx>=0) periods=periods.filter(([k])=>ord.indexOf(k)<=idx);
  }
  const groups=buildColumnGroups(periods);
  const grid=document.getElementById("grid"); grid.innerHTML="";
  // Column widths: a scoring period/group with zero goals collapses to a slim
  // strip instead of a full 1fr column of empty "No Goals" space (Mat's call,
  // 2026-07-06) — the freed width goes to the columns that actually have
  // scoring in them. Penalty Summary is capped at 0.8fr — 80% of a full
  // scoring column — so it never visually competes with scoring (Mat's call,
  // same date).
  const groupHasGoals=g=>g.some(([k])=>P.goals.some(z=>z.p===k));
  const colFr=groups.map(g=>groupHasGoals(g)?1:0.2);
  grid.style.gridTemplateColumns = colFr.map(f=>f+"fr").join(" ") + " 0.8fr";
  grid.style.padding = groups.length===1 ? "0 180px" : "0";
  groups.forEach((group,i)=>{
    const collapsed = colFr[i]<1;
    const col=document.createElement("div");col.className="col"+(collapsed?" collapsed":"");
    const [,firstLabel]=group[0];
    col.innerHTML=`<h2>${collapsed?firstLabel+" - No Scoring":firstLabel}</h2>`;
    if(!collapsed){
      group.forEach(([k,label],idx)=>{
        if(idx>0){ const h=document.createElement("div");h.className="psubhd";h.textContent=label;col.appendChild(h); }
        const gs=P.goals.filter(z=>z.p===k);
        if(!gs.length){const e=document.createElement("div");e.className="gast";e.style.cssText="opacity:.4;text-align:center;padding:.5em 0";e.textContent="No Goals";col.appendChild(e);}
        gs.forEach(z=>col.appendChild(goalEl(z,inkOf(z.teamID))));
      });
    }
    grid.appendChild(col);
  });
  if(grid.lastElementChild) grid.lastElementChild.classList.add("pre-penalties");
  const pcol=document.createElement("div");pcol.className="col penalties";pcol.innerHTML=`<h2>Penalty Summary</h2>`;let any=false;
  periods.forEach(([k,label])=>{const ps=P.pens.filter(z=>z.p===k);if(!ps.length)return;any=true;
    const h=document.createElement("div");h.className="psubhd";h.textContent=label;pcol.appendChild(h);
    ps.forEach(z=>pcol.appendChild(penEl(z,inkOf(z.teamID))));});
  if(!any){const e=document.createElement("div");e.className="pinf";e.style.cssText="opacity:.4;text-align:center;padding:.5em 0";e.textContent="No penalties";pcol.appendChild(e);}
  grid.appendChild(pcol);
  layout(); requestAnimationFrame(layout);
  // Safari (and slow connections) can run this fit pass before the Inter webfont has
  // finished swapping in; fitCols() then measures against the bulkier fallback font and
  // locks in a too-small size that never gets recomputed. Re-run once webfonts settle.
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(layout);}
}
// cap defaults to 30 (penalty column, unchanged) — goal columns pass a bigger
// cap (see layout()) as part of "Bigger and Bolder". Still strictly bounded:
// `add` never exceeds `extra/rows.length`, and extra itself is the column's
// actual measured leftover space, so total padding added can never exceed
// what's really free — raising the cap only lets sparse periods use more of
// that already-available room, it can't manufacture overrun.
function fillHeight(col,cap=30){const rows=col.querySelectorAll(".goal, .pen");if(!rows.length)return;
  const extra=col.clientHeight-col.scrollHeight;if(extra<=2)return;const add=Math.min(extra/rows.length,cap);
  rows.forEach(r=>{const p=(parseFloat(getComputedStyle(r).paddingTop)||0)+add/2;r.style.paddingTop=p+"px";r.style.paddingBottom=p+"px";});}
function fitCols(cols,max){if(!cols.length)return;let lo=12,hi=max,best=12;
  for(let i=0;i<18;i++){const u=(lo+hi)/2;cols.forEach(c=>c.style.fontSize=u+"px");cols[0].getBoundingClientRect();
    const fits=cols.every(c=>c.scrollHeight<=c.clientHeight+0.5);if(fits){best=u;lo=u;}else{hi=u;}}cols.forEach(c=>c.style.fontSize=best+"px");}
function shrinkLine(line,target){if(!target)return;target.style.fontSize="";let fs=parseFloat(getComputedStyle(target).fontSize),g=60;
  while(target.scrollWidth>target.clientWidth+0.5&&fs>7&&g-->0){fs-=0.5;target.style.fontSize=fs+"px";}}
function fitText(){
  document.querySelectorAll(".gname, .pname").forEach(line=>{const sp=line.querySelector(".nmt");if(!sp)return;
    sp.style.fontSize="";sp.textContent=sp.dataset.full;if(line.scrollWidth>line.clientWidth)sp.textContent=nameInit(sp.dataset.full);
    let fs=parseFloat(getComputedStyle(sp).fontSize),g=60;while(line.scrollWidth>line.clientWidth+0.5&&fs>11&&g-->0){fs-=0.5;sp.style.fontSize=fs+"px";}});
  document.querySelectorAll(".gsub").forEach(l=>shrinkLine(l,l.querySelector(".gast")));
  document.querySelectorAll(".psub").forEach(l=>shrinkLine(l,l.querySelector(".pinf")));
}
function layout(){const grid=document.getElementById("grid");const cols=[...grid.querySelectorAll(".col")];
  const pcol=cols.find(c=>c.classList.contains("penalties"));const scoring=cols.filter(c=>c!==pcol);
  grid.querySelectorAll(".goal, .pen").forEach(r=>{r.style.paddingTop="";r.style.paddingBottom="";});
  // scoring columns get a higher font-size ceiling (42 vs the old 33) and a
  // bigger fillHeight cap (56 vs 30) as part of "Bigger and Bolder" — the
  // penalty column keeps the original caps so it stays visually subordinate
  // to scoring, per the earlier 80%-width call. fitCols' own binary search
  // still only accepts a size that fits (cols.every(...scrollHeight<=...)),
  // so a higher ceiling only helps sparse periods grow bigger; it can never
  // pick a size that overflows a busier one — same guarantee as before, just
  // a higher number to search up to.
  if(scoring.length)fitCols(scoring,42);if(pcol)fitCols([pcol],30);fitText();scoring.forEach(c=>fillHeight(c,56));if(pcol)fillHeight(pcol);}
function fitWindow(){document.getElementById("stage").style.transform="scale("+Math.min(innerWidth/1840,innerHeight/1000)+")";}
addEventListener("resize",fitWindow);
function showMsg(t){const m=document.getElementById("msg");m.style.display="flex";m.textContent=t;}
function hideMsg(){document.getElementById("msg").style.display="none";}

// ---- data flow ---------------------------------------------------------
async function getJSON(u){const r=await fetch(u,{cache:"no-store"});if(!r.ok)throw 0;return r.json();}
async function getText(u){const r=await fetch(SHIM(u),{cache:"no-store"});if(!r.ok)throw 0;return r.text();}
function boxURL(m,gid){return `https://admin.esportsdesk.com/leagues/hockey_boxscores.cfm?clientid=${m.clientid}&leagueid=${m.leagueid}&gameid=${gid}&printPage=1&_=${Date.now()}`;}

async function resolve(){
  const q=new URLSearchParams(location.search);
  const team=q.get("team"), g=q.get("g")||q.get("gameid");
  const leagueParam=(q.get("l")||q.get("league")||"").toLowerCase();
  if(g){ // direct game id
    const m=MANIFESTS.find(x=> q.get("w")==="1"||leagueParam.startsWith("nzw")||leagueParam==="w" ? x.league==="nzwihl" : x.league==="nzihl");
    return {m, gid:g, venue:"", leagueName:m.league==="nzwihl"?"New Zealand Women's Ice Hockey League":"New Zealand Ice Hockey League"};
  }
  // SAME selector as the scorebug: reuse the roster pipeline's boxscores.json (current round)
  // and pick THIS team's live/next game. Bare URL defaults to Red Devils.
  const slugTeam = slug(team || "canterbury-red-devils");
  // Fallback gameids for games the roster pipeline hasn't filled yet (manifest gameid=null) —
  // without this a team whose only current game has a null id resolves to "No game found".
  // Keyed "away|home|date"; self-clears once the pipeline publishes the id (gm.gameid wins).
  const KNOWN_GIDS = { "Botany Swarm|Pure NZ Admirals|2026-06-28": 2519938 };
  // LAST_GAME: per-team floor fallback = the gameid of the LAST game each team actually
  // PLAYED. Used only when the live manifests yield no candidate (team idle this round /
  // not in the current boxscores.json) so a slug NEVER resolves to "No game found".
  // Live/upcoming games from the manifests always win over this. UPDATE ONLY WHEN THE
  // ROSTER (round) CHANGES — set each entry to that team's most recent Final gameid.
  // Last updated 2026-06-30 (after 27–28 Jun round).
  const LAST_GAME = {
    // NZIHL men
    "botany-swarm":          {gid:2519938, league:"nzihl"},  // 28 Jun @ Pure NZ Admirals
    "canterbury-red-devils": {gid:2519940, league:"nzihl"},  // 28 Jun vs Dunedin Thunder
    "dunedin-thunder":       {gid:2519940, league:"nzihl"},  // 28 Jun @ Canterbury Red Devils
    "pure-nz-admirals":      {gid:2519938, league:"nzihl"},  // 28 Jun vs Botany Swarm
    "skycity-stampede":      {gid:2519934, league:"nzihl"},  // 20 Jun vs Dunedin Thunder
    // NZWIHL women
    "auckland-steel":        {gid:2520016, league:"nzwihl"}, // 21 Jun @ Canterbury Inferno
    "canterbury-inferno":    {gid:2520016, league:"nzwihl"}, // 21 Jun vs Auckland Steel
    "dunedin-thunder-women": {gid:2520018, league:"nzwihl"}, // 27 Jun @ Wakatipu Wild
    "wakatipu-wild":         {gid:2520018, league:"nzwihl"}, // 27 Jun vs Dunedin Thunder Women
  };
  const cands=[];
  for(const m of MANIFESTS){
    let data; try{ data=await getJSON(m.url);}catch(e){continue;}
    (data.games||[]).forEach(gm=>{
      const gid = gm.gameid || KNOWN_GIDS[[gm.away,gm.home,gm.date].join("|")] || null;
      if(!gid) return;
      if(slug(gm.away)!==slugTeam && slug(gm.home)!==slugTeam) return;
      cands.push({m, gm:{...gm, gameid:gid}, dt:new Date(gm.datetime||gm.date).getTime()||0}); });
  }
  if(!cands.length){
    const lg = LAST_GAME[slugTeam];
    if(lg){
      const m = MANIFESTS.find(x=>x.league===lg.league) || MANIFESTS[0];
      return {m, gid:lg.gid, venue:"", leagueName: m.league==="nzwihl"?"New Zealand Women's Ice Hockey League":"New Zealand Ice Hockey League"};
    }
    showMsg("No game found for “"+slugTeam+"”. Check the team slug, or that a game is scheduled."); return null;
  }
  const now=Date.now(), LIVE=5*3600*1000;                  // a game that started up to 5h ago still counts as "current"
  // A game only counts as "live" if it has actually started — otherwise a team's
  // NEXT scheduled game (still hours or a day away) satisfies `dt>=now-LIVE` too
  // (nothing excluded it just for being in the future) and gets shown as a live
  // 0-0 pregame shell instead of the real, already-finished game that should
  // still be on screen. (Mat, 2026-07-05 — caught between the Jul 4 OT game
  // and the Jul 5 rematch: the page jumped to Jul 5's empty pregame box score
  // and labelled it "Live" hours before puck drop.)
  const started=cands.filter(c=>c.dt<=now);
  const live=started.filter(c=>c.dt>=now-LIVE).sort((a,b)=>b.dt-a.dt);   // most recently started first
  const pick=live[0] || started.sort((a,b)=>b.dt-a.dt)[0] || cands.sort((a,b)=>a.dt-b.dt)[0];  // else the last completed game; else (nothing's started yet) the soonest upcoming
  const best=pick.gm, bestM=pick.m;
  return {m:bestM, gid:best.gameid, venue:best.venue||"", leagueName:bestM.league==="nzwihl"?"New Zealand Women's Ice Hockey League":"New Zealand Ice Hockey League"};
}

let TARGET=null, renderedOnce=false;
async function tick(){
  if(!TARGET) return;
  if(!WORKER){ showMsg("Live data endpoint not set. Deploy worker.js and paste its URL into summary.html (WORKER = …)."); return; }
  const dot=document.querySelector(".livedot"); const t0=Date.now();
  if(dot) dot.classList.add("scraping");          // flash ON while this scrape is in flight
  // First load only: the Worker does a live proxy+parse of the box score, which typically
  // takes several seconds. Without this the stage sits blank but for the corner dot, which
  // reads as "stuck." Subsequent ticks reuse already-rendered content, so no message needed.
  if(!renderedOnce) showMsg("Loading live box score…");
  try{
    const html=await getText(boxURL(TARGET.m,TARGET.gid));
    const P=parse(html);
    VENUE = TARGET.venue || vis(P.home.teamID).venue || "";
    LEAGUE_NAME = TARGET.leagueName;
    hideMsg(); render(P); renderedOnce=true; fitWindow();
  }catch(e){ if(!renderedOnce) showMsg("Couldn’t load the live box score — retrying…"); }
  finally{ if(dot){ const wait=Math.max(0,900-(Date.now()-t0)); setTimeout(()=>dot.classList.remove("scraping"),wait); } } // ensure ≥1 visible pulse, then OFF until next poll
}
async function start(){
  fitWindow();
  TARGET=await resolve();
  if(!TARGET) return;
  await tick();
  const t0=Date.now();
  const iv=setInterval(()=>{ if(Date.now()-t0>3.25*3600*1000){clearInterval(iv);return;} tick(); }, 15000);
}
start();
</script>
