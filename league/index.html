<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>League Page — NZ Hockey Broadcast Assets</title>
<meta name="description" content="League-only broadcast assets — standings, upcoming games, clubs, rosters and brand — for NZIHL or NZWIHL.">
<link rel="icon" id="favicon" href="data:,">
<style>
  @font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable.woff2') format('woff2');}
  @font-face{font-family:'Inter';font-style:italic;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable-Italic.woff2') format('woff2');}
  :root{
    --bg:#0a0b0d; --panel:#141619; --panel2:#1b1e22; --line:#2a2e34;
    --txt:#f3f4f6; --muted:#9aa3ad; --gold:#f7be11; --accent:#3aa0ff; --live:#2ecc71;
    --p1:#f7be11; --p2:#262a31; --p3:#262a31;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; background:var(--bg); color:var(--txt);
    font-family:Inter,-apple-system,"SF Pro Text",Segoe UI,Roboto,sans-serif;
    font-feature-settings:"ss01" 1,"ss02" 1; line-height:1.5; }
  a{ color:inherit; text-decoration:none; }
  .wrap{ max-width:860px; margin:0 auto; padding:0 16px; }

  /* Primary carries the wash; Secondary is a small, sparing accent tucked in
     one corner — not a co-equal colour. Tertiary is unused here on purpose. */
  .brand-wash{ position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(1100px 720px at 18% -10%, color-mix(in srgb, var(--p1) 34%, transparent), transparent 65%),
      radial-gradient(900px 620px at 100% 105%, color-mix(in srgb, var(--p1) 22%, transparent), transparent 62%),
      radial-gradient(420px 320px at 97% 3%, color-mix(in srgb, var(--p2) 16%, transparent), transparent 70%); }

  header.hero{ padding:32px 0 30px; border-bottom:1px solid var(--line); position:relative; overflow:hidden; }
  header.hero::before{ content:""; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(128deg, color-mix(in srgb, var(--p1) 62%, transparent) 0%,
      color-mix(in srgb, var(--p1) 38%, transparent) 45%,
      color-mix(in srgb, var(--p2) 20%, transparent) 78%, transparent 100%); }
  header.hero::after{ content:""; position:absolute; left:0; right:0; bottom:0; height:4px;
    background:linear-gradient(90deg, var(--p1) 0%, var(--p1) 60%, var(--p2) 85%, var(--p3) 100%); }
  .hero .wrap{ position:relative; }

  .idcard{ display:flex; align-items:center; gap:22px; flex-wrap:wrap; }
  .logo-plate{ width:148px; height:148px; border-radius:26px; flex:0 0 auto;
    background:color-mix(in srgb, var(--p1) 88%, #10131a 12%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 14px 34px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.10),
      0 0 0 2px color-mix(in srgb, var(--p2) 55%, transparent); }
  .logo-plate img{ width:104px; height:104px; object-fit:contain; filter:drop-shadow(0 3px 10px rgba(0,0,0,.55)); }
  .idcard h1{ font-size:clamp(26px,5vw,40px); font-weight:800; margin:0; }
  .idcard .lg-tag{ display:inline-flex; align-items:center; gap:6px; font-size:10.5px; font-weight:800;
    letter-spacing:.14em; text-transform:uppercase; color:var(--p2); margin-top:7px; }

  section{ padding:24px 0 4px; }
  .sec-head{ display:flex; align-items:center; gap:14px; margin-bottom:12px; }
  .sec-thumb{ width:88px; height:50px; object-fit:cover; border-radius:9px;
    border:1px solid var(--line); background:#000; flex:0 0 auto; }
  .sec-head .sec-txt{ min-width:0; }
  .sec-head h2{ font-size:15px; font-weight:800; margin:0; }
  .sec-head .sub{ font-size:12px; color:var(--muted); }
  .chip{ font-size:9.5px; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
    padding:3px 9px; border-radius:999px; display:inline-flex; align-items:center; gap:5px;
    border:1px solid rgba(46,204,113,.35); color:var(--live); background:rgba(46,204,113,.07); }
  .chip .dot{ width:6px; height:6px; border-radius:50%; background:var(--live); margin:0; animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(46,204,113,.45); } 50%{ box-shadow:0 0 0 5px rgba(46,204,113,0); } }

  .grid{ display:grid; gap:10px; grid-template-columns:repeat(2,1fr); }
  .grid3{ display:grid; gap:10px; grid-template-columns:repeat(3,1fr); }
  @media(max-width:560px){ .grid,.grid3{ grid-template-columns:1fr; } }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; }
  .card h3{ margin:0 0 4px; font-size:14px; font-weight:700; }
  .card p{ margin:0 0 10px; font-size:12px; color:var(--muted); }
  .card p:last-of-type{ margin-bottom:0; }
  .links{ display:flex; flex-wrap:wrap; gap:7px; margin-top:2px; }

  .btn{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
    padding:6px 11px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel2); color:var(--txt); cursor:pointer;
    transition:color .15s ease, border-color .15s ease, background .15s ease, box-shadow .22s ease, transform .15s ease; }
  .btn:hover{ transform:translateY(-1px); border-color:#3a3f47; }
  .dl:hover,.cp:hover{ border-color:rgba(247,190,17,.55); color:#fff; box-shadow:0 0 0 1px rgba(247,190,17,.28), 0 0 16px rgba(247,190,17,.20); }
  .ext:hover{ border-color:rgba(58,160,255,.55); color:#fff; box-shadow:0 0 0 1px rgba(58,160,255,.25), 0 0 16px rgba(58,160,255,.20); }
  .dl::before{ content:"↓"; } .ext::before{ content:"↗"; } .cp::before{ content:"⧉"; }
  .dl::before,.ext::before,.cp::before{ margin-right:5px; opacity:.6; font-size:10px; font-weight:700; }
  .copied{ color:var(--gold) !important; border-color:rgba(247,190,17,.6) !important; }
  .copied::before{ content:"✓" !important; opacity:1 !important; }

  .muted-note{ color:var(--muted); font-size:12px; margin:0; }

  .team{ display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:var(--panel); border:1px solid var(--line); border-radius:11px;
    padding:8px 12px 8px 8px; transition:border-color .15s, background .15s; }
  .team:hover{ border-color:#3a3f47; background:#17191d; }
  .team .idw{ display:flex; align-items:center; gap:9px; min-width:0; }
  .team .lg{ width:28px; height:28px; object-fit:contain; flex:0 0 auto; filter:drop-shadow(0 1px 3px rgba(0,0,0,.6)); }
  .team .nm{ font-size:13.5px; font-weight:600; }

  a.game{ display:block; }
  .game .day{ font-size:11px; font-weight:700; letter-spacing:.06em; color:var(--p2); text-transform:uppercase; }
  .game .match{ font-size:14px; font-weight:700; margin:4px 0 4px; display:flex; align-items:center; flex-wrap:wrap; gap:2px; }
  .game .match .mlg{ width:19px; height:19px; object-fit:contain; margin-right:5px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.6)); }
  .game .match span{ color:var(--muted); font-weight:600; padding:0 6px; }
  .game .meta{ font-size:11.5px; color:var(--muted); }
  .game .meta b{ color:var(--txt); font-weight:600; }

  .league-picker{ display:flex; align-items:center; gap:16px; padding:20px; }
  .league-picker img{ width:64px; height:64px; object-fit:contain; }
  .league-picker h3{ margin:0 0 4px; font-size:18px; font-weight:800; }
  .league-picker p{ margin:0; font-size:12.5px; color:var(--muted); }

  footer{ margin-top:26px; border-top:1px solid var(--line); padding:18px 0 40px; color:var(--muted); font-size:12.5px; }
  footer a{ color:var(--accent); }

  #toast{ position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(20px);
    background:#fff; color:#000; font-size:12.5px; font-weight:700; padding:9px 16px;
    border-radius:20px; opacity:0; pointer-events:none; transition:all .2s ease; z-index:30; }
  #toast.on{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<script src="../nav.js" data-root=".."></script>

<div class="brand-wash"></div>

<header class="hero">
  <div class="wrap">
    <div id="idcard" class="idcard"></div>
  </div>
</header>

<main class="wrap" id="main"></main>

<footer>
  <div class="wrap">
    Every asset on this page also lives on the <a href="../">full portal</a> — this is just the one-league view.
    <div style="margin-top:8px">Source repos:
      <a target="_blank" rel="noopener" href="https://github.com/matchavez/nzihl-broadcast-assets">nzihl-broadcast-assets</a> ·
      <a target="_blank" rel="noopener" href="https://github.com/matchavez/nzihl-broadcast-rosters">nzihl-broadcast-rosters</a> ·
      <a target="_blank" rel="noopener" href="https://github.com/matchavez/nzwihl-broadcast-rosters">nzwihl-broadcast-rosters</a>
    </div>
  </div>
</footer>

<div id="toast"></div>

<script>
const ASSETS = "https://matchavez.com/nzihl-broadcast-assets";
const enc = s => encodeURIComponent(s);

// Same club rosters as the main portal / team pages, split by league.
const NZIHL = [
  {nm:"Pure NZ Admirals", logo:"Pure-NZ-Admirals-2000x2000.png"},
  {nm:"Botany Swarm", logo:"Botany Swarm 2000x2000.png"},
  {nm:"SkyCity Stampede", logo:"Skycity Stampede 2000x2000.png"},
  {nm:"Dunedin Thunder", logo:"Dunedin_Thunder.png"},
  {nm:"Canterbury Red Devils", logo:"Red Devils 2000x2000r.png"},
  {nm:"Auckland Mako", logo:"Auckland Mako 2000x2000.png"},
];
const NZWIHL = [
  {nm:"Auckland Steel", logo:"Auckland-Steel-White.png"},
  {nm:"Canterbury Inferno", logo:"Inferno-White.png"},
  {nm:"Dunedin Thunder Women", logo:"thunder-women-white.png"},
  {nm:"Wakatipu Wild", logo:"Wakatipu-wild-white.png"},
];
[NZIHL, NZWIHL].forEach(a => a.sort((x,y) => x.nm.localeCompare(y.nm)));

// Primary is the official "League Black" from the Style & Colour Guide's
// League Marks entry (#000000 — the only colour actually IN the scheme; its
// pair is a white "Reverse", not a colour). Secondary is this site's own
// accent convention (gold = NZIHL, blue = NZWIHL — same as .chip.blue/
// .league-label.blue elsewhere on the portal), used sparingly since it isn't
// part of the official scheme — small corner glow + thin plate ring only,
// never the dominant wash colour. Tertiary just reuses black for depth.
const THEMES = {
  NZIHL:  { p1:"#000000", p2:"#F7BE11", p3:"#000000", logo:"NZIHL-White-2000.png",           roster:"nzihl-broadcast-rosters" },
  NZWIHL: { p1:"#000000", p2:"#3AA0FF", p3:"#000000", logo:"NZWIHL-Logo-White-1000px.png",   roster:"nzwihl-broadcast-rosters" },
};

const slug = nm => nm.toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
const logoUrl = t => `${ASSETS}/assets/logos/${enc(t.logo)}`;
const leagueLogoUrl = key => `${ASSETS}/assets/league/${enc(THEMES[key].logo)}`;

const params = new URLSearchParams(location.search);
const wantKey = (params.get('league') || '').toUpperCase().trim();
const league = THEMES[wantKey] ? wantKey : null;

const toast = document.getElementById('toast');
function flash(msg){ toast.textContent = msg; toast.classList.add('on');
  clearTimeout(flash._t); flash._t = setTimeout(()=>toast.classList.remove('on'),1200); }
function copiedFx(b){ if(!b._label) b._label = b.textContent; b.textContent = 'Copied'; b.classList.add('copied');
  clearTimeout(b._t); b._t = setTimeout(()=>{ b.textContent = b._label; b.classList.remove('copied'); },1200); }
document.addEventListener('click', e=>{
  const b = e.target.closest('[data-copy]'); if(!b) return;
  const txt = b.getAttribute('data-copy');
  (navigator.clipboard?.writeText(txt) ?? Promise.reject()).then(()=>{ flash('Copied URL'); copiedFx(b); }).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select();
    try{document.execCommand('copy');}catch(_){} ta.remove(); flash('Copied URL'); copiedFx(b);
  });
});

if(!league){
  // ---- LEAGUE PICKER — no (or unrecognised) ?league= given ----
  document.title = "Choose a League — NZ Hockey Broadcast Assets";
  document.getElementById('idcard').innerHTML = `
    <div>
      <h1 style="font-size:clamp(24px,4.4vw,36px);font-weight:800;margin:0">Choose your league</h1>
      <div style="color:var(--muted);font-size:13.5px;margin-top:6px;max-width:520px">
        League-wide standings, fixtures, clubs and brand — pick a league below, or bookmark its
        <code style="background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px">?league=</code> URL for next time.
      </div>
    </div>`;
  const card = key => `<a class="card league-picker" href="?league=${key.toLowerCase()}">
    <img src="${leagueLogoUrl(key)}" alt="">
    <div><h3>${key}</h3><p>${key === 'NZIHL' ? NZIHL.length : NZWIHL.length} clubs · 2026 season</p></div>
  </a>`;
  document.getElementById('main').innerHTML = `
    <section><div class="grid">${card('NZIHL')}${card('NZWIHL')}</div></section>`;
}else{
  // ---- SINGLE-LEAGUE VIEW ----
  const th = THEMES[league];
  const clubs = league === 'NZIHL' ? NZIHL : NZWIHL;
  document.documentElement.style.setProperty('--p1', th.p1);
  document.documentElement.style.setProperty('--p2', th.p2);
  document.documentElement.style.setProperty('--p3', th.p3);
  document.title = `${league} — NZ Hockey Broadcast Assets`;
  document.getElementById('favicon').href = `${ASSETS}/assets/league/${league}-icon.png`;

  document.getElementById('idcard').innerHTML = `
    <div class="logo-plate"><img src="${leagueLogoUrl(league)}" alt=""></div>
    <div>
      <h1>${league}</h1>
      <div class="lg-tag">2026 Season · ${clubs.length} Clubs</div>
    </div>`;

  const standPng  = `${ASSETS}/${league}_Standings.png`;
  const stand1840 = `${ASSETS}/${league}_Standings_1840x1000.png`;
  const teamCard = t => `<a class="team" href="../team/?team=${slug(t.nm)}"><span class="idw">
    <img class="lg" loading="lazy" src="${logoUrl(t)}" alt=""><span class="nm">${t.nm}</span></span></a>`;

  document.getElementById('main').innerHTML = `
    <section>
      <div class="sec-head"><img class="sec-thumb" src="https://matchavez.com/nzihl-broadcast-assets/thumbs/standings.png" alt=""><span class="sec-txt"><h2>Standings <span class="chip"><span class="dot"></span>Auto</span></h2><span class="sub">Rebuilt nightly · 1920×1080 PNG</span></span></div>
      <div class="card" style="padding:10px">
        <a target="_blank" rel="noopener" href="${standPng}"><img src="${standPng}?v=${Date.now()}" alt="${league} standings" style="display:block;width:100%;border-radius:10px;background:#000"></a>
        <div class="links" style="margin-top:10px">
          <a class="btn cp" data-copy="${standPng}">1920×1080</a>
          <a class="btn cp" data-copy="${stand1840}">1840×1000</a>
        </div>
      </div>
    </section>

    <section>
      <div class="sec-head"><img class="sec-thumb" src="https://matchavez.com/nzihl-broadcast-assets/thumbs/live_game_summary.png" alt=""><span class="sec-txt"><h2>This Weekend <span class="chip"><span class="dot"></span>Auto</span></h2><span class="sub">Resolved from the roster pipeline</span></span></div>
      <div id="games-grid" class="grid"><p class="muted-note">Loading fixtures…</p></div>
    </section>

    <section>
      <div class="sec-head"><img class="sec-thumb" src="https://matchavez.com/nzihl-broadcast-assets/thumbs/logos.png" alt=""><span class="sec-txt"><h2>Clubs</h2><span class="sub">Every ${league} team page, in order</span></span></div>
      <div class="grid3">${clubs.map(teamCard).join('')}</div>
    </section>

    <section>
      <div class="sec-head"><img class="sec-thumb" src="https://matchavez.com/nzihl-broadcast-assets/thumbs/rosters.png" alt=""><span class="sec-txt"><h2>Rosters</h2><span class="sub">Game-day fixture PDFs for ${league}</span></span></div>
      <div class="card">
        <p>Talent-facing roster downloads for every ${league} fixture.</p>
        <div class="links">
          <a class="btn ext" target="_blank" rel="noopener" href="https://matchavez.com/hockeyrosters/">Roster Portal</a>
          <a class="btn ext" target="_blank" rel="noopener" href="https://github.com/matchavez/${th.roster}/releases">All releases</a>
        </div>
      </div>
    </section>

    <section>
      <div class="sec-head"><img class="sec-thumb" src="https://matchavez.com/nzihl-broadcast-assets/thumbs/brand.png" alt=""><span class="sec-txt"><h2>Brand</h2><span class="sub">League mark &amp; full colour guide</span></span></div>
      <div class="grid">
        <div class="card"><h3>League Mark</h3><p>White ${league} logo, high-res PNG.</p>
          <div class="links"><a class="btn dl" href="${leagueLogoUrl(league)}">PNG</a></div></div>
        <div class="card"><h3>Full brand guide</h3><p>All-club palettes, logo plates, usage rules.</p>
          <div class="links">
            <a class="btn ext" target="_blank" rel="noopener" href="https://matchavez.com/nzihl-broadcast-assets/2026-nzihl-nzwihl-style-guide.html">Style Guide</a>
            <a class="btn ext" target="_blank" rel="noopener" href="https://matchavez.com/nzihl-broadcast-assets/2026-nzihl-nzwihl-hex-cheat-sheet.html">Hex Sheet</a>
          </div></div>
      </div>
    </section>`;

  // This Weekend — league-scoped fixtures from this league's own roster-pipeline
  // manifest (same boxscores.json the main portal merges across both leagues).
  (async function loadGames(){
    const el = document.getElementById('games-grid');
    const logoOf = name => { const t = clubs.find(t=>t.nm===name); return t ? logoUrl(t) : null; };
    const mlg = name => { const u = logoOf(name); return u ? `<img class="mlg" loading="lazy" src="${u}" alt="">` : ''; };
    try{
      const r = await fetch(`https://raw.githubusercontent.com/matchavez/${th.roster}/main/boxscores.json`, {cache:"no-store"});
      if(!r.ok) throw new Error(String(r.status));
      const data = await r.json();
      const games = Array.isArray(data.games) ? data.games : [];
      const nzTodayISO = () => new Date().toLocaleDateString('en-CA', {timeZone:'Pacific/Auckland'});
      const daysPast = (isoDate, todayISO) =>
        Math.round((new Date(todayISO+'T00:00:00Z') - new Date((isoDate||'').slice(0,10)+'T00:00:00Z')) / 86400000);
      const todayISO = nzTodayISO();
      const fresh = games.filter(g => g.in_core_window !== false && daysPast(g.date || g.datetime, todayISO) <= 3);
      if(!fresh.length){ el.innerHTML = `<div class="card" style="opacity:.55"><p class="muted-note" style="margin:0">No games this weekend — check back closer to the next fixture.</p></div>`; return; }
      fresh.sort((a,b) => String(a.datetime||a.date).localeCompare(String(b.datetime||b.date)));
      const fmt = g => { try{ return new Date(g.datetime).toLocaleDateString('en-NZ',
        {weekday:'short',day:'numeric',month:'short',timeZone:'Pacific/Auckland'}); } catch(_){ return g.date; } };
      el.innerHTML = fresh.map(g => {
        const gid = g.gameid;
        const wparam = league === 'NZWIHL' ? '&w=1' : '';
        const url = gid ? `../summary/?g=${gid}${wparam}` : null;
        const inner = `<div class="day">${fmt(g)}${g.time ? ' · ' + g.time : ''}</div>
          <div class="match">${mlg(g.away)}${g.away} <span>@</span> ${mlg(g.home)}${g.home}</div>
          <div class="meta"><b>${g.venue||''}</b>${gid ? ' · Game summary →' : ' · game summary TBC'}</div>`;
        return url
          ? `<a class="game card" target="_blank" rel="noopener" href="${url}">${inner}</a>`
          : `<div class="game card" style="opacity:.55">${inner}</div>`;
      }).join('');
    }catch(e){
      el.innerHTML = `<p class="muted-note">Couldn't load live fixtures — check the <a style="color:var(--accent)" target="_blank" rel="noopener" href="../">portal</a>.</p>`;
    }
  })();
}
</script>
</body>
</html>
