<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="utf-8">
<title>NZIHL — Combined Starting Lineups</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url('../../assets/fonts/InterVariable.woff2') format('woff2');}
/* ============================================================
   NZIHL / NZWIHL — COMBINED STARTING LINEUPS broadcast graphic.
   URL: hockey/startinglineup/combined/?home=<slug>&away=<slug>
        (evergreen, no game dependency — polls both teams' existing
        /lineup/<slug> worker channels, same ones the per-team page and
        control/ already read/write. No control-page or worker changes.)

   2026-07-14: also accepts a SINGLE evergreen slug, ?team=<slug> — same
   convention as activity-banner/ticker/lowerthirds' ?team= URLs. Resolves
   this team's next scheduled fixture from nzihl-season-data's `upcoming`
   field (whole season, no lookahead cap) and derives home/away from that
   fixture, so ONE bookmarked URL per team keeps showing the correct
   opponent as the schedule advances game to game — no manual URL editing
   between games, matching Activity Banner's "game-appropriate graphic"
   behavior. ?home=&away= still work exactly as before (used by the
   portal's schedule-driven per-fixture links) and take priority if given.
   See resolveTeamSlug() below.

   1840x1000 opaque panel centered in a transparent 1920x1080 browser
   source (same convention as startinglineup/ and summary/). Full
   landscape rink drawn in SVG across the whole ice area — home defends
   the left end, away the right. Twelve compact cards, 1-2-3-3-2-1
   reading left to right: home GK / home LD+RD / home LF+CF+RF /
   away LF+CF+RF / away LD+RD / away GK.

   Card layout is a straightforward mirror: home's 3 columns (GK / D /
   F, each column stacked vertically) sit in the left half, away's
   mirror image sits in the right half. See memory.md /
   nzihl_combined_lineups.md for the full position-derivation history.

   2026-07-14: cards were briefly restored to the single-team page's exact
   520x120 size (six rows, one per slot). Then resized again per Mat's ask
   -- 25% taller, 40% narrower (520x120 -> 312x150), headshot kept SQUARE
   at the new height (150x150, was 120x120), names now routinely stack to
   2 lines given the much narrower text column. At 312 wide, 4 cards can
   no longer occupy one row edge-to-edge across 1840px width the way the
   520-wide layout could still (barely) avoid, but 2-per-row DOES fit, so
   this reverted to a 3-Y-band scheme (like the very first compact-card
   layout): "top"/"mid"/"bottom" bands at cy = 136, 436, 736, each shared
   by exactly 2 cards per side via X-separation (LD+LF share "top",
   GK+CF share "mid", RD+RF share "bottom" -- reads D-F ... F-D per band,
   GK-F ... F-GK for the middle band). Column X (home, left-edge): GK=20,
   D=110, F=550. Away mirrors via away_left = 1528 - home_left
   (1528 = 1840 - CARD_W). Gaps between every same-row pair are
   116-218px, well clear.
   ============================================================ */
html,body{margin:0;padding:0;background:transparent;overflow:hidden;
  font-family:Inter,-apple-system,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;}
#frame{position:absolute;top:0;left:0;width:1920px;height:1080px;transform-origin:0 0;
  background:transparent;pointer-events:none;}

#panel{position:absolute;left:40px;top:40px;width:1840px;height:1000px;
  border-radius:26px 26px 96px 96px;overflow:hidden;
  box-shadow:0 24px 70px rgba(0,0,0,.55);
  opacity:0;transform:translateY(26px);}
#panel.show{animation:panelIn .55s cubic-bezier(.22,.9,.3,1) forwards;}
@keyframes panelIn{to{opacity:1;transform:translateY(0);}}

/* ---------- header (split home | title | away) ----------
   2026-07-14: reworked to echo the "Up Next" overlay's look (Graphics/Up Next
   Overlay/overlay.py) per Mat's ask for visual continuity across the estate.
   Team-name/logo/title POSITIONS are unchanged from before -- only the
   background treatment changed:
     - the flat vertical 50/50 split became an ANGLED seam, same slope the
       Up Next overlay uses for its team-colour clash (-0.3671, i.e. the
       same italic angle as the league wordmark's "I") -- built via two
       full-width clip-path polygons that share one seam line, rather than
       two flex boxes, so the seam can run on a diagonal at all.
     - Up Next paints a thin team-accent stripe along the TOP edge of its
       two-team band; Mat asked for that same stripe here but at the BOTTOM
       of the headline (the ice boundary) instead of the top of the frame --
       .hdrAccent.home/.away, 5px, clipped to the identical seam line.
     - Up Next's centred league-mark gets a soft white glow behind it; the
       league mark is dropped here in favour of "STARTING LINEUPS" text, but
       that same white glow now sits behind the text (layered text-shadow).
   Seam geometry (px, header-local: x=0..1840, y=0..128):
     seamX(y) = 920 + (-0.3671)*(y-64)  ->  top x=943.49, bottom x=896.51. */
#hdr{position:absolute;left:0;top:0;right:0;height:128px;overflow:hidden;}
.hdrHalf{position:absolute;left:0;top:0;width:1840px;height:128px;min-width:0;
  box-sizing:border-box;display:flex;align-items:center;gap:18px;}
/* 2026-07-14: seam straightened to a plain vertical line at x=920 (dead
   center of the 1840px panel) -- the angled -0.3671 slope only worked
   visually on the Up Next overlay because of the NZIHL mark's lean sitting
   on top of it; without that mark here the angle just looked off. Padding
   bumped 32->52px on both sides (name/logo nudged inward) for balance
   against the now-straight seam and its blur zone (#hdrSeamBlur, below).
   2026-07-15: padding bumped again, 52->92px, per Mat's ask for the
   logo/name group to sit a little more centred. */
.hdrHalf.home{padding-left:92px;justify-content:flex-start;
  clip-path:polygon(0 0, 920px 0, 920px 100%, 0 100%);}
.hdrHalf.away{padding-right:92px;justify-content:flex-end;
  clip-path:polygon(920px 0, 100% 0, 100% 100%, 920px 100%);}
/* ^ 2026-07-14 fix: .hdrHalf didn't set box-sizing, so it defaulted to
   content-box -- width:1840px was the CONTENT box, and padding-right
   added 32px OUTSIDE it (border-box ballooned to 1872px). flex-end
   alignment (and the clip-path's "100%" keyword) both resolve against
   that box, so the away side's content aligned flush to x=1840 (the
   padding sat off in the void past the panel edge) while the home side's
   padding-left correctly inset flex-start content -- that asymmetry was
   the "right logo hangs" bug. border-box makes width:1840px the OUTER
   edge (padding included, matching the home side's effective behaviour),
   so both sides now inset by the same 32px from the panel edge.
   ^ 2026-07-14 also: team names switched from a single line to the same
   two-line treatment as the Up Next overlay (city/league line white,
   club-name line in the team's colour) -- these are hardcoded per team
   in TEAMS[...].lines, copied verbatim from Up Next Overlay/overlay.py's
   own TEAMS registry so the wording/line-breaks match exactly (e.g.
   "Dunedin Thunder Women" -> DUNEDIN / THUNDER, dropping "Women", same
   as the overlay). */
/* 2026-07-15: logo +8% (72->78px) per Mat's ask.
   2026-07-16: +~15% again (78->90px) per Mat's "all team logos" ask --
   still fits comfortably inside the 128px header height (centered via
   .hdrHalf's flex align-items), no other layout changes needed. */
.hdrLogo{width:90px;height:90px;object-fit:contain;flex:0 0 auto;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.45));}
/* 2026-07-15: text treatment corrected to REPLICATE overlay.py's
   make_text_sprite(), not approximate it -- font-weight 700 (was 800,
   overlay.py loads Inter at NAME_WEIGHT=700), letter-spacing ~0.04em
   (overlay.py's tracking=2px at a ~53.6px cap-height-39 em size -> 2/53.6,
   was .08em, over-tracked), and -webkit-text-stroke added -- overlay.py's
   make_text_sprite() draws every character with stroke_w=3 (a real
   outline), which the previous pass dropped entirely. Stroke colour is
   black (INK #08080A) by default, matching overlay.py's default
   stroke_fill; per-team stroke2 overrides (white, for stampede/wild --
   their hdrLine2 is a dark navy that a black outline would swallow) are
   applied to line 2 only via JS, exactly like overlay.py's stroke2. */
.hdrTeam{display:flex;flex-direction:column;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:480px;line-height:1.12;}
.hdrHalf.away .hdrTeam{text-align:right;align-items:flex-end;}
/* 2026-07-15: name +8% (33->36px) per Mat's ask, alongside the logo bump. */
.hdrTeamL1{font-size:36px;color:#fff;-webkit-text-stroke:2px #08080A;paint-order:stroke fill;}
.hdrTeamL2{font-size:36px;-webkit-text-stroke:2px #08080A;paint-order:stroke fill;}
.hdrAccent{position:absolute;left:0;top:123px;width:1840px;height:5px;z-index:1;}
.hdrAccent.home{clip-path:polygon(0 0, 920px 0, 920px 100%, 0 100%);}
.hdrAccent.away{clip-path:polygon(920px 0, 100% 0, 100% 100%, 920px 100%);}
/* 2026-07-14: soften the now-straight seam so the two team-colour halves
   don't meet on an abrupt hard edge -- a transparent strip straddling the
   seam (x=880..960, i.e. 40px either side of x=920) with backdrop-filter
   blur, so it blurs whatever's rendered behind it (the two solid-colour
   .hdrHalf backgrounds) rather than blurring its own (nonexistent)
   content. History: 2026-07-15 this box was briefly widened to ALSO cover
   .hdrAccent (same element, taller z-index, moved in the DOM) -- rolled
   back, then briefly restored, then rolled back again 2026-07-16 because
   sharing one blur box between the two backgrounds AND the 5px accent
   stripe was the wrong model: the stripe is a different colour pair
   (hdrAccent, e.g. red/yellow) at a different height than the halves
   (dark gradient, e.g. maroon/navy), and Mat confirmed THIS box's result
   on the halves already looks right on its own -- don't touch it. The
   accent stripe now gets its OWN separate blur box, scoped to just its
   5px band, immediately below. This box stays exactly as-is: full 128px
   header height, blurs only what's visually behind it before .hdrAccent
   and #hdrAccentBlur paint on top (both z-index:1, later in the DOM). */
#hdrSeamBlur{position:absolute;left:880px;top:0;width:80px;height:128px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);pointer-events:none;}
/* 2026-07-16: the accent stripe (.hdrAccent, 5px tall at y=123..128) needs
   its own independent blur, separate from #hdrSeamBlur above -- it's a
   different colour pair (team accent colours, not the dark gradient
   halves) so blending it into the same blur box either left it untouched
   (when #hdrSeamBlur excluded it) or over-blurred the good background
   result trying to also cover it (when the two were merged). This box is
   scoped to exactly the accent stripe's own bounds -- same 80px width (40
   either side of the x=920 seam) as #hdrSeamBlur, but only 5px tall,
   top:123px -- so it can't bleed into or affect the halves' blur at all.
   Sits after .hdrAccent in the DOM with the same z-index:1, so it paints
   on top and blurs the stripe's own hard colour split; still below
   #hdrTitle (z-index:2). Blur radius 20px->32px per Mat's ask for a
   smoother transition -- #hdrSeamBlur's radius is untouched (20px), this
   bump is scoped to the accent stripe only. 2026-07-16: box widened 40px
   in BOTH directions (80px->160px total, i.e. 80px either side of x=920,
   was 40px either side) per Mat's ask, chasing more smoothness the same
   way -- left 880->840, width 80->160, right edge 960->1000. Still only
   5px tall/top:123px (unchanged) and still fully independent of
   #hdrSeamBlur, whose width (80px, 40 either side) is untouched.
   2026-07-16 (later): Mat still saw a jarring transition on the yellows
   after the widen -- widening the box wasn't the fix, so this time
   LOWERING the radius instead: 32px->16px. Box footprint (840px/160px)
   left as-is. Yellow is the highest-luminance accent colour in the
   registry (SkyCity Stampede / Wakatipu Wild both use #FAC805), so a
   too-strong blur likely blew out/haloed against it worse than the
   darker accents -- a gentler radius should read as a smooth fade
   without that blown-out look.
   2026-07-16 (later still): Mat screenshotted the actual problem -- it was
   never the CENTRE seam (x=920, which now reads smooth); it's the box's
   own LEFT/RIGHT edges (x=840 and x=1000) where #hdrAccentBlur's backdrop-
   filter cuts off. Inside the box the colour blurs smoothly, but the box
   boundary itself is a hard rectangular clip -- outside it the stripe is
   perfectly sharp .hdrAccent colour, so the box edge reads as its own
   thin seam (worse against yellow, the highest-luminance accent). No
   amount of radius/width tuning fixes an inherently hard clip -- the
   right tool is a mask that FEATHERS the box's own edges, so the blur
   itself fades to nothing right at the boundary instead of cutting off.
   mask-image: 15%/85% stops -> ~24px feather zone on each side of the
   160px box (roomier than the 16px blur radius, so the fade-out finishes
   before the hard edge). */
#hdrAccentBlur{position:absolute;left:840px;top:123px;width:160px;height:5px;z-index:1;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  mask-image:linear-gradient(to right,transparent 0%,black 15%,black 85%,transparent 100%);
  -webkit-mask-image:linear-gradient(to right,transparent 0%,black 15%,black 85%,transparent 100%);
  pointer-events:none;}
/* font-weight 700 (was 600), font-size 50px (was 48px, ~+5%) per Mat's
   2026-07-14 ask.
   2026-07-15: anchor shifted from dead-centre (50%) to 50% - 23px. Mat
   asked for the SPACE between "STARTING" and "LINEUPS" to land on the
   seam (x=920), not the text block's own centre -- since the two words
   render at different widths in Inter 700/50px/.1875em tracking (measured
   live: STARTING=318.45px, LINEUPS=272.46px, space=20.09px), naive dead-
   centre anchoring put the gap ~23px right of the seam (the wider word
   "pushes" the middle rightward). -23px on the anchor corrects this
   exactly: (920-23) - halfTotalWidth for the left edge, halfTotalWidth for
   the right edge, puts the gap's own midpoint at x≈920.0. If either word
   is ever changed, re-derive this constant (see comment) rather than
   guessing.
   2026-07-16: five manual nudges applied on top of the derived -23px
   value chasing "move it right" asks (-23->-20->-18->-16->-13->-14px,
   net +9px right) -- REVERTED same day once a screenshot with an actual
   measurement guide showed the gap had drifted 9px off the true seam
   (the guide line landed exactly on the rink's centre-ice line at x=920,
   confirming -23px was right all along and the nudges were chasing a
   stale/cached render). Back to -23px, the mathematically-derived value
   from the measurement above -- do not nudge this further without a
   fresh live measurement (not a cached screenshot) confirming drift.
   2026-07-16 (live-verified): confirmed on the live page via the Range
   API (not a screenshot) that -23px puts the gap's midpoint at x=919.99
   of 1840 -- i.e. exactly centred on the seam, sub-pixel accurate.
   2026-07-16 (captain's call): Mat asked to move it 6px right anyway as
   a deliberate stylistic choice, not a correction -- anchor -23px ->
   -17px. This is now off-centre from the seam ON PURPOSE; don't
   "re-centre" it back to -23px without checking with Mat first. */
#hdrTitle{position:absolute;left:calc(50% - 17px);top:50%;transform:translate(-50%,-50%);
  font-size:50px;font-weight:700;letter-spacing:.1875em;color:#fff;white-space:nowrap;
  text-shadow:0 0 8px rgba(255,255,255,.9),0 0 22px rgba(255,255,255,.65),
    0 0 46px rgba(255,255,255,.4),0 2px 12px rgba(0,0,0,.65);
  z-index:2;pointer-events:none;}

/* ---------- ice ---------- */
#ice{position:absolute;left:0;top:128px;right:0;bottom:0;
  background:linear-gradient(180deg,#d0dee9 0%,#dce8f0 40%,#c8d9e6 100%);}
#rink{position:absolute;inset:0;width:100%;height:100%;}

/* ---------- player cards — history: 520x120 (single-team match) -> 312x150
   (25% taller/40% narrower) -> 390x135 (10% shorter/25% wider) -> briefly
   410x135 (2026-07-15, ~5% wider) -> rescinded same day back to 390x135
   (see .card rule below and the slot-position comment further down for
   current X values). Photo stays a fixed 108x135 (4:5) regardless of
   total card width. Slot grid is a straightforward 4-col x 3-row layout:
   inner column (GK/D, x=20 home / x=1430 away) and outer column (F/CF,
   x=500 home / x=950 away) at three Y-bands (top=118.5 LD/68.5 LF,
   mid=368.5 GK+CF, bottom=618.5 RD/668.5 RF) -- tightest gap is the two
   CF cards at centre ice, ~60px clear (D/F pillars touch with zero gap,
   by design, see the LD/RD comment below). Mat flagged this as
   transitional ("we'll
   reposition next") so this reflow is the minimum needed to keep all 12
   cards on-panel with no overlap, not a final layout pass. ---------- */
/* 2026-07-15: width bumped 390->410 (~5%) then RESCINDED same day back to
   390 per Mat's ask. GK/LF/CF/RF positions are untouched either way (home
   anchors left, away anchors right, so width alone never moved them).
   LD/RD DO move when width changes though, since their "touch F's inner
   edge with zero gap" invariant (see the slot-position comment below) is
   defined in terms of the edge closest to F -- for home that's the D
   pill's RIGHT edge (left+width), which depends on width, so reverting
   width back to 390 pushes LD/RD's `left` back out to 110 (was 90 at
   width 410, 75 before that). Away's touch-point is D's LEFT edge, which
   doesn't depend on width at all, so away LD/RD stayed at 1340 through
   both width changes. */
.card{position:absolute;width:390px;height:135px;border-radius:18px;display:flex;
  align-items:stretch;overflow:hidden;box-shadow:0 42px 102px rgba(8,12,20,.93);
  opacity:0;transform:scale(.86);}
.card.show{animation:cardIn .5s ease-out forwards;}
@keyframes cardIn{
  0%{opacity:0;transform:scale(.86);}
  55%{opacity:1;transform:scale(1.06);}
  78%{transform:scale(.97);}
  100%{opacity:1;transform:scale(1);}
}
/* .shown = static visible state for post-reveal swaps (opacity is NOT part of
   the pulse animation, so it must come from the class, not `forwards`) */
.card.shown{opacity:1;transform:scale(1);}
.card.pulse{animation:cardPulse .45s ease;}
@keyframes cardPulse{0%{transform:scale(1);}40%{transform:scale(1.045);}100%{transform:scale(1);}}
/* 2026-07-14: photo narrowed from square (135x135) to a 4:5 ratio
   (108x135, height unchanged) per Mat's ask for more text room -- pill
   overall size (390x135) is untouched, cbody just gains the freed 27px.
   This shifts the photo/cbody border left by 27px. */
.cphoto{flex:0 0 auto;width:108px;height:135px;position:relative;overflow:hidden;
  background:#1b2029;}
.cphoto img.head{width:100%;height:100%;object-fit:cover;object-position:50% 18%;display:block;}
.cphoto .crest{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
/* 2026-07-16: crest (team-logo headshot fallback) +~15% per Mat's "all
   team logos" ask -- 72%->83% of the 108x135 photo box, still centered
   and well clear of the box edges. */
.cphoto .crest img{max-width:83%;max-height:83%;object-fit:contain;}
.cphoto .sil{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.cphoto .sil svg{width:66%;height:66%;opacity:.4;}
/* 2026-07-14: away cards mirror photo-then-text to text-then-photo (photo
   on the right) via row-reverse; the coloured accent border moves from
   cbody's left edge to its right edge to match (both sides declared here
   as transparent, JS picks which one gets the team colour -- see
   renderSlot()'s borderSide). */
.card[id^="slot_away_"]{flex-direction:row-reverse;}
.cbody{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;justify-content:center;
  padding:0 14px;border-left:4px solid transparent;border-right:4px solid transparent;}
.cnameline{white-space:normal;overflow-wrap:break-word;word-break:normal;line-height:1.08;}
.cname{font-size:31.5px;font-weight:800;color:#fff;letter-spacing:.005em;}
.cmetaline{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:6px;}
.cnum{font-size:23.4px;font-weight:800;}
.crole{font-size:19.8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,255,255,.62);}
.cflag{font-size:12.6px;font-weight:800;letter-spacing:.02em;color:#0c1420;background:#f1f5f9;
  border-radius:999px;padding:2px 8px;line-height:1.3;box-shadow:0 3px 8px rgba(0,0,0,.5);}
.card.empty .cbody{opacity:.75;}
.card.empty .cname{color:rgba(255,255,255,.5);}
</style>
</head>
<body>
<div id="frame">
  <div id="panel">
    <div id="hdr">
      <div class="hdrHalf home">
        <img class="hdrLogo" id="hdrLogoHome" alt="">
        <div class="hdrTeam" id="hdrTeamHome">
          <div class="hdrTeamL1" id="hdrTeamHomeL1"></div>
          <div class="hdrTeamL2" id="hdrTeamHomeL2"></div>
        </div>
      </div>
      <div class="hdrHalf away">
        <div class="hdrTeam" id="hdrTeamAway">
          <div class="hdrTeamL1" id="hdrTeamAwayL1"></div>
          <div class="hdrTeamL2" id="hdrTeamAwayL2"></div>
        </div>
        <img class="hdrLogo" id="hdrLogoAway" alt="">
      </div>
      <div id="hdrSeamBlur"></div>
      <div class="hdrAccent home" id="hdrAccentHome"></div>
      <div class="hdrAccent away" id="hdrAccentAway"></div>
      <div id="hdrAccentBlur"></div>
      <div id="hdrTitle">STARTING LINEUPS</div>
    </div>
    <div id="ice">
      <svg id="rink" viewBox="0 0 1840 872" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <!-- full landscape rink: home defends the left end, away the right.
             Same geometry family as startinglineup/'s half-rink (miter-joined
             faceoff brackets, side-board-facing hash marks, solid dots),
             rotated 90° and mirrored to both ends. -->

        <!-- centre red line (vertical) + centre faceoff circle -->
        <rect x="912" y="0" width="16" height="872" fill="#C8102E"/>
        <circle cx="920" cy="436" r="170" fill="none" stroke="#1B5FAA" stroke-width="6" opacity=".85"/>
        <circle cx="920" cy="436" r="11" fill="#1B5FAA" opacity=".85"/>

        <!-- blue lines -->
        <rect x="682" y="0" width="16" height="872" fill="#1B5FAA"/>
        <rect x="1142" y="0" width="16" height="872" fill="#1B5FAA"/>
        <!-- neutral-zone faceoff dots (centre-ice side of each blue line) -->
        <circle cx="734" cy="230" r="10" fill="#C8102E" opacity=".9"/>
        <circle cx="734" cy="642" r="10" fill="#C8102E" opacity=".9"/>
        <circle cx="1106" cy="230" r="10" fill="#C8102E" opacity=".9"/>
        <circle cx="1106" cy="642" r="10" fill="#C8102E" opacity=".9"/>

        <!-- end-zone faceoff circles ×4 — one reusable template (translated
             into place), transposed from the half-rink's corrected geometry:
             hash marks now face the SIDE BOARDS (top+bottom of frame, since
             the rink is landscape here), dot restraining brackets sit left
             +right of the dot (toward/away centre ice).
             2026-07-16: all 4 moved 50px INWARD (toward centre ice) per
             Mat's ask -- home pair cx 284->334, away pair cx 1556->1506.
             cy (230/642) untouched. Circle, hash-mark/bracket group
             (translate x), and solid dot all share the same cx per side,
             so all three updated together to keep each circle's dot and
             brackets concentric. -->
        <g stroke="#C8102E" stroke-width="6" fill="none" opacity=".9">
          <circle cx="334" cy="230" r="158"/>
          <circle cx="334" cy="642" r="158"/>
          <circle cx="1506" cy="230" r="158"/>
          <circle cx="1506" cy="642" r="158"/>
        </g>
        <g stroke="#C8102E" stroke-width="6" opacity=".9" fill="none" stroke-linejoin="miter">
          <!-- template, repeated at each of the 4 circle centres (Tx,Ty):

/* ====================== CONFIG ====================== */

const PHOTO_BASE = "https://raw.githubusercontent.com/matchavez/nzihl-player-photos/main/";

// Same TEAMS registry as startinglineup/index.html — including Mako, added

// Kept in sync manually, same accepted sibling-drift tradeoff as the rest

// lines: [line1, line2] for the split-colour header treatment -- copied verbatim

// treats "accent" and "name" as two distinct, independently-tuned colours
// per team, and several of them diverge meaningfully from `ink` (e.g. mako
// ink #62656A vs overlay accent #BEC8D2 -- reusing `ink` here was the

// id: this team's teamID in nzihl-season-data's warehouse (same IDs the portal's own

// resolveTeamSlug() below to match a ?team=<slug> against the season data's `upcoming`

// (renders nothing) without even making the fetch -- same stood-down handling as every
// other Mako-facing surface in this repo (see README.md's slug-rule note).
const TEAMS = {
 "pure-nz-admirals":      {id:674110, code:"ADM", league:"nzihl",  name:"Pure NZ Admirals",      lines:["PURE NZ","ADMIRALS"],   ink:"#F7BE11", dark:"#081D48", logo:"Pure-NZ-Admirals-2000x2000.png", hdrAccent:"#F7BE11", hdrLine2:"#FFCD2E"},
 "botany-swarm":          {id:674109, code:"BSW", league:"nzihl",  name:"Botany Swarm",          lines:["BOTANY","SWARM"],       ink:"#F7AF28", dark:"#441620", logo:"Botany Swarm 2000x2000.png", hdrAccent:"#F7AF28", hdrLine2:"#F7BA40"},
 "canterbury-red-devils": {id:675633, code:"CRD", league:"nzihl",  name:"Canterbury Red Devils", lines:["CANTERBURY","RED DEVILS"], ink:"#E5242B", dark:"#550000", logo:"Red Devils 2000x2000r.png", textInk:"#FFFFFF", hdrAccent:"#DC0000", hdrLine2:"#F02626"},
 "dunedin-thunder":       {id:675634, code:"DUN", league:"nzihl",  name:"Dunedin Thunder",       lines:["DUNEDIN","THUNDER"],    ink:"#1E9E63", dark:"#012C1E", logo:"Dunedin_Thunder.png", textInk:"#FDAD19", hdrAccent:"#FDAD19", hdrLine2:"#FDB42A"},
 "skycity-stampede":      {id:675635, code:"SCS", league:"nzihl",  name:"SkyCity Stampede",      lines:["SKYCITY","STAMPEDE"],   ink:"#FAC805", dark:"#162543", logo:"Skycity Stampede 2000x2000.png", hdrAccent:"#FAC805", hdrLine2:"#FAC805"},
 // ^ hdrLine2 AND hdrAccent deliberately overridden to Stampede Yellow (#FAC805,
 // the club's own

 // `name` value -- Mat's explicit ask, this graphic only, not a fix to
 // overlay.py itself. overlay.py's navy fill + white stroke2 was tuned to
 // read against ITS gold header-half background; this page's Stampede
 // header half uses the navy `dark` wash instead (see the "known but not
 // fixed" note below), so navy-on-navy read as hollow outlined text. Yellow
 // fill needs no stroke override -- reverted hdrLine2Stroke to the shared
 // default (black), matching every other team's convention.
 "auckland-mako":         {id:null, code:"MKO", league:"nzihl",  name:"Auckland Mako",         lines:["AUCKLAND","MAKO"],      ink:"#62656A", dark:"#202222", logo:"Auckland Mako 2000x2000.png", hdrAccent:"#BEC8D2", hdrLine2:"#CAD4DE"},
 "auckland-steel":        {id:675636, code:"AST", league:"nzwihl", name:"Auckland Steel",        lines:["AUCKLAND","STEEL"],     ink:"#9FB6C8", dark:"#18263E", logo:"Auckland-Steel-White.png", hdrAccent:"#96A6BC", hdrLine2:"#B2C0D2"},
 "canterbury-inferno":    {id:675637, code:"CIN", league:"nzwihl", name:"Canterbury Inferno",    lines:["CANTERBURY","INFERNO"], ink:"#E0564E", dark:"#550000", logo:"Inferno-White.png", textInk:"#FF6A13", hdrAccent:"#FFB347", hdrLine2:"#FFBA5C"},
 "dunedin-thunder-women": {id:675638, code:"DTW", league:"nzwihl", name:"Dunedin Thunder Women", lines:["DUNEDIN","THUNDER"],    ink:"#1E9E63", dark:"#012C1E", logo:"thunder-women-white.png", textInk:"#FDAD19", hdrAccent:"#FDAD19", hdrLine2:"#FDB42A"},
 "wakatipu-wild":         {id:675639, code:"WLD", league:"nzwihl", name:"Wakatipu Wild",         lines:["WAKATIPU","WILD"],      ink:"#FAC805", dark:"#162543", logo:"Wakatipu-wild-white.png", hdrAccent:"#1D3056", hdrLine2:"#1D3056", hdrLine2Stroke:"#FFFFFF"},
};

// 2026-07-16: one-off MATCHUP-SPECIFIC header override, Mat's ask -- when
// Pure NZ Admirals play SkyCity Stampede (either home/away order), the
// STAMPEDE half of the header inverts: background becomes Stampede Yellow
// (#FAC805, their own primary per the hex cheat sheet) instead of the
// navy `dark` wash, and BOTH team-name lines become Stampede Navy

// for the Swarm-vs-Red-Devils exception -- extend this id-pair-check +
// override-object approach for any future one-off matchup colour ask
// rather than hardcoding into the general per-team render path.
const ADMIRALS_TEAM_ID = 674110, STAMPEDE_TEAM_ID = 675635;
const STAMPEDE_INVERT_BG = "#FAC805", STAMPEDE_INVERT_TEXT = "#1D3056";
function stampedeInvertSide(){
  if(!TH || !TA) return null;
  if(TH.id===STAMPEDE_TEAM_ID && TA.id===ADMIRALS_TEAM_ID) return "home";
  if(TA.id===STAMPEDE_TEAM_ID && TH.id===ADMIRALS_TEAM_ID) return "away";
  return null;
}

const SLOTS = ["LF","CF","RF","LD","RD","GK"];
const POS_LABEL = {LF:"Forward", CF:"Forward", RF:"Forward", LD:"Defense", RD:"Defense", GK:"Goaltender"};
// ^ matches startinglineup/index.html's ROLE_LABEL verbatim -- this page abbreviated to
// LW/C/RW/LD/RD/G for a while (the compact-card era) but that diverged from the per-team
// page and was never wanted; restored to the exact same wording, permanently. Don't
// re-abbreviate this without an explicit ask.
// reveal order (both sides simultaneously): goalies first, up through the
// D, forwards last — symmetric extension of startinglineup/'s single-team
// reveal order.
// 2026-07-15: every value +750ms per Mat's ask, so the background/panel
// sits on screen a little longer before the first card pops in.
const REVEAL_MS = {GK:1130, LD:1290, RD:1410, LF:1550, RF:1670, CF:1810};

const Q = new URLSearchParams(location.search);
if(Q.get("worker")) WORKER = Q.get("worker");
const esc = s=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const slugify = s=>String(s||"").toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");

let HOME_SLUG = slugify(Q.get("home")||"");
let AWAY_SLUG = slugify(Q.get("away")||"");
const TEAM_PARAM = slugify(Q.get("team")||"");

// Same nzihl-season-data source + `upcoming` field the portal's own
// schedule-driven Combined Starting Lineups links are generated from
// (whole season, no lookahead cap, keyed by teamID — see index.html's
// loadCombinedLineups()). Fetched only for the ?team= resolution path;
// explicit ?home=&away= URLs never touch the network for this.
const SEASON_DATA_URL = {
  nzihl:  "https://raw.githubusercontent.com/matchavez/nzihl-season-data/main/nzihl.json",
  nzwihl: "https://raw.githubusercontent.com/matchavez/nzihl-season-data/main/nzwihl.json",
};
const idToSlug = id => Object.keys(TEAMS).find(k => TEAMS[k].id === id) || null;

// Resolves a single evergreen ?team=<slug> into HOME_SLUG/AWAY_SLUG by
// finding this team's soonest fixture in nzihl-season-data's `upcoming`
// list. `upcoming` only ever holds games that haven't been played yet —
// once a game is final it moves into the warehouse's `games` array — so
// "soonest entry for this teamID" IS "this team's next game" with no extra
// date-window filtering needed, and it naturally re-resolves to the
// following fixture once the current one is played, the same evergreen
// behavior activity-banner's ?team= already has. Returns true on success
// (HOME_SLUG/AWAY_SLUG set); false leaves them unset, which VALID below
// turns into the same "render nothing" bad-slug convention as everywhere
// else on this page.
async function resolveTeamSlug(teamSlug){
  const T = TEAMS[teamSlug];
  if(!T || T.id == null) return false;   // unknown slug, or Mako (no teamID — no games)
  let d;
  try{
    const r = await fetch(SEASON_DATA_URL[T.league], {cache:"no-store"});
    d = await r.json();
  }catch(e){ return false; }
  const up = (d && Array.isArray(d.upcoming)) ? d.upcoming : [];
  const mine = up.filter(g => g && g.home && g.away && (g.home.teamID===T.id || g.away.teamID===T.id))
    .sort((a,b)=> (a.date+(a.time||"")).localeCompare(b.date+(b.time||"")));
  if(!mine.length) return false;         // bye week / nothing scheduled yet
  const next = mine[0];
  const homeSlug = idToSlug(next.home.teamID), awaySlug = idToSlug(next.away.teamID);
  if(!homeSlug || !awaySlug) return false;
  HOME_SLUG = homeSlug; AWAY_SLUG = awaySlug;
  return true;
}

// Bad/unknown slug for either param, two teams from different leagues, or
// (?team= path) no resolvable fixture: render nothing (transparent source)
// — same bad-slug convention as startinglineup/. TH/TA/VALID/SIDE_HOME/
// SIDE_AWAY are populated by resolveAndBuild() below, after any ?team=
// resolution has had a chance to run — see the boot() call at the bottom
// of this script.
let TH, TA, VALID, SIDE_HOME, SIDE_AWAY;
async function resolveAndBuild(){
  if(TEAM_PARAM && !HOME_SLUG && !AWAY_SLUG){
    await resolveTeamSlug(TEAM_PARAM);
  }
  TH = TEAMS[HOME_SLUG] || null;
  TA = TEAMS[AWAY_SLUG] || null;
  VALID = !!(TH && TA && TH.league === TA.league);
  SIDE_HOME = TH ? makeSide("home", TH, HOME_SLUG) : null;
  SIDE_AWAY = TA ? makeSide("away", TA, AWAY_SLUG) : null;
}

// Single JSON.parse of the already-URLSearchParams-decoded value — never
// decodeURIComponent() it again (the "%-in-a-fact" double-decode bug,
// see startinglineup/ + activity-banner/).
function parsePreview(param){
  try{ const v = Q.get(param); return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
const PREVIEW_HOME = parsePreview("previewHome");
const PREVIEW_AWAY = parsePreview("previewAway");

/* ====================== SCALING (16:9-safe, symmetric centering) ====================== */
function fitWindow(){
  const s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
  const left = Math.max(0,(window.innerWidth  - 1920*s)/2);
  const top  = Math.max(0,(window.innerHeight - 1080*s)/2);
  const f = document.getElementById("frame");
  f.style.transform = `translate(${left}px,${top}px) scale(${s})`;
}
window.addEventListener("resize", fitWindow); fitWindow();

/* ====================== TEXT FIT (shrink, never ellipsis) ====================== */
function fitLine(el, base, min){
  const line = el.parentElement;
  const MAX_LINE_H = 92; // px budget for 2 stacked name lines at the new taller-card size
  let size = base;
  el.style.fontSize = size+"px";
  while(size > min && line.scrollHeight > MAX_LINE_H){
    size -= 1; el.style.fontSize = size+"px";
  }
}

/* ====================== RENDER ====================== */
const SIL_SVG = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="34" r="17" fill="#8a93a0"/>
  <path d="M18 92 C18 66 34 58 50 58 C66 58 82 66 82 92 Z" fill="#8a93a0"/></svg>`;

// Per-side render state, so home and away channels can never blank each
// other out or get their FIRST_PAINT/updated_at tracking confused.
function makeSide(key, T, slug){
  return { key, T, slug, CUR:{}, FIRST_PAINT:true, LAST_UPDATED:null };
}
// SIDE_HOME/SIDE_AWAY are built in resolveAndBuild() above (after any
// ?team= resolution), not here — makeSide() just needs to be defined
// before that runs, which function-hoisting guarantees regardless of
// script order.

function playerKey(p){ return p ? [p.number,p.name,p.photo||""].join("|") : ""; }

function renderSlot(side, slot, player, animate){
  const el = document.getElementById(`slot_${side.key}_${slot}`);
  if(!el) return;
  const T = side.T, dark = T.dark, ink = T.ink, textInk = T.textInk || T.ink;
  el.style.background = `linear-gradient(135deg, ${dark} 0%, ${dark} 78%, rgba(255,255,255,.07) 100%), ${dark}`;
  let photoHtml;
  if(player && player.photo){
    photoHtml = `<img class="head" src="${esc(PHOTO_BASE+player.photo)}" alt=""
      onerror="this.style.display='none';this.parentElement.querySelector('.crest').style.display='flex'">
      <div class="crest" style="display:none"><img src="${esc(LOGO+encodeURIComponent(T.logo))}" alt=""></div>`;
  } else if(player){
    photoHtml = `<div class="crest" style="display:flex"><img src="${esc(LOGO+encodeURIComponent(T.logo))}" alt=""></div>`;
  } else {
    photoHtml = `<div class="sil">${SIL_SVG}</div>`;
  }
  el.className = "card" + (player ? "" : " empty");
  // away side is row-reverse (photo on the right, see .card[id^="slot_away_"])
  // so the accent border moves to cbody's right edge to stay photo-adjacent.
  const borderSide = side.key === "away" ? "border-right-color" : "border-left-color";
  el.innerHTML =
    `<div class="cphoto">${photoHtml}</div>
     <div class="cbody" style="${borderSide}:${ink}">
       <div class="cnameline">
         <span class="cname">${player?esc(player.name):"&mdash;"}</span>
       </div>
       <div class="cmetaline">
         ${player&&player.number!=null?`<span class="cnum" style="color:${textInk}">#${esc(player.number)}</span>`:""}
         <span class="crole">${POS_LABEL[slot]}</span>
         ${player&&(player.flag==="C"||player.flag==="A")?`<span class="cflag">${esc(player.flag)}</span>`:""}
       </div>
     </div>`;
  const nameEl = el.querySelector(".cname");
  if(animate){
    el.style.animationDelay = REVEAL_MS[slot]+"ms";
    void el.offsetWidth;               // force reflow so the animation restarts cleanly
    el.classList.add("show");
    setTimeout(()=>fitLine(nameEl, 31.5, 13.5), REVEAL_MS[slot]+40);
  } else {
    el.style.animationDelay = "0ms";
    el.classList.add("shown");
    void el.offsetWidth;               // restart the pulse cleanly
    el.classList.add("pulse");
    fitLine(nameEl, 31.5, 13.5);
  }
}

function renderAllSide(side, state){
  const slots = (state && state.slots) || {};
  SLOTS.forEach(slot=>{
    const p = slots[slot] || null;
    const key = playerKey(p);
    if(side.FIRST_PAINT){ renderSlot(side, slot, p, true); side.CUR[slot]=key; }
    else if(side.CUR[slot] !== key){ renderSlot(side, slot, p, false); side.CUR[slot]=key; }
  });
  side.FIRST_PAINT = false;
}

/* ====================== DATA ====================== */
// Same resilience contract as startinglineup/'s pollLineup(): a failed
// fetch, a non-JSON reply (worker predates /lineup/), or a channel error
// must never blank an on-air graphic — first load still paints all six
// silhouettes for that side, and every later poll that fails just leaves
// the last-good render in place. Each side's channel is independent, so
// one team's bad channel can never blank the other team's six cards.
async function pollSide(side){
  try{
    const r = await fetch(`${WORKER}/lineup/${side.slug}`, {cache:"no-store"});
    const txt = await r.text();
    let j; try{ j = JSON.parse(txt); }catch(e){ if(side.FIRST_PAINT) renderAllSide(side, null); return; }
    if(j.error){ if(side.FIRST_PAINT) renderAllSide(side, null); return; }
    if(j.updated_at === side.LAST_UPDATED && !side.FIRST_PAINT) return;
    side.LAST_UPDATED = j.updated_at;
    renderAllSide(side, j);
  }catch(e){
    if(side.FIRST_PAINT) renderAllSide(side, null);
  }
}

/* ====================== INIT ====================== */
function start(){
  if(!VALID){ document.body.innerHTML = ""; return; }   // bad slug / cross-league pair: render nothing
  document.title = TH.name + " vs " + TA.name + " — Starting Lineups";

  const panel = document.getElementById("panel");
  panel.style.background = "#0d0f13";
  document.getElementById("hdr").querySelector(".hdrHalf.home").style.background =
    `linear-gradient(90deg, ${TH.dark} 0%, ${TH.dark} 72%, rgba(255,255,255,.06) 100%), ${TH.dark}`;
  document.getElementById("hdr").querySelector(".hdrHalf.away").style.background =
    `linear-gradient(270deg, ${TA.dark} 0%, ${TA.dark} 72%, rgba(255,255,255,.06) 100%), ${TA.dark}`;
  document.getElementById("hdrAccentHome").style.background = TH.hdrAccent;
  document.getElementById("hdrAccentAway").style.background = TA.hdrAccent;
  document.getElementById("hdrLogoHome").src = LOGO + encodeURIComponent(TH.logo);
  document.getElementById("hdrLogoAway").src = LOGO + encodeURIComponent(TA.logo);
  document.getElementById("hdrTeamHomeL1").textContent = TH.lines[0];
  document.getElementById("hdrTeamHomeL2").textContent = TH.lines[1];
  document.getElementById("hdrTeamHomeL2").style.color = TH.hdrLine2;
  document.getElementById("hdrTeamHomeL2").style.webkitTextStroke = `2px ${TH.hdrLine2Stroke || "#08080A"}`;
  document.getElementById("hdrTeamAwayL1").textContent = TA.lines[0];
  document.getElementById("hdrTeamAwayL2").textContent = TA.lines[1];
  document.getElementById("hdrTeamAwayL2").style.color = TA.hdrLine2;
  document.getElementById("hdrTeamAwayL2").style.webkitTextStroke = `2px ${TA.hdrLine2Stroke || "#08080A"}`;

  // Admirals-vs-Stampede matchup override (see stampedeInvertSide() above):
  // re-paints ONLY the Stampede half after the normal render above --
  // background to Stampede Yellow (dark sheen instead of the light sheen
  // used on dark backgrounds, since the wash direction needs to invert
  // too), both name lines to Stampede Navy. Runs after the generic block
  // so it always wins for this one matchup; no-op (returns null) every
  // other game.
  const invertSide = stampedeInvertSide();
  if(invertSide){
    const half = document.getElementById("hdr").querySelector(`.hdrHalf.${invertSide}`);
    const grad = invertSide==="home" ? "90deg" : "270deg";
    half.style.background = `linear-gradient(${grad}, ${STAMPEDE_INVERT_BG} 0%, ${STAMPEDE_INVERT_BG} 72%, rgba(0,0,0,.08) 100%), ${STAMPEDE_INVERT_BG}`;
    document.getElementById(invertSide==="home" ? "hdrTeamHomeL1" : "hdrTeamAwayL1").style.color = STAMPEDE_INVERT_TEXT;
    document.getElementById(invertSide==="home" ? "hdrTeamHomeL2" : "hdrTeamAwayL2").style.color = STAMPEDE_INVERT_TEXT;
  }

  panel.classList.add("show");

  if(PREVIEW_HOME){
    renderAllSide(SIDE_HOME, PREVIEW_HOME);   // control-page/QA preview: no polling for this side
  } else {
    pollSide(SIDE_HOME);
    setInterval(()=>pollSide(SIDE_HOME), 10000);
  }
  if(PREVIEW_AWAY){
    renderAllSide(SIDE_AWAY, PREVIEW_AWAY);
  } else {
    pollSide(SIDE_AWAY);
    setInterval(()=>pollSide(SIDE_AWAY), 10000);
  }
}
async function boot(){
  await resolveAndBuild();   // no-op unless ?team= was given without explicit ?home=&away=
  if(document.fonts && document.fonts.ready){ await document.fonts.ready; }
  start();
}
boot();
</script>
