<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NZIHL Ticker Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<style>
@font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable.woff2') format('woff2');}
@font-face{font-family:'Inter';font-style:italic;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable-Italic.woff2') format('woff2');}
  /* ============================================================
     NZIHL — TICKER PAGE
     ONE static 1920x1080 source for the YoloBox.
       • Upper-left:  the live Singular scorebug (iframe, watermark clipped) — identical to scorebug/
       • Upper-right: a continuous verbose scrolling ticker of the game's scoring + penalties,
                      exactly as tall as the scorebug bar, black (#000000) bed.
     NO activity banner on this page (by design — Mat 2026-07-07).
     The ticker appears immediately on load (the 3-min delay was tested and removed — Mat 2026-07-07).
     Geometry tunable live: ?tk=x,y,w,h  (defaults: x=794 next to the clock, y=0, w=1920-x, h=64)
     Speed tunable: ?speed=<px per second>  (default 90)
     ============================================================ */
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:transparent;overflow:hidden;
    font-family:Inter,-apple-system,"Segoe UI",sans-serif;
    font-feature-settings:"tnum" 1,"cv05" 1;-webkit-font-smoothing:antialiased;}

  /* full broadcast frame; YoloBox captures this 1:1 (fit-scaled only for desktop preview) */
  #stage{position:absolute;left:0;top:0;width:1920px;height:1080px;
    transform-origin:0 0;overflow:hidden;}

  /* --- scorebug clip window (upper-left). Red bar top-left = 0,0. Same as scorebug/ --- */
  #bugclip{position:absolute;left:0;top:0;overflow:hidden;z-index:1;pointer-events:none;}
  #bug{position:absolute;border:0;background:transparent;transform-origin:0 0;width:1920px;height:1080px;}

  /* --- ticker (upper-right, exactly the scorebug bar height) --- */
  #tick{position:absolute;background:#000000;overflow:hidden;z-index:4;visibility:hidden;
    display:flex;align-items:stretch;}
  #tick.on{visibility:visible;}
  /* fixed "Recap:" title — always present, never moves; crawl clips at its right edge */
  #label{flex:0 0 auto;display:flex;align-items:center;padding:0 20px 0 18px;
    color:#fff;font-weight:600;letter-spacing:.01em;background:#000;position:relative;z-index:2;}
  #swrap{flex:1 1 auto;position:relative;overflow:hidden;}
  #track{position:absolute;left:0;top:0;height:100%;display:inline-flex;align-items:center;
    white-space:nowrap;will-change:transform;}
  .scoreit{display:inline-flex;align-items:center;}   /* startup: score line alone, centered + held */
  .item{display:inline-flex;align-items:center;}
  /* fixed square boxes for every logo so track width is stable before images load */
  .crest{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
    height:calc(var(--th)*.76);width:calc(var(--th)*.76);margin:0 14px 0 4px;}
  .crest img{max-width:100%;max-height:100%;object-fit:contain;
    filter:drop-shadow(0 1px 4px rgba(0,0,0,.6));}
  .lsep{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
    height:calc(var(--th)*.46);width:calc(var(--th)*.46);margin:0 30px;opacity:.9;}
  .lsep img{max-width:100%;max-height:100%;object-fit:contain;}
  /* Weights (Mat 2026-07-07): emphasis = SemiBold 600, everything else Regular 400 */
  .sent{color:#E8E8E8;font-weight:400;line-height:1.25;letter-spacing:.004em;}
  .sent .tm{font-weight:600;}            /* team name — team readable colour (inline) */
  .sent .no{font-weight:800;font-size:80%;font-variant-numeric:tabular-nums;}  /* jersey # — team colour, 80% size @800 */
  .sent .pn{font-weight:600;}            /* player name — team readable colour (inline) */
  .sent .inf{font-weight:600;color:#fff;}
  .sent .dur{font-weight:600;color:#fff;}
  .sent .flag{font-weight:600;color:#fff;}
  .sent .tt{font-weight:600;color:#fff;font-variant-numeric:tabular-nums;}
  .sent .lg{font-weight:600;color:#fff;letter-spacing:.04em;}
  .sent .sc{font-weight:600;color:#fff;font-variant-numeric:tabular-nums;}   /* score digits */
  .sent .scd{color:#E8E8E8;}                                                 /* score dash */
  .sent .ms{color:#fff;}                                                     /* milestone clause */
  .sent .div{font-weight:700;color:#fff;letter-spacing:.07em;}               /* period-divider label */

  /* --- test controls (only with ?test=1) --- */
  #test{position:absolute;left:24px;bottom:22px;right:24px;z-index:9;display:none;gap:8px;
    flex-wrap:wrap;align-items:center;font-family:Inter,sans-serif;}
  #test button{font:600 15px Inter,sans-serif;color:#fff;background:#15181d;
    border:1px solid #333a44;border-radius:9px;padding:10px 16px;cursor:pointer;}
  #test button:hover{background:#1d2128;border-color:#4a5562;}
  #test .lbl{color:#7e8794;font:600 13px Inter,sans-serif;align-self:center;
    background:#0d0f13;border:1px solid #222;border-radius:8px;padding:8px 12px;}
  #diag{position:absolute;right:18px;bottom:16px;z-index:9;color:#5d646e;
    font:500 12px Inter,sans-serif;display:none;}
</style>
</head>
<body>
<div id="stage">
  <div id="bugclip"><iframe id="bug" title="Scorebug" allowtransparency="true" scrolling="no"></iframe></div>

  <div id="tick"><div id="label">Recap:</div><div id="swrap"><div id="track"></div></div></div>

  <div id="test">
    <span class="lbl">TICKER TEST</span>
    <button id="tGoal">+ Goal</button>
    <button id="tPen">+ Penalty</button>
    <button id="tSlow">− Slower</button>
    <button id="tFast">+ Faster</button>
  </div>
  <div id="diag"></div>
</div>

<script>
/* ====================== CONFIG (shared with scorebug/) ====================== */
let WORKER = "https://blue-butterfly-aa69.matchavez.workers.dev";   // Cloudflare CORS proxy

// Singular scorebug output is PER-BROADCAST, not per-team (see scorebug/index.html).
const BUG_CHC = "7wvd7ZPATlYl3NoLxtxmkF";          // Christchurch — Red Devils + Inferno ONLY
const BUGMAP = {
  "canterbury-red-devils": BUG_CHC,
  "canterbury-inferno":    BUG_CHC,
  // TODO @publish — different Singular output per club (uncomment + fill, or use ?bug=):
  // "dunedin-thunder":"", "botany-swarm":"", "pure-nz-admirals":"", "skycity-stampede":"",
  // "auckland-steel":"", "dunedin-thunder-women":"", "wakatipu-wild":"",
};
const SINGULAR = v => /^https?:/.test(v) ? v : "https://app.singular.live/output/"+v;
let SCOREBUG_SRC = SINGULAR(BUG_CHC);

// Scorebug placement / crop — identical semantics to scorebug/index.html (?bs= tunable).
let BUG = { scale:0.78, x:0, y:0, cropX:390, cropY:500, clipW:1000, clipH:172 };

const POLL_MS  = 12000;             // box-score poll cadence
const RUN_CAP  = 3.25*3600*1000;    // auto-stop polling after 3h15m

const LOGO="https://matchavez.com/nzihl-broadcast-assets/assets/logos/";
const LEAGUE_LOGO={
  nzihl:  "https://matchavez.com/nzihl-broadcast-assets/assets/league/NZIHL-White-2000.png",
  nzwihl: "https://matchavez.com/nzihl-broadcast-assets/assets/league/NZWIHL-Logo-White-1000px.png",
};
const MANIFESTS=[
  {league:"nzihl",  url:"https://raw.githubusercontent.com/matchavez/nzihl-broadcast-rosters/main/boxscores.json",  clientid:7131, leagueid:35499},
  {league:"nzwihl", url:"https://raw.githubusercontent.com/matchavez/nzwihl-broadcast-rosters/main/boxscores.json", clientid:7132, leagueid:35501},
];
// team visuals keyed by nzihl teamID. ink = the team's READABLE accent on dark (per style guide
// legibility tints); jersey numbers render in dim(ink) — a ~50% brightness version (Mat 2026-07-07).
const REG={
 "674110":{code:"ADM", ink:"#F7BE11", dark:"#081D48", logo:"Pure-NZ-Admirals-2000x2000.png"},
 "675633":{code:"CRD", ink:"#E5242B", dark:"#550000", logo:"Red Devils 2000x2000r.png"},
 "675634":{code:"DUN", ink:"#1E9E63", dark:"#012C1E", logo:"Dunedin_Thunder.png"},
 "675635":{code:"SCS", ink:"#FAC805", dark:"#162543", logo:"Skycity Stampede 2000x2000.png"},
 "674109":{code:"BSW", ink:"#F7AF28", dark:"#441620", logo:"Botany Swarm 2000x2000.png"},
 "675636":{code:"AST", ink:"#9FB6C8", dark:"#18263E", logo:"Auckland-Steel-White.png"},
 "675637":{code:"CIN", ink:"#E0564E", dark:"#550000", logo:"Inferno-White.png"},
 "675638":{code:"DTW", ink:"#1E9E63", dark:"#012C1E", logo:"thunder-women-white.png"},
 "675639":{code:"WLD", ink:"#FAC805", dark:"#162543", logo:"Wakatipu-wild-white.png"},
};
const DEFV={code:"", ink:"#9aa3ad", dark:"#262a31", logo:""};
const vis=id=>REG[id]||DEFV;
// Jersey numbers use the SAME team ink as the rest of the recap text (Mat 2026-07-07 — one
// palette everywhere, no dimmed variant, avoids colour conflicts); weight 200 sets them apart.

/* ====================== URL OVERRIDES ====================== */
const Q=new URLSearchParams(location.search);
if(Q.get("worker")) WORKER=Q.get("worker");
if(Q.get("bug"))    SCOREBUG_SRC=SINGULAR(Q.get("bug"));
if(Q.get("bs")){const a=Q.get("bs").split(",").map(Number);
  if(a.length>=1&&a[0])BUG.scale=a[0]; if(a.length>=3){BUG.x=a[1];BUG.y=a[2];}
  if(a.length>=5){BUG.clipW=a[3];BUG.clipH=a[4];}
  if(a.length>=7){BUG.cropX=a[5];BUG.cropY=a[6];}}
const TESTMODE = Q.get("test")==="1";

// Ticker geometry (Mat 2026-07-07): left edge sits NEXT TO THE CLOCK — measured at stage x≈794
// with the default ?bs (clock digits end there; the "5 on 5"/flyout chips extend past it and the
// ticker simply covers them: ticker wins on z). Height = the scorebug main bar, measured 64px at
// scale(1). Runs to the frame's right border (1920) and is clamped inside it.
// Override live with ?tk=x,y,w,h (e.g. ?tk=794,0,1126,64). To cover the clock/period later,
// just lower x further.
// Height: the scorebug bar is a 0.78-SCALED iframe — its bottom edge is FRACTIONAL:
// 83 native px * 0.78 = 64.74. Integer 64 showed a gap, 65 a bump (Mat caught both).
// Derive from BUG.scale so the seam stays flush even if ?bs rescales the bug.
const BAR_NATIVE=83;   // scorebug main-bar height in Singular composition px (cropY 500 -> 583)
let TICK={ x:796, y:0, w:1920-796, h:Math.round(BUG.scale*BAR_NATIVE*100)/100 };
if(Q.get("tk")){const a=Q.get("tk").split(",").map(Number);
  if(a.length>=1&&!isNaN(a[0]))TICK.x=a[0]; if(a.length>=2&&!isNaN(a[1]))TICK.y=a[1];
  if(a.length>=3&&!isNaN(a[2]))TICK.w=a[2]; if(a.length>=4&&!isNaN(a[3]))TICK.h=a[3];}
TICK.w=Math.min(TICK.w,1920-TICK.x);   // never spill past the 1920 frame
let SPEED = Q.get("speed")?Math.max(10,+Q.get("speed")):120;   // px/s crawl (Mat 2026-07-07: 120)

/* ====================== SCOREBUG IFRAME (same as scorebug/) ====================== */
function placeBug(){
  const clip=document.getElementById("bugclip"), f=document.getElementById("bug");
  clip.style.left=BUG.x+"px"; clip.style.top=BUG.y+"px";
  clip.style.width=BUG.clipW+"px"; clip.style.height=BUG.clipH+"px";
  f.style.left=(-BUG.scale*BUG.cropX)+"px";
  f.style.top =(-BUG.scale*BUG.cropY)+"px";
  f.style.transform="scale("+BUG.scale+")";
  if(f.src!==SCOREBUG_SRC) f.src=SCOREBUG_SRC;
}

/* ====================== NAME / TEXT HELPERS ====================== */
const decamel=s=>String(s||"").replace(/([a-z\.])([A-Z])/g,"$1 $2").replace(/([^\s(])\(/g,"$1 (").replace(/\)([^\s)])/g,") $1");
function properCase(s){s=String(s||"");if(!s)return s;
  const letters=s.replace(/[^a-zA-Z]/g,"");if(!letters)return s;
  const allUpper=letters===letters.toUpperCase()&&letters!==letters.toLowerCase();
  const allLower=letters===letters.toLowerCase()&&letters!==letters.toUpperCase();
  if(!allUpper&&!allLower)return s;
  return s.toLowerCase().replace(/(^|[\s\-'.(])([a-z])/g,(m,p1,p2)=>p1+p2.toUpperCase());}
// FULL first + last name, no abbreviations (ticker spec) — de-camel, drop stray "(...)", tidy case
function properFull(n){return properCase(decamel(n).replace(/\([^)]*\)/g," ").replace(/\s+/g," ").trim());}
const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const surnameUC=n=>{const w=decamel(n).trim().split(/\s+/);return (w[w.length-1]||"").toUpperCase();};
// possessive: "SkyCity Stampede's", but "Pure NZ Admirals'"
const poss=n=>/s$/i.test(n)?n+"'":n+"'s";
const ORD=["first","second","third","fourth","fifth","sixth","seventh","eighth","ninth","tenth",
  "eleventh","twelfth","thirteenth","fourteenth","fifteenth","sixteenth","seventeenth","eighteenth"];
const ordinal=i=>ORD[i]|| (i+1)+"th";
// "the first period" / "overtime" / "the shootout"
function periodPhrase(p){return {1:"the first period",2:"the second period",3:"the third period",
  OT:"overtime",SO:"the shootout"}[p]||("period "+p);}
// Penalty severity tag (Mat 2026-07-07): a 2-minute minor is ASSUMED (no tag);
// 4 -> "(double minor)", 5 -> "(major)", 10 -> "(misconduct)", anything else spelled out.
function penTag(d){d=String(d||"").trim(); if(!d)return "";
  let m=d.match(/^(\d+)\s*min/i)||d.match(/^(\d+):00$/);
  if(m){const n=+m[1];
    if(n===2)return "";
    if(n===4)return " (double minor)";
    if(n===5)return " (major)";
    if(n===10)return " (misconduct)";
    return " ("+n+" minutes)";}
  return " ("+d.toLowerCase()+")";}   // e.g. "Game Misconduct" -> "(game misconduct)"
// Goal-type pill from the box score's middle column -> spoken adverbial phrase
function flagAdv(f){f=String(f||"").trim().toUpperCase();
  if(!f)return "";
  if(/^PP/.test(f))return " on the power play";
  if(/^SH/.test(f))return " while short handed";
  if(/^EN/.test(f))return " into an empty net";
  if(/^PS/.test(f))return " on a penalty shot";
  return "";}
// scorer's Nth of the game -> trailing clause (uses league pronoun; NZWIHL = her)
const pron=()=>LEAGUE==="nzwihl"?"her":"his";
function milestone(n){
  if(n===2)return `${pron()} second of the game`;
  if(n===3)return "completing the hat trick";
  if(n>=4)return `${pron()} ${["fourth","fifth","sixth","seventh","eighth"][n-4]||(n+"th")} of the game`;
  return "";}
const t2s=t=>{const m=String(t||"").match(/^(\d+):(\d{2})$/);return m?(+m[1]*60)+(+m[2]):-1;};
const PERI={1:0,2:1,3:2,"OT":3,"SO":4};

/* ====================== BOX-SCORE PARSER (from scorebug/ + skater numbers) ====================== */
const SHIM=u=>WORKER?(WORKER.replace(/\/$/,"")+"?url="+encodeURIComponent(u)):null;
const normP=s=>{s=String(s).toUpperCase();if(s.startsWith("1"))return"1";if(s.startsWith("2"))return"2";if(s.startsWith("3"))return"3";if(/OT|OVER/.test(s))return"OT";if(/SO|SHOOT/.test(s))return"SO";return s;};
function parse(html){
  html=html.replace(/<\/span>/gi,"</span> ");   // esportsdesk span-fusion fix (see scorebug/)
  const doc=new DOMParser().parseFromString(html,"text/html");
  const txt=el=>el?el.textContent.replace(/\s+/g," ").trim():"";
  const h5=[...doc.querySelectorAll("h5")];
  const findH=re=>h5.find(h=>re.test(h.textContent));
  const tidOf=el=>{const a=el&&el.querySelector&&el.querySelector('a[href*="teamID="]');const m=a&&a.getAttribute("href").match(/teamID=(\d+)/i);return m?m[1]:null;};
  const btw=(a,b)=>{const r=[];let e=a&&a.nextElementSibling;while(e&&e!==b){r.push(e);e=e.nextElementSibling;}return r;};
  const tables=[...doc.querySelectorAll("table")];
  const scoreTbl=tables[0]; const srows=[...scoreTbl.querySelectorAll("tr")];
  const team=tr=>{const c=[...tr.children].map(txt);const m=c[0].match(/^(.*?)\s+([A-Z]{2,4})$/);
    return {teamID:tidOf(tr),name:(m?m[1]:c[0]).trim(),code:(m?m[2]:"").trim(),tot:+c[c.length-1]||0};};
  const away=team(srows[1]), home=team(srows[2]);
  const skaters=[];
  h5.filter(h=>/SKATERS/i.test(h.textContent)).forEach(h=>{
    let e=h.nextElementSibling,tbl=null;
    while(e&&!/^H5$/.test(e.tagName)){if(e.tagName==="TABLE"){tbl=e;break;}if(e.querySelector&&e.querySelector("table")){tbl=e.querySelector("table");break;}e=e.nextElementSibling;}
    if(tbl)[...tbl.querySelectorAll("tr")].slice(1).forEach(row=>{const id=tidOf(row);if(id)skaters.push({id,text:txt(row)});});
  });
  const teamOfName=who=>{const s=skaters.find(sk=>sk.text.includes(who));return s?s.id:null;};
  function section(h5el,stopEl){
    const items=[];let per="";
    btw(h5el,stopEl).forEach(el=>{
      const t=txt(el);
      // "(\s*\d+)?" allows "OVERTIME PERIOD 1" — without it OT goals silently fold into P3
      // (caught on game 2519941, 2026-07-07; summary.html already had this fix)
      if(/^(1ST|2ND|3RD|\dTH|OVERTIME|OT\d*|SHOOTOUT)(\s+PERIOD)?(\s*\d+)?$/i.test(t)&&!(el.querySelector&&el.querySelector("table"))){per=normP(t);return;}
      const tbl=(el.querySelector&&el.querySelector("table"))||(el.tagName==="TABLE"?el:null);
      if(tbl)[...tbl.querySelectorAll("tr")].forEach(r=>{const c=[...r.children].map(txt);if(c[0]&&!/No Penalties|No Scoring/i.test(c[0]))items.push({per,c});});
    });
    return items;
  }
  const ssH=findH(/SCORING SUMMARY/i),psH=findH(/PENALTY SUMMARY/i),skH=findH(/SKATERS/i);
  const goals=ssH?section(ssH,psH).map(o=>{const m=o.c[0].match(/^#?(\d+)\s+(.+?)\s*\((.*)\)\s*$/);
    const who=m?m[2].trim():o.c[0];const id=teamOfName(who);
    // middle column = goal-type pill (PPG / SHG / ENG); present only when the row has 3+ cells
    const flag=o.c.length>2?String(o.c[1]||"").trim():"";
    return {p:o.per,t:o.c[o.c.length-1]||"",no:m?+m[1]:"",who,a:m?m[3].trim():"",flag,teamID:id};}):[];
  const normT=s=>String(s||"").toLowerCase().replace(/[^a-z]/g,"");
  const matchTeam=tn=>{const t=normT(tn);if(!t)return null;for(const T of [away,home]){const n=normT(T.name);if(n&&(t===n||t.includes(n)||n.includes(t)))return T.teamID;}return null;};
  const pens=psH?section(psH,skH).map(o=>{
    const cell=o.c[0];
    const tm=cell.match(/\(([^)]*)\)\s*$/);
    const pm=cell.match(/^#?(\d+)\s+(.+?)\s*\([^)]*\)\s*$/);
    const who=pm?pm[2].trim():cell.replace(/\s*\([^)]*\)\s*$/,"").trim();
    const id=matchTeam(tm?tm[1].trim():"") || (pm?teamOfName(who):null);
    return {p:o.per,t:o.c[o.c.length-1]||"",no:pm?+pm[1]:"",who,inf:o.c[1]||"",dur:o.c[2]||"",teamID:id};}):[];
  // shots by period: the SOG details cell reads "38 (13-11-14)" — parens = per-period counts
  const dTbl=tables.find(t=>/SOG/.test(txt(t.querySelector("tr"))));
  const sogRow=tr=>{if(!tr)return[];const c=[...tr.children].map(txt);const m=(c[1]||"").match(/\(([^)]*)\)/);
    return m?m[1].split(/[-–]/).map(s=>+s.trim()||0):[];};
  let sogA=[],sogH=[];
  if(dTbl){const dr=[...dTbl.querySelectorAll("tr")];sogA=sogRow(dr[1]);sogH=sogRow(dr[2]);}
  // goalies: per-team "<TEAM> GOALIES" tables, cols # | Name | SA | GA | SV | SV% | MP | PIM.
  // Name cell duplicates responsively + carries ST/W/OTL badges — full name = the wide span.
  const goalies=[];
  h5.filter(x=>/GOALIES/i.test(x.textContent)).forEach(gh=>{
    const tid=matchTeam(gh.textContent.replace(/GOALIES/i," ").trim());
    let e2=gh.nextElementSibling,gt=null;
    while(e2&&!/^H5$/.test(e2.tagName)){gt=(e2.tagName==="TABLE"?e2:(e2.querySelector&&e2.querySelector("table")));if(gt)break;e2=e2.nextElementSibling;}
    if(gt)[...gt.querySelectorAll("tr")].slice(1).forEach(r=>{
      const c=[...r.children].map(txt);
      const sa=+c[2], sv=+c[4];
      if(!c[6]||c[6]==="0:00"||isNaN(sa))return;   // didn't play / no data
      const wide=r.children[1]&&r.children[1].querySelector("span.d-none");
      const nm=properCase(String((wide?wide.textContent:c[1])||"").replace(/\b(ST|OTL|OTW|SOL|SOW|W|L|SO|OT)\b/g," ").replace(/\s+/g," ").trim());
      if(nm)goalies.push({teamID:tid,name:nm,sa,sv});
    });
  });
  return {away,home,goals,pens,skaters,sogA,sogH,goalies};
}
// best-effort jersey number for a name (assist lists carry no numbers): find the roster row
// containing the name, take its leading number. Empty string if not found — statement omits it.
function lookupNum(skaters,name){
  const q=decamel(String(name||"")).replace(/\s+/g," ").trim().toLowerCase(); if(!q)return "";
  const row=skaters.find(sk=>sk.text.toLowerCase().includes(q)); if(!row)return "";
  const m=row.text.match(/^\D{0,3}(\d{1,2})\s/); return m?m[1]:"";
}

/* ====================== EVENT MODEL -> STATEMENTS ====================== */
// event = {kind:'goal'|'pen', teamID, per, t, no, name, assists:[{no,name}], inf, dur, teamPen}
let AWAYN="",HOMEN="",AWAYID=null,HOMEID=null,LEAGUE="nzihl",VENUE="",AWAYTOT=0,HOMETOT=0;
let SOGA=[],SOGH=[],PERSDONE=1;   // shots by period + how far the game has progressed (dividers)
let GLS=[];                       // goalies who have played: {teamID,name,sa,sv} from the GOALIES tables
// SEASON CONTEXT (Mat 2026-07-07 "make it awesome"): league scoring leaders from
// stats_hockey.cfm, refetched every ~60s so live goals stay consistent with the box score.
let LEADERS=[];
const normName=s=>String(s||"").toLowerCase().replace(/[^a-z]/g,"");
const leaderOf=name=>{const q=normName(decamel(name));return q?LEADERS.find(r=>r.k.includes(q)):null;};
async function fetchLeaders(){
  if(!TARGET||!WORKER)return;
  try{
    const u=`https://admin.esportsdesk.com/leagues/stats_hockey.cfm?clientid=${TARGET.m.clientid}&leagueid=${TARGET.m.leagueid}&printPage=1&_=${Date.now()}`;
    const doc=new DOMParser().parseFromString((await getText(u)).replace(/<\/span>/gi,"</span> "),"text/html");
    const tbl=doc.querySelector("table"); if(!tbl)return;
    const list=[...tbl.querySelectorAll("tr")].slice(1).map((r,i)=>{
      const c=[...r.children].map(x=>x.textContent.replace(/\s+/g," ").trim());
      // full display name = the wide-viewport span ("Alex Gagnon"), minus IM/AF import badges
      const wide=r.children[1]&&r.children[1].querySelector("span.d-none");
      const disp=properCase(String((wide?wide.textContent:c[1])||"").replace(/\b(IM|AF)\b/g,"").replace(/\s+/g," ").trim());
      return {k:normName(c[1]), disp, no:c[2]||"", teamK:normName(c[5]),
              rank:+c[0]||i+1, G:+c[7]||0, A:+c[8]||0, PTS:+c[9]||0};
    }).filter(r=>r.k);
    [...list].sort((a,b)=>b.G-a.G).forEach((r,i)=>r.gRank=i+1);
    if(list.length){LEADERS=list; lastSig="";}   // force a rebuild with fresh season context
  }catch(e){}
}
// rank clause used on a leader's FIRST goal of the strip; season count on later goals
function rankPhrase(row){
  const LG=LEAGUE.toUpperCase();
  if(row.gRank===1)   return `the ${LG}'s top goal scorer`;
  if(row.rank===1)    return `the ${LG}'s leading scorer`;
  if(row.rank===2)    return `second in ${LG} scoring`;
  if(row.rank===3)    return `third in ${LG} scoring`;
  if(row.rank<=10)    return `a top-ten ${LG} scorer`;
  return "";
}
function sortEvents(ev){
  return ev.map((e,i)=>({e,i})).sort((a,b)=>{
    const pa=PERI[a.e.per]!=null?PERI[a.e.per]:9, pb=PERI[b.e.per]!=null?PERI[b.e.per]:9;
    if(pa!==pb)return pa-pb;
    const ta=t2s(a.e.t), tb=t2s(b.e.t);
    if(ta>=0&&tb>=0&&ta!==tb)return tb-ta;      // clock counts DOWN: more time remaining = earlier
    return a.i-b.i;
  }).map(o=>o.e);
}
function numSpan(no,ink){return no?`<span class="no" style="color:${ink}">${esc(no)}</span> `:"";}
function nameSpan(nm,ink){return `<span class="pn" style="color:${ink}">${esc(nm)}</span>`;}
function playerSpan(no,nm,ink){return numSpan(no,ink)+nameSpan(nm,ink);}
// time clause WITHOUT trailing punctuation, so milestone clauses can follow it
function timeClause(kind,t,per){
  const pp=periodPhrase(per);
  if(per==="SO"||t2s(t)<0) return ` in ${pp}`;
  const word=kind==="goal"?"remaining":"left";
  return (kind==="goal"?", with ":" with ")+`<span class="tt">${esc(t)}</span> ${word} in ${pp}`;
}
// deterministic per-event template pick — stable across rebuilds so the strip never
// rewrites itself at a loop seam (Mat 2026-07-07: vary the wording, less mechanical)
function hashStr(s){let x=0;for(let i=0;i<s.length;i++){x=(x*31+s.charCodeAt(i))>>>0;}return x;}
const ordN=n=>{const m=n%100;return n+(m>10&&m<14?"th":["th","st","nd","rd"][Math.min(n%10,4)]||"th");};
const aAn=w=>/^[aeiou]/i.test(String(w).trim())?"an":"a";
// Broadcast-style goal call, template rotated per event. Shapes:
//   "SkyCity Stampede's third goal came from 24 Lachlan Frear on the power play, ..."
//   "24 Lachlan Frear scored SkyCity Stampede's third goal on the power play, ..."
//   "24 Lachlan Frear found the net on the power play for SkyCity Stampede's third goal, ..."
//   "24 Lachlan Frear struck on the power play for SkyCity Stampede's third goal, ..."
// game's 1st goal always: "{player} opened the scoring for {team}..."
// o = {first, cnt (scorer's Nth tonight), sea (season/rank clause), sit (lead-change clause)}
function goalSentence(e,nth,o){
  o=o||{};
  const v=vis(e.teamID), team=e.teamName||teamNameOf(e.teamID);
  const P=playerSpan(e.no,e.name,v.ink)+(o.sea?`, <span class="ms">${o.sea}</span>,`:"");
  const T=`<span class="tm" style="color:${v.ink}">${esc(team)}</span>`;
  const Tp=`<span class="tm" style="color:${v.ink}">${esc(poss(team))}</span>`;
  const fa=flagAdv(e.flag), flag=fa?`<span class="flag">${fa}</span>`:"";
  const ast=(!e.assists||!e.assists.length)?", unassisted"
    :", assisted by "+(e.assists.length===1?playerSpan(e.assists[0].no,e.assists[0].name,v.ink)
      :e.assists.slice(0,-1).map(a=>playerSpan(a.no,a.name,v.ink)).join(", ")+" and "
       +playerSpan(e.assists[e.assists.length-1].no,e.assists[e.assists.length-1].name,v.ink));
  const nthW=ordinal(nth);
  let core;
  if(o.first) core=`${P} opened the scoring for ${T}${flag}`;
  else switch(hashStr(e.name+"|"+e.t+"|"+e.per)%4){
    case 0: core=`${Tp} ${nthW} goal came from ${P}${flag}`; break;
    case 1: core=`${P} scored ${Tp} ${nthW} goal${flag}`; break;
    case 2: core=`${P} found the net${flag} for ${Tp} ${nthW} goal`; break;
    default:core=`${P} struck${flag} for ${Tp} ${nthW} goal`;
  }
  const parts=[];
  const ms=milestone(o.cnt||1); if(ms)parts.push(ms);
  if(o.sit)parts.push(o.sit);
  return core+ast+timeClause("goal",e.t,e.per)
    +(parts.length?` — <span class="ms">${parts.join(", ")}</span>`:"")+".";
}
// Penalty call, template rotated per event:
//   "26 Tristan Darling was called for Boarding with 9:43 left in the first period."
//   "26 Tristan Darling took a Boarding penalty with 9:43 left in the first period."
//   "26 Tristan Darling went to the box for Boarding with 9:43 left in the first period."
// Team penalty always: "Dunedin Thunder were called for Too Many Men ..."
function penSentence(e){
  const v=vis(e.teamID), team=e.teamName||teamNameOf(e.teamID);
  const inf=`<span class="inf">${esc((e.inf||"").trim())}</span>`;
  const tag=penTag(e.dur), tagS=tag?`<span class="dur">${esc(tag)}</span>`:"";
  const time=timeClause("pen",e.t,e.per);
  if(e.teamPen)
    return `<span class="tm" style="color:${v.ink}">${esc(team)}</span> were called for ${inf}${tagS}${time}.`;
  const P=playerSpan(e.no,e.name,v.ink);
  switch(hashStr(e.name+"|"+e.t+"|"+e.per)%3){
    case 0: return `${P} was called for ${inf}${tagS}${time}.`;
    case 1: return `${P} took ${aAn(e.inf)} ${inf} penalty${tagS}${time}.`;
    default:return `${P} went to the box for ${inf}${tagS}${time}.`;
  }
}
/* ---------- GAME-PHASE AWARENESS (2026-07-07): pregame preview / live recap / FINAL ----------
   Accuracy rule (Mat): every line is scraped or calculated — anything unresolved is OMITTED. */
let GM=null, ISFINAL=false, FINTYPE="", STAND=null, LASTMEET=null, pregameKicked=false;
async function fetchStandings(){
  if(!TARGET)return;
  try{
    const u=`https://admin.esportsdesk.com/leagues/standings.cfm?clientid=${TARGET.m.clientid}&leagueid=${TARGET.m.leagueid}&printPage=1&_=${Date.now()}`;
    const doc=new DOMParser().parseFromString(await getText(u),"text/html");
    const tbl=doc.querySelector("table"); if(!tbl)return;
    const rows=[...tbl.querySelectorAll("tr")].slice(1).map((r,i)=>{
      const c=[...r.children].map(x=>x.textContent.replace(/\s+/g," ").trim());
      return {k:normName(c[0]), pos:i+1, gp:+c[1]||0, pts:+c[6]||0};
    }).filter(r=>r.k);
    if(rows.length){STAND=rows; lastSig="";}
  }catch(e){}
}
const standOf=name=>{const q=normName(name);return (q&&STAND)?STAND.find(r=>r.k.includes(q)):null;};
// most recent completed meeting between tonight's clubs — walk sequential gameids downward;
// completed games have goals, shells don't (a real final can't be 0-0: OT/SO decides)
async function findLastMeeting(){
  if(!AWAYID||!HOMEID||!TARGET)return;
  const pair=[String(AWAYID),String(HOMEID)].sort().join("|");
  for(let g=+TARGET.gid-1; g>+TARGET.gid-26; g--){
    let P; try{ P=parse(await getText(boxURL(TARGET.m,g))); }catch(e){ continue; }
    if([String(P.away.teamID),String(P.home.teamID)].sort().join("|")!==pair) continue;
    if(!P.goals.length) continue;
    const aw=P.away.tot>P.home.tot;
    LASTMEET={wID:aw?P.away.teamID:P.home.teamID, wN:aw?P.away.name:P.home.name,
      ws:Math.max(P.away.tot,P.home.tot), ls:Math.min(P.away.tot,P.home.tot),
      ot:P.goals.some(x=>x.p==="OT"), so:P.goals.some(x=>x.p==="SO")};
    lastSig=""; return;
  }
}
// FINAL comes ONLY from the schedule page's own status text — never inferred from scores
async function fetchFinal(){
  if(ISFINAL||!TARGET)return;
  try{
    const u=`https://admin.esportsdesk.com/leagues/schedules.cfm?clientid=${TARGET.m.clientid}&leagueid=${TARGET.m.leagueid}&printPage=1&_=${Date.now()}`;
    const h=await getText(u);
    const i=h.search(new RegExp("gameid="+TARGET.gid+"\\b","i")); if(i<0)return;   // page writes "gameID=" — case-insensitive
    const chunk=h.slice(i,i+400).replace(/<[^>]+>/g," ").replace(/\s+/g," ");
    const m=chunk.match(/Final(?:\s*\/\s*(OT|SO))?/i);
    if(m){ISFINAL=true; FINTYPE=(m[1]||"").toUpperCase(); lastSig="";}
  }catch(e){}
}
// pregame preview strip — shown instead of events while the game has none
function pregameItems(){
  const out=[];
  const va=vis(AWAYID), vh=vis(HOMEID);
  const A=`<span class="tm" style="color:${va.ink}">${esc(AWAYN)}</span>`;
  const H=`<span class="tm" style="color:${vh.ink}">${esc(HOMEN)}</span>`;
  const lgCrest=`<span class="crest"><img src="${LEAGUE_LOGO[LEAGUE]||LEAGUE_LOGO.nzihl}" alt=""></span>`;
  if(GM&&GM.datetime&&Date.now()<new Date(GM.datetime).getTime()+30*60000){
    const d=new Date(GM.datetime), today=new Date().toDateString()===d.toDateString();
    const when=today?"today":d.toLocaleDateString("en-NZ",{weekday:"long",day:"numeric",month:"long"});
    out.push(lgCrest+`<span class="sent">Puck drop <span class="tt">${esc(GM.time||"")}</span> ${esc(when)}${GM.venue?` at ${esc(GM.venue)}`:""}</span>`);
  }
  const sa=standOf(AWAYN), sh=standOf(HOMEN);
  if(sa&&sh){
    const thru=sa.gp===sh.gp&&sa.gp>0?`Through ${sa.gp} games, `:"";
    out.push(crestHTML(AWAYID)+`<span class="sent">${thru}${A} sit <span class="sc">${ordN(sa.pos)}</span> in the ${LEAGUE.toUpperCase()} with <span class="sc">${sa.pts}</span> points — ${H} sit <span class="sc">${ordN(sh.pos)}</span> with <span class="sc">${sh.pts}</span> points</span>`+crestHTML(HOMEID));
  }
  [[AWAYID,AWAYN],[HOMEID,HOMEN]].forEach(([id,name])=>{
    const q=normName(name); if(!q||!LEADERS.length)return;
    const best=LEADERS.find(r=>r.teamK&&r.teamK.includes(q)); if(!best||!best.disp)return;
    const v=vis(id), rp=rankPhrase(best);
    const T=`<span class="tm" style="color:${v.ink}">${esc(name)}</span>`;
    out.push(crestHTML(id)+`<span class="sent">${playerSpan(best.no,best.disp,v.ink)} leads ${T} this season with <span class="sc">${best.PTS}</span> points — <span class="sc">${best.G}</span> goals and <span class="sc">${best.A}</span> assists${rp?`, <span class="ms">${rp}</span>`:""}</span>`);
  });
  if(LASTMEET){
    const wv=vis(LASTMEET.wID);
    const tail=LASTMEET.so?" in a shootout":LASTMEET.ot?" in overtime":"";
    out.push(crestHTML(LASTMEET.wID)+`<span class="sent"><span class="tm" style="color:${wv.ink}">${esc(LASTMEET.wN)}</span> took the last meeting between these clubs <span class="sc">${LASTMEET.ws}-${LASTMEET.ls}</span>${tail}</span>`);
  }
  return out;
}

/* ---------- AD SLOT (pre-wired 2026-07-07; goes live when a sponsor entry is added) ----------
   Select per broadcast via ?ad=<slug>. No param (or unknown slug) = no ad, page unchanged.
   The ad renders as a native strip item — sponsor logo in the crest slot + one styled line —
   inserted after each period divider (and at the end of the loop before any divider exists).
   To add a sponsor: drop a transparent PNG in nzihl-broadcast-assets/assets/ads/, then add:
     mysponsor:{img:"https://matchavez.com/nzihl-broadcast-assets/assets/ads/MySponsor.png",
                lead:"Tonight's broadcast is brought to you by", brand:"My Sponsor",
                url:"mysponsor.co.nz", accent:"#FAC805"},                                   */
const ADMAP={
  test:{img:"", lead:"This broadcast is brought to you by", brand:"Your Sponsor Here",
        url:"sponsor.co.nz", accent:"#FAC805"},   // ?ad=test = layout preview (league logo)
};
const AD=ADMAP[(Q.get("ad")||"").toLowerCase()]||null;
function adItem(){
  const img=AD.img||LEAGUE_LOGO[LEAGUE]||LEAGUE_LOGO.nzihl;
  return `<span class="crest"><img src="${img}" alt=""></span>`
    +`<span class="sent">${esc(AD.lead)} <span class="tm" style="color:${AD.accent}">${esc(AD.brand)}</span>`
    +(AD.url?` — <span class="ms">${esc(AD.url)}</span>`:"")+`</span>`;
}
// "END OF THE FIRST PERIOD — Dunedin Thunder 2, Canterbury Red Devils 1 — Shots 13-7
//  — Alexa Gibson has stopped 24 of 27; Aston Brookes has stopped 22 of 24"
// Goalie clause rides ONLY the LATEST divider: SA/SV are live-cumulative, so present-tense
// "has stopped" is only true at the current break — earlier breaks would be misstated.
function dividerItem(p,a,h,latest){
  const va=vis(AWAYID), vh=vis(HOMEID);
  let shots="";
  if(SOGA.length>=p&&SOGH.length>=p){
    const sa=SOGA.slice(0,p).reduce((x,y)=>x+y,0), sh=SOGH.slice(0,p).reduce((x,y)=>x+y,0);
    shots=` — Shots <span class="sc">${sa}-${sh}</span>`;
  }
  let gl="";
  if(latest&&GLS.length){
    const line=g=>`<span class="pn" style="color:${vis(g.teamID).ink}">${esc(g.name)}</span> has stopped <span class="sc">${g.sv}</span> of <span class="sc">${g.sa}</span>`;
    const parts=GLS.filter(g=>String(g.teamID)===String(AWAYID)).concat(GLS.filter(g=>String(g.teamID)===String(HOMEID))).map(line);
    if(parts.length)gl=` — ${parts.join("; ")}`;
  }
  return `<span class="sent"><span class="div">END OF THE ${["FIRST","SECOND","THIRD"][p-1]} PERIOD</span>`
    +` — <span class="tm" style="color:${va.ink}">${esc(AWAYN)}</span> <span class="sc">${a}</span>,`
    +` <span class="tm" style="color:${vh.ink}">${esc(HOMEN)}</span> <span class="sc">${h}</span>${shots}${gl}</span>`;
}
function teamNameOf(id){return id===AWAYID?AWAYN:id===HOMEID?HOMEN:(vis(id).code||"");}
function crestHTML(id){const v=vis(id);
  return v.logo?`<span class="crest"><img src="${LOGO+encodeURIComponent(v.logo)}" alt=""></span>`:`<span class="crest"></span>`;}
function sepHTML(){return `<span class="lsep"><img src="${LEAGUE_LOGO[LEAGUE]||LEAGUE_LOGO.nzihl}" alt=""></span>`;}
// game-score line — ALWAYS the first message of the loop (Mat 2026-07-07):
//   (away logo) Away Name 0 - 0 Home Name (home logo)
function scoreItem(){
  const va=vis(AWAYID), vh=vis(HOMEID);
  return crestHTML(AWAYID)
    +`<span class="sent">${ISFINAL?`<span class="div">FINAL${FINTYPE?" ("+FINTYPE+")":""}</span> — `:""}<span class="tm" style="color:${va.ink}">${esc(AWAYN)}</span> `
    +`<span class="sc">${AWAYTOT}</span> <span class="scd">-</span> <span class="sc">${HOMETOT}</span> `
    +`<span class="tm" style="color:${vh.ink}">${esc(HOMEN)}</span></span>`
    +crestHTML(HOMEID);
}
function buildItems(events){
  const sorted=sortEvents(events);
  const out=[]; if(AWAYN||HOMEN) out.push(scoreItem());
  const counts={}, byPlayer={}, tonight={}, everLed={};
  sorted.forEach(e=>{if(e.kind==="goal"){const pk=String(e.teamID)+"|"+e.name;tonight[pk]=(tonight[pk]||0)+1;}});
  let ta=0, th=0, total=0;   // running away/home tally — each goal call ends "(a-h)"
  const renderEv=e=>{
    if(e.kind==="goal"){
      const k=String(e.teamID); counts[k]=(counts[k]||0)+1;
      const pk=k+"|"+e.name; byPlayer[pk]=(byPlayer[pk]||0)+1;
      const isA=k===String(AWAYID), isH=k===String(HOMEID);
      const myB=isA?ta:th, oppB=isA?th:ta;   // tallies BEFORE this goal, scorer's perspective
      if(isA)ta++; else if(isH)th++;
      total++;
      const myA=myB+1;
      // season / league-rank clause (leaders table): rank line on the scorer's first goal
      // of the strip, running season count ("his 14th of the season") on later ones
      let sea="";
      const row=leaderOf(e.name);
      if(row){
        if(byPlayer[pk]===1) sea=rankPhrase(row);
        if(!sea){const s=row.G-((tonight[pk]||0)-byPlayer[pk]); if(s>=5) sea=`${pron()} ${ordN(s)} of the season`;}
      }
      // lead-change awareness: tie / first lead / regained lead / back within one / OT winner
      const T=`<span class="tm" style="color:${vis(e.teamID).ink}">${esc(e.teamName||teamNameOf(e.teamID))}</span>`;
      let sit="";
      if(e.per==="OT") sit="the overtime winner";
      else if(total>1&&(isA||isH)){
        if(myA===oppB) sit=`tying the game at ${myA}`;
        else if(myA>oppB&&myB===oppB) sit=everLed[k]?`putting ${T} back in front`:`giving ${T} their first lead of the night`;
        else if(myA<oppB&&oppB-myA===1) sit=`pulling ${T} back within one`;
      }
      // game-winning goal (only once the schedule says FINAL): the winner's goal that the
      // loser never answered — standard definition, loserTotal+1
      if(ISFINAL&&AWAYTOT!==HOMETOT){
        const wId=AWAYTOT>HOMETOT?String(AWAYID):String(HOMEID);
        if(k===wId&&counts[k]===Math.min(AWAYTOT,HOMETOT)+1)
          sit=(e.per==="OT")?"the overtime winner":"the game-winning goal";
      }
      if(myA>oppB)everLed[k]=true;
      return crestHTML(e.teamID)+`<span class="sent">${goalSentence(e,counts[k]-1,{first:total===1,cnt:byPlayer[pk],sea,sit})} <span class="sc">(${ta}-${th})</span></span>`;
    }
    return crestHTML(e.teamID)+`<span class="sent">${penSentence(e)}</span>`;
  };
  // walk the game period by period; drop an END OF PERIOD divider (score at the break +
  // cumulative shots) after each period the game has moved past
  const ORDER=["1","2","3","OT","SO"];
  let adPlaced=false;
  ORDER.forEach(p=>{
    sorted.filter(e=>e.per===p).forEach(e=>out.push(renderEv(e)));
    if(["1","2","3"].includes(p)&&+p<PERSDONE){
      out.push(dividerItem(+p,ta,th,+p===Math.min(PERSDONE-1,3)));   // latest break carries the goalie line
      if(AD){out.push(adItem());adPlaced=true;}   // sponsor line rides the period break
    }
  });
  sorted.filter(e=>!ORDER.includes(e.per)).forEach(e=>out.push(renderEv(e)));   // unknown periods: tail
  if(!sorted.length) out.push(...pregameItems());   // no events yet: the preview show
  if(AD&&!adPlaced) out.push(adItem());          // no divider yet (e.g. mid-P1): end of loop
  return out;
}

/* ====================== MARQUEE ENGINE ====================== */
const tick=document.getElementById("tick"), track=document.getElementById("track");
let items=[], dirty=true, unitW=0, offset=0, running=false, visible=false;
let traveled=0, lastT=0, cycles=0;   // wall-clock-driven: position stays correct even if frames throttle
let SW=0;                            // scroll-area width (right of the fixed "Recap:" label)
// Startup (Mat 2026-07-07): the score line appears ALONE, CENTERED, holds 7s, then the crawl
// begins (score slides left, the recap feed follows in from the right).
const HOLD_MS=7000;
let ENTRY=0, holdUntil=0, holding=false;
function enterHold(){
  if(!items.length){holding=false;return;}
  track.innerHTML=`<span class="item"><span class="scoreit">${items[0]}</span></span>`;
  SW=document.getElementById("swrap").clientWidth;
  const w0=track.querySelector(".scoreit").offsetWidth;
  ENTRY=Math.max(0,(SW-w0)/2);
  traveled=0; cycles=0; dirty=true;          // full strip re-rendered when the hold ends
  holdUntil=performance.now()+HOLD_MS; holding=true;
  offset=ENTRY; track.style.transform="translateX("+ENTRY+"px)";
}
function placeTick(){
  tick.style.left=TICK.x+"px"; tick.style.top=TICK.y+"px";
  tick.style.width=TICK.w+"px"; tick.style.height=TICK.h+"px";
  tick.style.setProperty("--th",TICK.h+"px");
  tick.style.fontSize=Math.max(14,Math.round(TICK.h*0.37))+"px";   // label + crawl share the size
}
let hadContent=false;
function rebuild(){
  hadContent=items.length>0;
  const unit=`<span class="item">`+items.map(i=>i+sepHTML()).join("")+`</span>`;
  track.innerHTML=unit;
  SW=document.getElementById("swrap").clientWidth;        // layout px — transform-independent
  unitW=track.firstElementChild.offsetWidth;
  if(unitW<1)unitW=SW||TICK.w;
  const copies=Math.max(2,Math.ceil((SW+unitW)/unitW)+1);
  track.innerHTML=new Array(copies).fill(unit).join("");
  dirty=false;
}
// Position is a pure function of elapsed wall-clock time, NOT accumulated frame deltas —
// rAF throttles to ~1fps in occluded/hidden windows (caught live 2026-07-07), and some capture
// devices throttle too. Time-based travel means any frame rate shows the CORRECT position;
// the 250ms interval fallback keeps it moving even when rAF stalls entirely.
function step(now){
  if(!running)return;
  now=(now==null||now<=0)?performance.now():now;
  if(!lastT)lastT=now;
  // rAF timestamps lag performance.now() by a few ms; NEVER move lastT backwards or the
  // overlap gets double-counted when rAF + interval interleave (measured 1.22x, 2026-07-07)
  if(holding){
    if(now<holdUntil){ lastT=now; return; }        // score line parked centre — clock doesn't accrue
    holding=false; rebuild(); traveled=0; cycles=0; lastT=now;   // hold over: full strip, crawl begins
  }
  const d=now-lastT; if(d>0){ traveled+=d/1000*SPEED; lastT=now; }
  if(unitW>0){
    if(traveled<ENTRY){ offset=ENTRY-traveled; }   // entry: score slides left from centre; feed follows from the right
    else{
      const t2=traveled-ENTRY;
      const c=Math.floor(t2/unitW);
      if(c!==cycles){ cycles=c; if(dirty){ rebuild(); traveled=ENTRY; cycles=0; } }  // splice new events at the seam
      offset=-((traveled-ENTRY)%unitW);
    }
  }
  track.style.transform="translateX("+offset+"px)";
}
function raf(ts){ if(!running)return; step(ts); requestAnimationFrame(raf); }
function startTicker(){
  if(running)return; running=true;
  if(dirty)rebuild();
  requestAnimationFrame(raf);
  setInterval(()=>step(),250);   // fallback cadence when rAF is throttled
}
function showTicker(){ if(visible)return; visible=true; tick.classList.add("on"); startTicker(); updDiag(); }
function setItems(list){
  items=list; dirty=true;
  if(!visible||unitW<1||!hadContent){ rebuild(); enterHold(); }   // fresh start: score centred + 7s hold, then crawl
  // else: rebuild happens seamlessly at the next loop boundary
}
const FONTS=(document.fonts&&document.fonts.ready)?document.fonts.ready:Promise.resolve();
FONTS.then(()=>{ if(items.length){ dirty=true; if(holding)enterHold(); else if(!visible){rebuild();traveled=0;cycles=0;} } });   // re-measure the centred hold once Inter lands

/* ====================== LIVE DETECTION ====================== */
let TARGET=null, lastSig="";
async function getJSON(u){const r=await fetch(u,{cache:"no-store"});if(!r.ok)throw 0;return r.json();}
async function getText(u){const r=await fetch(SHIM(u),{cache:"no-store"});if(!r.ok)throw 0;return r.text();}
function boxURL(m,gid){return `https://admin.esportsdesk.com/leagues/hockey_boxscores.cfm?clientid=${m.clientid}&leagueid=${m.leagueid}&gameid=${gid}&printPage=1&_=${Date.now()}`;}
const slug=s=>String(s||"").toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");

async function resolveTarget(){
  const team=Q.get("team"), g=Q.get("g")||Q.get("gameid");
  const lp=(Q.get("l")||Q.get("league")||"").toLowerCase();
  if(g){const m=MANIFESTS.find(x=> Q.get("w")==="1"||lp.startsWith("nzw")||lp==="w" ? x.league==="nzwihl":x.league==="nzihl");return {m,gid:g,gm:null};}
  const slugTeam=slug(team||"canterbury-red-devils");
  const cands=[];
  for(const m of MANIFESTS){let data;try{data=await getJSON(m.url);}catch(e){continue;}
    (data.games||[]).forEach(gm=>{
      if(!gm.gameid)return;
      if(slug(gm.away)!==slugTeam&&slug(gm.home)!==slugTeam)return;
      cands.push({m,gid:gm.gameid,gm,dt:new Date(gm.datetime||gm.date).getTime()||0});});}
  if(!cands.length)return null;
  const now=Date.now(), LIVE=5*3600*1000;
  const live=cands.filter(c=>c.dt>=now-LIVE).sort((a,b)=>a.dt-b.dt);
  const pick=live[0]||cands.sort((a,b)=>b.dt-a.dt)[0];
  return {m:pick.m,gid:pick.gid,gm:pick.gm};
}

function liveEvents(P){
  const ev=[];
  P.goals.forEach(g=>{
    const assists=(!g.a||/^unassisted$/i.test(g.a))?[]:g.a.split(",").map(s=>s.trim()).filter(Boolean)
      .map(raw=>({no:lookupNum(P.skaters,raw),name:properFull(raw)}));
    ev.push({kind:"goal",teamID:g.teamID,per:g.p,t:g.t,no:g.no,name:properFull(g.who),assists,flag:g.flag});
  });
  P.pens.forEach(p=>{
    const teamPen=!p.no;
    ev.push({kind:"pen",teamID:p.teamID,per:p.p,t:p.t,no:p.no,
      name:teamPen?teamNameOf(p.teamID):properFull(p.who),inf:p.inf,dur:p.dur,teamPen});
  });
  return ev;
}
async function tickPoll(){
  if(!TARGET||!WORKER)return;
  let P; try{ P=parse(await getText(boxURL(TARGET.m,TARGET.gid))); }catch(e){ return; }
  AWAYID=P.away.teamID; HOMEID=P.home.teamID; AWAYN=P.away.name; HOMEN=P.home.name;
  lastEv=liveEvents(P);
  const PNUM={"1":1,"2":2,"3":3,"OT":4,"SO":5};
  if(TESTMODE){
    // test pretends we're heading into the SECOND INTERMISSION: only periods 1+2 exist,
    // the score line reflects just those goals, and dividers close periods 1 AND 2
    lastEv=lastEv.filter(e=>e.per==="1"||e.per==="2");
    AWAYTOT=lastEv.filter(e=>e.kind==="goal"&&e.teamID===AWAYID).length;
    HOMETOT=lastEv.filter(e=>e.kind==="goal"&&e.teamID===HOMEID).length;
    SOGA=(P.sogA||[]).slice(0,2); SOGH=(P.sogH||[]).slice(0,2);
    PERSDONE=3;
    // goalie numbers re-derived for the two-period fiction: SA = opponent shots through P2,
    // SV = SA − goals conceded through P2; attributed to each team's primary (highest-SA) goalie
    GLS=[];
    const prim=id=>(P.goalies||[]).filter(g=>String(g.teamID)===String(id)).sort((x,y)=>y.sa-x.sa)[0];
    const ga=prim(AWAYID), gh=prim(HOMEID);
    const sHome=SOGH.reduce((x,y)=>x+y,0), sAway=SOGA.reduce((x,y)=>x+y,0);
    if(ga&&sHome)GLS.push({teamID:AWAYID,name:ga.name,sa:sHome,sv:sHome-HOMETOT});
    if(gh&&sAway)GLS.push({teamID:HOMEID,name:gh.name,sa:sAway,sv:sAway-AWAYTOT});
  }else{
    AWAYTOT=P.away.tot||0; HOMETOT=P.home.tot||0;
    SOGA=P.sogA||[]; SOGH=P.sogH||[];
    GLS=P.goalies||[];
    // how far has the game progressed? shots-paren entries appear per period as it's played,
    // and any event in a later period also moves the marker
    PERSDONE=Math.max(1,SOGA.length,SOGH.length,...lastEv.map(e=>PNUM[e.per]||0));
  }
  const all=lastEv.concat(extras);
  const sig=AWAYTOT+"-"+HOMETOT+"~P"+PERSDONE+"~S"+SOGA.join(".")+"/"+SOGH.join(".")
    +"~G"+GLS.map(g=>g.name+g.sv+"/"+g.sa).join(",")+"~"
    +all.map(e=>[e.kind,e.teamID,e.per,e.t,e.no,e.name,e.inf,e.flag].join("|")).join("~");
  if(sig!==lastSig){ lastSig=sig; setItems(buildItems(all)); updDiag(all.length); }
}

/* ====================== TEST MODE ======================
   ?test=1 feeds a REAL prior game through the live pipeline (DEMO_GAME below; ?g= overrides),
   so the test exercises the actual parser/roster-number/pill path (Mat 2026-07-07).
   The +Goal/+Penalty buttons append SYNTHETIC extra events on top of the real feed to
   exercise mid-crawl splicing, PP/SH phrasing and severity tags on demand. */
// Test = the LAST Red Devils–Thunder game, trimmed to periods 1+2 as if heading into the
// second intermission (Mat 2026-07-07). Filter + score-recount happen in tickPoll.
const DEMO_GAME=2519940;   // Dunedin Thunder 4 @ Canterbury Red Devils 6 (full game; test shows P1+P2 only)
let lastEv=[], extras=[];
const TPOOL={goals:[{no:7,name:"Te Rangi Henare",flag:"PPG"},{no:41,name:"Marcus Henderson",flag:"SHG"},{no:12,name:"Wiremu Mikaere",flag:""}],
  pens:[["Slashing","2 Minutes"],["Hooking","4 Minutes"],["Fighting","5 Minutes"]]};
const rndT=()=> (Math.floor(Math.random()*15)+1)+":"+String(Math.floor(Math.random()*60)).padStart(2,"0");
function refreshTest(){ setItems(buildItems(lastEv.concat(extras))); updDiag(lastEv.length+extras.length); }
function pushTestGoal(){const p=TPOOL.goals[extras.length%3];
  extras.push({kind:"goal",teamID:(extras.length%2?HOMEID:AWAYID)||"675635",per:"OT",t:rndT(),
    no:p.no,name:p.name,flag:p.flag,assists:extras.length%2?[]:[{no:4,name:"Josh Reid"}]});
  refreshTest();}
function pushTestPen(){const p=TPOOL.pens[extras.length%3];
  extras.push({kind:"pen",teamID:(extras.length%2?AWAYID:HOMEID)||"675633",per:"OT",t:rndT(),
    no:19,name:"Tyler Walker",inf:p[0],dur:p[1]});
  refreshTest();}

/* ====================== INIT ====================== */
let stageScale=1;
function fitWindow(){stageScale=Math.min(innerWidth/1920,innerHeight/1080);
  document.getElementById("stage").style.transform="scale("+stageScale+")";}
addEventListener("resize",fitWindow);
const diag=document.getElementById("diag");
function updDiag(n){ if(!TESTMODE)return;
  diag.textContent=(TARGET?("game "+TARGET.gid):"no-game")
    +" · "+(n!=null?n+" events":"")+" · "+SPEED+"px/s"; }

async function start(){
  const teamSlug=slug(Q.get("team")||"canterbury-red-devils");
  let bugFallback=false;
  if(!Q.get("bug")){
    if(BUGMAP[teamSlug]) SCOREBUG_SRC=SINGULAR(BUGMAP[teamSlug]);
    else { SCOREBUG_SRC=SINGULAR(BUG_CHC); bugFallback=true; }
  }
  fitWindow(); placeBug(); placeTick();

  showTicker();   // no delay — ticker is on from load (Mat 2026-07-07)

  if(TESTMODE){
    document.getElementById("test").style.display="flex";
    diag.style.display="block";
    document.getElementById("tGoal").onclick=pushTestGoal;
    document.getElementById("tPen").onclick=pushTestPen;
    document.getElementById("tSlow").onclick=()=>{SPEED=Math.max(20,SPEED-20);updDiag();};
    document.getElementById("tFast").onclick=()=>{SPEED+=20;updDiag();};
  }

  if(TESTMODE&&!Q.get("g")&&!Q.get("gameid")){
    TARGET={m:MANIFESTS[0], gid:DEMO_GAME, gm:null};   // test = a real prior game through the live pipeline
  }else{
    TARGET=await resolveTarget();
  }
  if(TARGET&&TARGET.m)LEAGUE=TARGET.m.league;
  if(TARGET&&TARGET.gm&&TARGET.gm.venue)VENUE=TARGET.gm.venue;
  if(TARGET&&TARGET.gm){AWAYN=AWAYN||TARGET.gm.away;HOMEN=HOMEN||TARGET.gm.home;}

  updDiag();
  GM=TARGET&&TARGET.gm;
  if(TARGET&&WORKER){
    await fetchLeaders();   // season context in place before the first strip renders
    await tickPoll();
    if(!items.length) setItems(buildItems([]));   // score line loops until the first event
    if(!TESTMODE&&!lastEv.length&&!pregameKicked){ pregameKicked=true; fetchStandings(); findLastMeeting(); }
    if(!TESTMODE&&PERSDONE>=3)fetchFinal();
    const t0=Date.now(); let n=0;
    const iv=setInterval(()=>{ if(Date.now()-t0>RUN_CAP){clearInterval(iv);return;}
      if(++n%5===0){ fetchLeaders();   // leaders refresh ~every 60s, box score every 12s
        if(!TESTMODE&&PERSDONE>=3&&!ISFINAL)fetchFinal(); }
      tickPoll(); },POLL_MS);
  } else if(!items.length){ setItems(buildItems([])); }
}
start();
</script>
