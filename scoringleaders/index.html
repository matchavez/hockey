<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="utf-8">
<title>NZIHL Team Scoring Leaders</title>
<script>
// Background mode toggle — identical convention to summary/index.html:
// ?bg=opaque = translucent-but-highly-opaque stage (.92 alpha + 14px blur),
// default (no param, or ?bg=black) = solid stage. Set before first paint.
if (new URLSearchParams(location.search).get('bg') === 'opaque') {
  document.documentElement.classList.add('bg-opaque');
}
</script>
<style>
@font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable.woff2') format('woff2');}
@font-face{font-family:'Inter';font-style:italic;font-weight:100 900;font-display:swap;src:url('../assets/fonts/InterVariable-Italic.woff2') format('woff2');}
:root{ --bg:#0b0b0d; --fg:#f4f6fa; --sub:#c3c9d4; --dim:#878d99; }
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#000;font-family:Inter,-apple-system,Segoe UI,sans-serif;font-feature-settings:"tnum" 1,"cv05" 1;-webkit-font-smoothing:antialiased;}
html.bg-opaque, html.bg-opaque body{background:transparent;}
html.bg-opaque{--bg:rgba(9,9,11,.92);}
html.bg-opaque #stage{-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);}
#fit{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
#stage{width:1840px;height:1000px;flex:0 0 auto;position:relative;color:var(--fg);background:var(--bg);overflow:hidden;display:flex;flex-direction:column;
  opacity:0;transition:opacity .35s ease;}
/* Nothing renders — no stage, no "Loading…" text, no setup-error text — until the
   first team's leaders have actually loaded and rendered. Same treatment as
   summary.html (Mat, 2026-07-11): matches activity-banner's "show nothing until
   ready" philosophy; #msg is a child of #stage so hiding the parent hides every
   interim/error string underneath it too, with zero changes needed to showMsg(). */
#stage.ready{opacity:1;}
#wash{position:absolute;left:0;top:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.55;}
.livedot{position:absolute;top:16px;left:22px;z-index:6;width:14px;height:14px;border-radius:50%;background:#5fe39a;box-shadow:0 0 0 0 rgba(95,227,154,.6);opacity:0;transition:opacity .2s ease;}
.livedot.scraping{opacity:1;animation:pl 2.2s ease-out infinite;}
@keyframes pl{0%{box-shadow:0 0 0 0 rgba(95,227,154,.55)}70%{box-shadow:0 0 0 11px rgba(95,227,154,0)}100%{box-shadow:0 0 0 0 rgba(95,227,154,0)}}

header#hdr{height:333px;flex:0 0 auto;display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 130px;position:relative;z-index:1;}
.hdr-logo{height:190px;max-width:420px;object-fit:contain;filter:drop-shadow(0 10px 24px rgba(0,0,0,.5));}
.hdr-mid{text-align:center;padding:0 24px;}
.kicker{font-weight:700;font-size:24px;letter-spacing:.14em;color:#b9becc;text-transform:uppercase;}
.title{font-weight:800;font-size:58px;letter-spacing:.01em;margin-top:14px;text-shadow:0 0 26px rgba(255,255,255,.28);}
.sub{font-weight:500;font-size:19px;color:var(--sub);margin-top:14px;}
.hline{height:1px;margin:0 56px;background:rgba(255,255,255,.16);flex:0 0 auto;}

#grid{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:1fr 1fr;position:relative;z-index:1;padding:24px 0 40px;}
#grid::after{content:"";position:absolute;left:50%;top:24px;bottom:40px;width:1px;background:rgba(255,255,255,.18);}
.col{display:flex;flex-direction:column;gap:16px;min-width:0;}
.col.left{padding:0 26px 0 56px;}
.col.right{padding:0 56px 0 26px;}

.prow{flex:1;position:relative;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.14);border-radius:16px;display:flex;align-items:center;padding:0 28px;gap:28px;min-height:0;}
.prow.right{flex-direction:row-reverse;}
.accent{flex:0 0 8px;align-self:stretch;border-radius:4px;}

.photo{flex:0 0 auto;border-radius:50%;overflow:hidden;background:#1b2029;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 6px 18px rgba(0,0,0,.4);}
.photo img{width:100%;height:100%;object-fit:cover;object-position:50% 16%;}
.photo .ini{font-weight:800;color:#a9b1bf;}

.ptext{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:14px;}
.prow.right .ptext{align-items:flex-end;text-align:right;}
/* Three equally-sized lines (Mat, 2026-07-09): #nn Pos Name / G · A · Pts · +/- / (dot) stat (dot).
   Uniform size for now — a deliberate simplification pass, expect this to get
   re-differentiated (weights/sizes) once he's seen it live. */
/* No truncation, ever (Mat's rule) — .pline is intentionally NOT clipped;
   fitPlayerText() (below, called after every render) shrinks each line's own
   font-size until it actually fits its row, rather than ellipsizing. */
.pline{font-weight:700;font-size:40px;line-height:1.15;color:#f5f6fa;white-space:nowrap;}
.pline.descr{font-style:italic;font-size:32px;color:#c9cdd6;}
.pline .jnum{font-size:.75em;font-weight:800;} /* jersey number — back to a distinct (smaller, heavier) treatment vs the position letter */
.pline .unit{font-weight:300;font-size:.6em;} /* the G / A / Pts unit letters on the stat line */
.pline .pm{font-weight:300;} /* the +/- value */

#msg{position:absolute;inset:0;z-index:7;display:flex;align-items:center;justify-content:center;text-align:center;
  color:var(--sub);font-size:28px;font-weight:600;padding:60px;line-height:1.5;background:var(--bg);}
</style>
</head>
<body>
<div id="fit"><div id="stage">
  <div id="wash"></div>
  <span class="livedot"></span>
  <header id="hdr">
    <img class="hdr-logo" id="logoA" alt="">
    <div class="hdr-mid">
      <div class="kicker" id="kicker"></div>
      <div class="title">TEAM SCORING LEADERS</div>
      <div class="sub" id="sub"></div>
    </div>
    <img class="hdr-logo" id="logoB" alt="">
  </header>
  <div class="hline"></div>
  <div id="grid">
    <div class="col left" id="colA"></div>
    <div class="col right" id="colB"></div>
  </div>
  <div id="msg" style="display:none"></div>
</div></div>

<script>
// ---- config --------------------------------------------------------------
// Same Cloudflare Worker Game Summary uses (already allowlists stats_1team.cfm).
const WORKER = "https://blue-butterfly-aa69.matchavez.workers.dev";
const SHIM = u => WORKER ? (WORKER.replace(/\/$/,"") + "?url=" + encodeURIComponent(u)) : null;
const MANIFESTS = [
  {league:"nzihl",  url:"https://raw.githubusercontent.com/matchavez/nzihl-broadcast-rosters/main/boxscores.json",  clientid:7131, leagueid:35499},
  {league:"nzwihl", url:"https://raw.githubusercontent.com/matchavez/nzwihl-broadcast-rosters/main/boxscores.json", clientid:7132, leagueid:35501},
];
// Season data warehouse — static JSON, direct fetch (GitHub raw sends CORS headers, no Worker needed).
const WAREHOUSE = {
  nzihl:  "https://raw.githubusercontent.com/matchavez/nzihl-season-data/main/nzihl.json",
  nzwihl: "https://raw.githubusercontent.com/matchavez/nzihl-season-data/main/nzwihl.json",
};
const LOGO = "https://matchavez.com/nzihl-broadcast-assets/assets/logos/";
const SHOT = "https://admin.esportsdesk.com/media/leagues/6795/graphics/";
const STATS_URL = "https://admin.esportsdesk.com/leagues/stats_1team.cfm";

// team visuals + display name (name MUST match boxscores.json's away/home strings exactly)
const REG = {
 "674110":{code:"ADM", ink:"#2F6FE0", dark:"#081D48", logo:"Pure-NZ-Admirals-2000x2000.png", venue:"Paradice Avondale", name:"Pure NZ Admirals"},
 "675633":{code:"CRD", ink:"#E5242B", dark:"#550000", logo:"Red Devils 2000x2000r.png",       venue:"Alpine Ice Centre", name:"Canterbury Red Devils"},
 "675634":{code:"DUN", ink:"#1E9E63", dark:"#012C1E", logo:"Dunedin_Thunder.png",              venue:"Dunedin Ice Stadium", name:"Dunedin Thunder"},
 "675635":{code:"SCS", ink:"#FAC805", dark:"#162543", logo:"Skycity Stampede 2000x2000.png",   venue:"Queenstown Ice Arena", name:"SkyCity Stampede"},
 "674109":{code:"BSW", ink:"#C2455A", dark:"#441620", logo:"Botany Swarm 2000x2000.png",       venue:"Paradice Botany", name:"Botany Swarm"},
 "675636":{code:"AST", ink:"#9FB6C8", dark:"#18263E", logo:"Auckland-Steel-White.png",         venue:"Paradice Avondale", name:"Auckland Steel"},
 "675637":{code:"CIN", ink:"#E0564E", dark:"#550000", logo:"Inferno-White.png",                venue:"Alpine Ice Centre", name:"Canterbury Inferno"},
 "675638":{code:"DTW", ink:"#1E9E63", dark:"#012C1E", logo:"thunder-women-white.png",          venue:"Dunedin Ice Stadium", name:"Dunedin Thunder Women"},
 "675639":{code:"WLD", ink:"#FAC805", dark:"#162543", logo:"Wakatipu-wild-white.png",          venue:"Queenstown Ice Arena", name:"Wakatipu Wild"},
};
const DEFV={ink:"#9aa3ad", dark:"#262a31", logo:"", venue:"", name:""};
const vis = id => REG[id] || DEFV;
const NAME_TO_ID = Object.fromEntries(Object.entries(REG).map(([id,v]) => [v.name, id]));

// ---- helpers ---------------------------------------------------------------
const slug = s => s.toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
const normName = s => (s||"").toLowerCase().replace(/[^a-z]/g,"");
const ini = n => n.split(/\s+/).map(w=>w[0]).filter(Boolean).join("").slice(0,2).toUpperCase();
const fmtPM = v => v > 0 ? ("+"+v) : String(v);
const shotURL = n => SHOT + encodeURIComponent(n.replace(/\s+/g,"")) + ".jpg";
function properCase(s){
  if(!s) return s;
  const letters = s.replace(/[^a-zA-Z]/g,"");
  if(!letters) return s;
  const allUpper = letters===letters.toUpperCase() && letters!==letters.toLowerCase();
  const allLower = letters===letters.toLowerCase() && letters!==letters.toUpperCase();
  if(!allUpper && !allLower) return s;
  return s.toLowerCase().replace(/(^|[\s\-'.(])([a-z])/g,(m,p1,p2)=>p1+p2.toUpperCase());
}
// SINGLE SOURCE OF TRUTH (2026-07-13): fetched from nzihl-broadcast-assets'
// name-overrides.json by loadNameOverrides() (awaited at the top of start()).
// This hardcoded value is only the FALLBACK used if that fetch fails or
// times out -- an on-air graphic must never lose a name correction to a
// network hiccup.
let PAREN_STRIPS=[{re:/Shattock\s*\(\s*Niskakoski\s*\)/gi,to:"Shattock"}];
const NAME_OVERRIDES_URL="https://raw.githubusercontent.com/matchavez/nzihl-broadcast-assets/main/assets/name-overrides.json";
async function loadNameOverrides(){
  try{
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),2500);
    const r=await fetch(NAME_OVERRIDES_URL,{cache:"no-store",signal:ctrl.signal});
    clearTimeout(t);
    const cfg=await r.json();
    if(cfg&&Array.isArray(cfg.parenthetical_strips)){
      PAREN_STRIPS=cfg.parenthetical_strips.map(p=>({re:new RegExp(p.find,p.flags||"gi"),to:p.replace}));
    }
  }catch(e){ /* keep the hardcoded fallback above -- never break an on-air graphic over this */ }
}
function stripParens(s){ PAREN_STRIPS.forEach(p=>{ s=s.replace(p.re,p.to); }); return s; }
function decodeEntities(s){
  const ta = document.createElement("textarea");
  ta.innerHTML = s;
  return ta.value;
}
// Quote-aware tag stripper (ported from the roster scraper's _TAG_RE) — a
// naive <[^>]+> stops at the first bare '>' even inside a quoted attribute
// (esportsdesk tooltip titles sometimes embed one), which garbles cells.
const TAG_RE = /<(?:"[^"]*"|'[^']*'|[^>"'])*>/g;
function clean(tdHtml){ return decodeEntities(tdHtml.replace(TAG_RE,"")).replace(/\s+/g," ").trim(); }

// ---- parse stats_1team.cfm PLAYER STATISTICS table (ported from
// nzihl-broadcast-rosters/scraper.py: header-label-driven column lookup, not
// fixed offsets — stats_1team.cfm has shipped more than one column layout). ----
function parseSkaterTable(html){
  const blockM = html.match(/PLAYER STATISTICS[\s\S]*?TEAM TOTALS/i);
  if(!blockM) return [];
  const block = blockM[0];
  const trs = [...block.matchAll(/<tr[^>]*>([\s\S]*?)<\/tr>/gi)];
  if(!trs.length) return [];
  const ths = [...trs[0][1].matchAll(/<th[^>]*>([\s\S]*?)<\/th>/gi)].map(m=>clean(m[1]).toUpperCase());
  const col = {}; ths.forEach((t,i)=>{ if(!(t in col)) col[t]=i; });
  const idxNum = col["#"] ?? 2, idxPos = col["POSITION"] ?? 3, idxGp = col["GP"] ?? 4,
        idxG = col["G"] ?? 5, idxA = col["A"] ?? 6;
  const idxPM = col["+/-"] ?? -1; // optional — not part of the "need" floor below
  const need = Math.max(idxNum,idxPos,idxGp,idxG,idxA) + 1;
  const rows = [];
  for(const trm of trs){
    const rowHtml = trm[1];
    const linkM = rowHtml.match(/<a[^>]*href="[^"]*playerID=(\d+)[^"]*"[^>]*title="([^"]+)"[^>]*>/i);
    if(!linkM) continue;
    const pid = linkM[1];
    const name = properCase(stripParens(decodeEntities(linkM[2]).trim())); // 2026-07-13: single-source parenthetical strips (nzihl-broadcast-assets/assets/name-overrides.json)
    const tds = [...rowHtml.matchAll(/<td[^>]*>([\s\S]*?)<\/td>/gi)].map(m=>clean(m[1]));
    if(tds.length < need) continue;
    const jersey = parseInt(tds[idxNum]) || 0;
    const pos = (tds[idxPos]||"").trim();
    const gp = parseInt(tds[idxGp]) || 0;
    const g = parseInt(tds[idxG]) || 0;
    const a = parseInt(tds[idxA]) || 0;
    if(!name) continue;
    let pm = 0;
    if(idxPM >= 0 && tds[idxPM] !== undefined){
      const raw = tds[idxPM].trim();
      pm = raw.toUpperCase()==="E" ? 0 : (parseInt(raw)||0);
    }
    rows.push({name, pid, jersey, pos, gp, g, a, pts:g+a, pm});
  }
  return rows;
}
// Same "top 3 in points" rule as the roster PDF (layout.py _top3_keys):
// points desc, goals desc, jersey asc.
function top3(rows){
  return rows.slice().sort((x,y)=> (y.pts-x.pts) || (y.g-x.g) || (x.jersey-y.jersey)).slice(0,3);
}
function statsURL(teamID, clientid, leagueid){
  return `${STATS_URL}?clientid=${clientid}&leagueid=${leagueid}&teamid=${teamID}&printPage=1&_=${Date.now()}`;
}

// ---- descriptor lines, sourced from the season data warehouse ------------
// (matchavez/nzihl-season-data). Goal: variety across the 6 selected players
// (3 per team) — no stat type repeats except "Point Streak", reserved for the
// longest (and, if it also qualifies, 2nd-longest) active streak in the pool.
// Every other player gets a distinct, real computed stat.
function monthDay(dateStr){
  // "2026-05-08" -> "May 8" — parsed manually (not via Date/toLocale) so an
  // on-air stat can never shift a day from local-timezone parsing of a bare
  // YYYY-MM-DD string.
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(dateStr||"");
  if(!m) return "";
  return `${MONTHS[parseInt(m[2],10)-1]} ${parseInt(m[3],10)}`;
}

function buildCandidates(p, games, teamTotalPts, rankFn, leagueShort, teamID, whGames){
  const cands = [];
  const bestGame = games.reduce((m,g)=>Math.max(m, g.goals+g.assists), 0);
  if(bestGame >= 3){
    // most recent occurrence of the season-high total — gives the freshest
    // "against <team> on <date>" callout if a player has hit it more than once.
    const bestEntry = games.slice().reverse().find(g => (g.goals+g.assists) === bestGame);
    let text = `${bestGame}-point game this year`; // fallback if opponent/date can't be resolved
    if(bestEntry && Array.isArray(whGames)){
      const gm = whGames.find(x => x.gameid === bestEntry.gameid);
      if(gm && gm.away && gm.home){
        const isAway = teamID != null && String(gm.away.teamID) === String(teamID);
        const isHome = teamID != null && String(gm.home.teamID) === String(teamID);
        const opp = isAway ? gm.home : isHome ? gm.away : null;
        const md = monthDay(bestEntry.date);
        if(opp && opp.name) text = `${bestGame}-point game against ${opp.name}` + (md ? ` on ${md}` : "");
      }
    }
    cands.push({type:"bestgame", text});
  }

  const last3n = Math.min(3, games.length);
  const last3 = games.slice(-3).reduce((s,g)=>s+g.goals+g.assists, 0);
  if(last3n >= 2 && last3 >= 3) cands.push({type:"last3", text:`${last3} points in the last ${last3n} games`});

  const multiPt = games.filter(g => (g.goals+g.assists) >= 2).length;
  if(multiPt >= 2) cands.push({type:"multipoint", text:`${multiPt} multi-point games this season`});

  if(rankFn){
    const myPts = games.reduce((s,g)=>s+g.goals+g.assists, 0);
    const r = rankFn(myPts);
    if(r) cands.push({type:"rank", text:`#${r} in the ${leagueShort} scoring race`});
  }

  if(games.length >= 4){
    const pointGames = games.filter(g => (g.goals+g.assists) > 0).length;
    cands.push({type:"pointrate", text:`Points in ${pointGames} of ${games.length} games this season`});
  }

  // Mat, 2026-07-19: a goal/assist in the prior game outranks the generic
  // "restate the numbers" fallbacks below (team share, points/game, season
  // total) — recency reads as a more interesting on-air fact than those do.
  // It still yields to the rarer/bigger callouts above (season-high game,
  // hot streak over the last 3, multi-point-game count, league rank).
  const lastGame = games.length ? games[games.length-1] : null;
  if(lastGame && (lastGame.goals + lastGame.assists) > 0){
    const lg = lastGame.goals, la = lastGame.assists;
    let statText;
    if(lg > 0 && la > 0) statText = `${lg} goal${lg===1?"":"s"} and ${la} assist${la===1?"":"s"}`;
    else if(lg > 0) statText = `${lg} goal${lg===1?"":"s"}`;
    else statText = `${la} assist${la===1?"":"s"}`;
    let text = `${statText} last game`;
    if(Array.isArray(whGames)){
      const gm = whGames.find(x => x.gameid === lastGame.gameid);
      if(gm && gm.away && gm.home){
        const isAway = teamID != null && String(gm.away.teamID) === String(teamID);
        const isHome = teamID != null && String(gm.home.teamID) === String(teamID);
        const opp = isAway ? gm.home : isHome ? gm.away : null;
        const md = monthDay(lastGame.date);
        if(opp && opp.name) text = `${statText} last game against ${opp.name}` + (md ? ` on ${md}` : "");
      }
    }
    cands.push({type:"lastgame", text});
  }

  // NOTE (Mat, 2026-07-09): dropped "X of Y points have come via goals" /
  // "N assists — a pass-first playmaker" — both just restate the G/A/Pts
  // numbers already sitting on line 2, not an actual "interesting stat."
  if(teamTotalPts > 0) cands.push({type:"teamshare", text:`${Math.round(p.pts/teamTotalPts*100)}% of the team's total scoring`});
  if(p.gp > 0) cands.push({type:"ppg", text:`${(p.pts/p.gp).toFixed(1)} points per game this season`});

  cands.push({type:"season", text:`${p.pts} point${p.pts===1?"":"s"} in ${p.gp} game${p.gp===1?"":"s"} this season`});
  return cands;
}

// Cross-night variety: remember which descriptor "type" each player last
// showed on a *different* gameid, so the same player doesn't get e.g.
// "rank" two broadcasts in a row just because the underlying numbers didn't
// move much. Scoped to localStorage (this is a long-lived OBS browser
// source, not a fresh tab each night) — guarded so a private-mode/CSP
// failure never blocks rendering.
const SL_HISTORY_KEY = "nzihl_scoringleaders_history_v1";
function loadDescriptorHistory(){
  try{ return JSON.parse(localStorage.getItem(SL_HISTORY_KEY) || "{}"); }
  catch(e){ return {}; }
}
function saveDescriptorHistory(hist){
  try{ localStorage.setItem(SL_HISTORY_KEY, JSON.stringify(hist)); }
  catch(e){ /* ignore — variety is best-effort, never worth breaking the render over */ }
}

function assignDescriptors(teams, wh, leagueShort, gameid){
  const logsByKey = (wh && wh.derived && wh.derived.player_game_logs) || {};
  const whGames = (wh && Array.isArray(wh.games)) ? wh.games : [];
  const pool = [];
  teams.forEach(team => {
    team.top.forEach(p => {
      const log = logsByKey[normName(p.name)];
      const games = (log && log.games) ? log.games.slice().sort((a,b)=>a.gameid-b.gameid) : [];
      pool.push({p, games, teamTotalPts: team.totalPts, teamID: team.teamID});
    });
  });

  pool.forEach(e => {
    let streak = 0;
    for(let i=e.games.length-1; i>=0; i--){
      if((e.games[i].goals + e.games[i].assists) > 0) streak++; else break;
    }
    e.streak = streak;
  });

  // reserve "Point Streak" for the longest, and (if it also qualifies) the
  // second-longest active streak across the whole 6-player pool.
  const streakWinners = new Set(
    pool.filter(e => e.streak >= 3).sort((a,b) => b.streak - a.streak).slice(0,2)
  );
  streakWinners.forEach(e => { e.p.descr = `Point streak: ${e.streak} straight games`; });

  let rankFn = null;
  const logKeys = Object.keys(logsByKey);
  if(logKeys.length){
    const totals = logKeys.map(k => (logsByKey[k].games||[]).reduce((s,g)=>s+g.goals+g.assists,0)).sort((a,b)=>b-a);
    rankFn = myPts => { const r = totals.findIndex(t => t <= myPts) + 1; return (r > 0 && r <= 10) ? r : null; };
  }

  const history = loadDescriptorHistory();
  const usedTypes = new Set();
  const others = pool.filter(e => !streakWinners.has(e));
  others.forEach(e => { e.cands = buildCandidates(e.p, e.games, e.teamTotalPts, rankFn, leagueShort, e.teamID, whGames); });
  // most-constrained-first so nobody gets boxed out of variety
  others.sort((a,b) => a.cands.length - b.cands.length);
  others.forEach(e => {
    // Only treat the stored type as "off limits" if it was set for a
    // different game — a same-game re-poll (every 5 min) should stay stable.
    const prevEntry = history[e.p.pid];
    const prevType = (prevEntry && gameid != null && String(prevEntry.gameid) !== String(gameid)) ? prevEntry.type : null;
    // 1) not shown by anyone else tonight, and not what this player showed last time
    let chosen = e.cands.find(c => !usedTypes.has(c.type) && c.type !== prevType);
    // 2) if avoiding the repeat leaves nothing, fall back to any type unused tonight
    if(!chosen) chosen = e.cands.find(c => !usedTypes.has(c.type));
    // 3) season total is always available as a last resort
    if(!chosen) chosen = e.cands[e.cands.length-1];
    usedTypes.add(chosen.type);
    e.p.descr = chosen.text;
    e.chosenType = chosen.type;
  });

  if(gameid != null){
    const nextHistory = Object.assign({}, history);
    pool.forEach(e => {
      const type = streakWinners.has(e) ? "streak" : e.chosenType;
      if(type) nextHistory[e.p.pid] = {gameid, type};
    });
    saveDescriptorHistory(nextHistory);
  }
}

// ---- render -----------------------------------------------------------
function washVectors(a,h){
  document.getElementById("wash").style.background =
    `linear-gradient(90deg, ${a.dark} 0%, ${a.dark} 4%, transparent 40%),` +
    `linear-gradient(270deg, ${h.dark} 0%, ${h.dark} 4%, transparent 40%)`;
}
function setLogo(el,img){ if(img){ el.src = img.src; el.style.visibility=""; } else el.style.visibility="hidden"; }

// Preload-and-gate: resolves once `src` has actually loaded (or errors, or a timeout
// elapses) — mirrors activity-banner's loadImage(), so this graphic can hold its
// render until every asset is actually there instead of popping images in afterward.
function loadImage(src, timeoutMs){
  return new Promise(res=>{
    if(!src){ res(null); return; }
    let done=false; const img=new Image();
    const finish=ok=>{ if(done) return; done=true; res(ok?img:null); };
    img.onload=()=>finish(true); img.onerror=()=>finish(false);
    img.src=src;
    setTimeout(()=>finish(false), timeoutMs||1500);
  });
}
const LOGO_TIMEOUT_MS = 1500;

// Player photo warehouse (nzihl-player-photos) — tried FIRST, before the naive
// esportsdesk guess/fallback below. Headshots don't change mid-game and the
// warehouse's Pages/CDN is faster/more reliable than esportsdesk.
// 2026-07-12 estate-wide photo-warehouse migration.
const PHOTO_MANIFEST_URL = "https://raw.githubusercontent.com/matchavez/nzihl-player-photos/main/manifest.json";
const PHOTO_BASE = "https://raw.githubusercontent.com/matchavez/nzihl-player-photos/main/";
const CODE_LEAGUE = {ADM:"nzihl",BSW:"nzihl",CRD:"nzihl",DUN:"nzihl",MKO:"nzihl",SCS:"nzihl",
                      AST:"nzwihl",CIN:"nzwihl",DTW:"nzwihl",WLD:"nzwihl"};
const TEAMID_CODE = Object.fromEntries(Object.entries(REG).map(([id,v])=>[id,v.code]));
let _photoManifestCache=null, _photoManifestT=0;
async function getPhotoManifest(){
  if(_photoManifestCache && Date.now()-_photoManifestT<5*60*1000) return _photoManifestCache;
  try{ const data=await getJSON(PHOTO_MANIFEST_URL); _photoManifestCache=data; _photoManifestT=Date.now(); return data; }
  catch(e){ return _photoManifestCache; }
}
async function warehousePhotoFor(teamID, no){
  if(!teamID || !no) return null;
  const code = TEAMID_CODE[teamID]; if(!code) return null;
  const league = CODE_LEAGUE[code] || "nzihl";
  const manifest = await getPhotoManifest(); if(!manifest) return null;
  const teamPeople = (manifest.leagues && manifest.leagues[league] &&
                       manifest.leagues[league].teams[code] &&
                       manifest.leagues[league].teams[code].people) || {};
  const person = Object.values(teamPeople).find(p=>p.role==="player" && String(p.number)===String(no));
  return (person && person.photo) ? PHOTO_BASE+person.photo : null;
}
// Cache of resolved fallback photo URLs per playerID — url string on success,
// false when we've confirmed there's genuinely no photo. Avoids re-hitting
// nzihl.com every 5-minute tick for the same player.
const PHOTO_FALLBACK_CACHE = {};
async function resolvePhotoFallback(pid, teamID, cid, lid){
  if(!pid) return null;
  if(pid in PHOTO_FALLBACK_CACHE) return PHOTO_FALLBACK_CACHE[pid];
  let result = null;
  try{
    // NZIHL and NZWIHL are separate site instances on the esportsdesk platform —
    // hitting the wrong one 302s to a generic clear.cfm page instead of the real
    // profile (caught live 2026-07-11: every NZWIHL fallback lookup was silently
    // failing this way, even though the players genuinely have photos uploaded —
    // e.g. Canterbury Inferno's Cameron Tobin/Bridie Gibbings/Gabrielle Guerin all
    // resolve fine once pointed at the right host). leagueid 35501 = NZWIHL.
    const host = String(lid)==="35501" ? "www.nzwihl.com" : "www.nzihl.com";
    const url = `https://${host}/leagues/rosters_profile.cfm?clientID=${cid}&leagueID=${lid}&teamID=${teamID}&playerID=${pid}&printPage=0`;
    const html = await getText(url);
    const m = html.match(/largeHeadshot[^"]*"[^>]*background-image\s*:\s*url\(([^)]+)\)/i);
    if(m){
      let path = m[1].trim().replace(/^["']|["']$/g,"");
      result = path.startsWith("http") ? path : "https://admin.esportsdesk.com" + path;
    }
  } catch(e){ /* leave result null — treated as "no photo found" */ }
  PHOTO_FALLBACK_CACHE[pid] = result;
  return result;
}

// Overall budget for resolving one player's photo, guess + fallback combined — same
// two-stage approach as activity-banner's resolvePlayerPhoto(), just with a more
// generous cap since this graphic isn't gated by a live-reveal deadline (Mat,
// 2026-07-11: preload everything before the graphic is shown/rebuilt, same idea as
// the Activity Banner, so nothing ever pops in over the broadcast).
const PHOTO_GUESS_TIMEOUT_MS = 1200;
const PHOTO_TOTAL_TIMEOUT_MS = 4000;
function resolvePlayerPhoto(who, pid, teamID, cid, lid, no){
  return new Promise(res=>{
    let done=false;
    const finish=img=>{ if(done) return; done=true; res(img); };
    const overall=setTimeout(()=>finish(null), PHOTO_TOTAL_TIMEOUT_MS);
    function liveFallbackChain(){
      loadImage(shotURL(who), PHOTO_GUESS_TIMEOUT_MS).then(img=>{
        if(done) return;
        if(img){ clearTimeout(overall); finish(img); return; }
        if(!pid){ clearTimeout(overall); finish(null); return; }
        resolvePhotoFallback(pid, teamID, cid, lid).then(url=>{
          if(done) return;
          if(!url){ clearTimeout(overall); finish(null); return; }
          loadImage(url, 1500).then(img2=>{ clearTimeout(overall); finish(img2); });
        });
      });
    }
    warehousePhotoFor(teamID, no).then(whUrl=>{
      if(done) return;
      if(!whUrl){ liveFallbackChain(); return; }
      loadImage(whUrl, 1500).then(img=>{
        if(done) return;
        if(img){ clearTimeout(overall); finish(img); return; }
        liveFallbackChain();
      });
    });
  });
}

// Preloads BOTH team logos and all 6 players' photos, in parallel, before tick()
// paints anything. Photo results are stashed on the player objects (_photoImg);
// logos are returned. render()/rowEl()/photoEl() below stay purely synchronous —
// nothing async happens after the graphic is already on screen, so a photo can
// never pop in over an initials placeholder mid-broadcast.
async function preloadAssets(awayTop, homeTop, awayID, homeID, cid, lid){
  const av = vis(awayID), hv = vis(homeID);
  const logoASrc = av.logo ? LOGO+encodeURIComponent(av.logo) : null;
  const logoBSrc = hv.logo ? LOGO+encodeURIComponent(hv.logo) : null;
  const [logoAImg, logoBImg] = await Promise.all([
    loadImage(logoASrc, LOGO_TIMEOUT_MS), loadImage(logoBSrc, LOGO_TIMEOUT_MS)
  ]);
  await Promise.all([
    ...awayTop.map(p => resolvePlayerPhoto(p.name, p.pid, awayID, cid, lid, p.jersey).then(img => { p._photoImg = img; })),
    ...homeTop.map(p => resolvePlayerPhoto(p.name, p.pid, homeID, cid, lid, p.jersey).then(img => { p._photoImg = img; })),
  ]);
  return {logoAImg, logoBImg};
}

// hideAll (set by render() when NONE of the 6 players on screen resolved a real photo,
// e.g. current Wakatipu Wild games) skips the photo slot entirely — no circle, no
// initials — rather than rendering six identical, unhelpful initials placeholders.
// When at least one of the 6 has a real photo, individual misses still fall back to
// initials as before (Mat, 2026-07-11 — narrow fix, NZWIHL fallback/team-crest
// detection deliberately left for later).
function photoEl(p, ink, size, hideAll){
  if(hideAll) return null;
  const el = document.createElement("div");
  el.className = "photo";
  el.style.width = size+"px"; el.style.height = size+"px";
  el.style.boxShadow = `0 0 0 3px ${ink}, 0 6px 18px rgba(0,0,0,.4)`;
  if(p._photoImg){
    // Already loaded (or cached) by preloadAssets() — paints immediately, no onload/pop-in.
    const img = document.createElement("img");
    img.src = p._photoImg.src;
    el.appendChild(img);
  } else {
    const iniSpan = document.createElement("span");
    iniSpan.className = "ini"; iniSpan.style.fontSize = (size*0.34)+"px";
    iniSpan.textContent = ini(p.name);
    el.appendChild(iniSpan);
  }
  return el;
}

function rowEl(p, team, side, hideAllPhotos){
  const ink = team.ink;
  const row = document.createElement("div");
  row.className = "prow " + side;
  const accent = document.createElement("div");
  accent.className = "accent"; accent.style.background = ink;
  row.appendChild(accent);

  const photoSize = 174; // near-fills the ~190px-tall row ("pill"), ~8px clearance top/bottom (Mat, 2026-07-11 — bigger, more visible photo)
  const photoNode = photoEl(p, ink, photoSize, hideAllPhotos);
  if(photoNode) row.appendChild(photoNode);

  const ptext = document.createElement("div");
  ptext.className = "ptext";

  // Line 1: jersey (no "#") · position — both in the team colour, same size · full name
  const line1 = document.createElement("div");
  line1.className = "pline";
  line1.innerHTML = `<span class="jnum" style="color:${ink}">${p.jersey}</span> <span style="color:${ink}">${p.pos||""}</span> ${p.name}`;

  // Line 2: "20 G  11 A  31 Pts  +13" — unit letters lighter/smaller, +/- value lighter too
  const line2 = document.createElement("div");
  line2.className = "pline";
  line2.innerHTML = `${p.g} <span class="unit">G</span>\u00A0\u00A0${p.a} <span class="unit">A</span>\u00A0\u00A0${p.pts} <span class="unit">Pts</span>\u00A0\u00A0<span class="pm">${fmtPM(p.pm)}</span>`;

  // Line 3: italic descriptor, no dots, smaller than lines 1/2
  const line3 = document.createElement("div");
  line3.className = "pline descr";
  line3.textContent = p.descr || "";

  ptext.appendChild(line1); ptext.appendChild(line2); ptext.appendChild(line3);
  row.appendChild(ptext);
  return row;
}

function render(P){
  const A = {ink:vis(P.away.id).ink, dark:vis(P.away.id).dark};
  const H = {ink:vis(P.home.id).ink, dark:vis(P.home.id).dark};
  washVectors(A,H);
  setLogo(document.getElementById("logoA"), P.logoAImg);
  setLogo(document.getElementById("logoB"), P.logoBImg);
  document.getElementById("kicker").textContent = P.leagueShort + "  ·  SCORING LEADERS";
  document.getElementById("sub").textContent = ""; // league/venue line cleared per Mat — may hold future content

  // Only omit photo slots when NONE of the 6 displayed players have a real photo —
  // a mixed team (some real photos, some misses) still shows initials for the misses.
  const hideAllPhotos = P.away.top.every(p => !p._photoImg) && P.home.top.every(p => !p._photoImg);

  const colA = document.getElementById("colA"); colA.innerHTML = "";
  const colB = document.getElementById("colB"); colB.innerHTML = "";
  P.away.top.forEach(p => colA.appendChild(rowEl(p, A, "left", hideAllPhotos)));
  P.home.top.forEach(p => colB.appendChild(rowEl(p, H, "right", hideAllPhotos)));
  fitPlayerText();
}

// No text gets truncated, ever — shrink each line's own font-size until its
// true content width (scrollWidth, unaffected by nowrap-overflow) fits the
// row's actual available width (the .ptext container's clientWidth, which is
// correctly bounded by the flex layout regardless of which side's align-items
// is stretch vs flex-end). Runs synchronously right after the rows are built,
// so there's no visible flash of oversized text before the shrink applies.
function fitPlayerText(){
  document.querySelectorAll(".ptext .pline").forEach(el => {
    const avail = el.parentElement.clientWidth;
    if(!avail) return;
    let size = parseFloat(getComputedStyle(el).fontSize);
    let guard = 0;
    while(el.scrollWidth > avail && size > 10 && guard < 60){
      size -= 1;
      el.style.fontSize = size + "px";
      guard++;
    }
  });
}

function fitWindow(){
  document.getElementById("stage").style.transform =
    "scale(" + Math.min(innerWidth/1840, innerHeight/1000) + ")";
}
addEventListener("resize", fitWindow);
function showMsg(t){ const m=document.getElementById("msg"); m.style.display="flex"; m.textContent=t; }
function hideMsg(){ document.getElementById("msg").style.display="none"; }

// ---- data flow ----------------------------------------------------------
async function getJSON(u){ const r = await fetch(u,{cache:"no-store"}); if(!r.ok) throw 0; return r.json(); }
async function getText(u){ const r = await fetch(SHIM(u),{cache:"no-store"}); if(!r.ok) throw 0; return r.text(); }

// Per-team fallback when a team is idle/absent from the current manifest
// window (mirrors summary.html's LAST_GAME, extended with the opponent's
// name since this page doesn't fetch a box score to discover it otherwise).
// UPDATE ONLY WHEN THE ROSTER/ROUND CHANGES — keep in sync with summary.html's
// own LAST_GAME table where possible.
const LAST_GAME = {
  "botany-swarm":          {gid:2519938, league:"nzihl",  away:"Botany Swarm",           home:"Pure NZ Admirals"},
  "canterbury-red-devils": {gid:2519940, league:"nzihl",  away:"Dunedin Thunder",         home:"Canterbury Red Devils"},
  "dunedin-thunder":       {gid:2519940, league:"nzihl",  away:"Dunedin Thunder",         home:"Canterbury Red Devils"},
  "pure-nz-admirals":      {gid:2519938, league:"nzihl",  away:"Botany Swarm",           home:"Pure NZ Admirals"},
  "skycity-stampede":      {gid:2519934, league:"nzihl",  away:"Dunedin Thunder",         home:"SkyCity Stampede"},
  "auckland-steel":        {gid:2520016, league:"nzwihl", away:"Auckland Steel",         home:"Canterbury Inferno"},
  "canterbury-inferno":    {gid:2520016, league:"nzwihl", away:"Auckland Steel",         home:"Canterbury Inferno"},
  "dunedin-thunder-women": {gid:2520018, league:"nzwihl", away:"Dunedin Thunder Women",  home:"Wakatipu Wild"},
  "wakatipu-wild":         {gid:2520018, league:"nzwihl", away:"Dunedin Thunder Women",  home:"Wakatipu Wild"},
};

async function resolve(){
  const q = new URLSearchParams(location.search);
  const team = q.get("team");
  const gParam = q.get("g") || q.get("gameid");

  const all = [];
  for(const m of MANIFESTS){
    let data; try{ data = await getJSON(m.url + "?_=" + Date.now()); } catch(e){ continue; }
    (data.games||[]).forEach(gm => all.push({m, gm}));
  }

  if(gParam){
    const hit = all.find(x => String(x.gm.gameid)===String(gParam));
    if(hit) return hit;
    showMsg("Game " + gParam + " isn’t in the current manifest window.");
    return null;
  }

  const slugTeam = slug(team || "canterbury-red-devils");
  const cands = all.filter(x => slug(x.gm.away)===slugTeam || slug(x.gm.home)===slugTeam)
                    .map(x => ({...x, dt: new Date(x.gm.datetime || x.gm.date).getTime() || 0}));
  if(!cands.length){
    const lg = LAST_GAME[slugTeam];
    if(lg){
      const m = MANIFESTS.find(x=>x.league===lg.league) || MANIFESTS[0];
      return {m, gm:{away:lg.away, home:lg.home, gameid:lg.gid, venue:"", date:""}};
    }
    showMsg("No game found for “" + slugTeam + "”. Check the team slug.");
    return null;
  }
  const now = Date.now();
  const started = cands.filter(c=>c.dt<=now).sort((a,b)=>b.dt-a.dt);
  const upcoming = cands.filter(c=>c.dt>now).sort((a,b)=>a.dt-b.dt);
  return started[0] || upcoming[0];
}

let TARGET=null, renderedOnce=false, WH_CACHE={ts:0,data:null,league:null};
async function fetchWarehouse(league){
  const now = Date.now();
  if(WH_CACHE.data && WH_CACHE.league===league && now-WH_CACHE.ts < 10*60*1000) return WH_CACHE.data;
  const data = await getJSON(WAREHOUSE[league] + "?_=" + now);
  WH_CACHE = {ts:now, data, league};
  return data;
}

async function tick(){
  if(!TARGET) return;
  const dot = document.querySelector(".livedot"); const t0 = Date.now();
  if(dot) dot.classList.add("scraping");
  if(!renderedOnce) showMsg("Loading season leaders…");
  try{
    const gm = TARGET.gm, league = TARGET.m.league;
    const awayID = NAME_TO_ID[gm.away], homeID = NAME_TO_ID[gm.home];
    if(!awayID || !homeID) throw new Error("Unrecognised team name: " + gm.away + " / " + gm.home);
    const cid = TARGET.m.clientid, lid = TARGET.m.leagueid;
    const [awayHtml, homeHtml] = await Promise.all([
      getText(statsURL(awayID, cid, lid)),
      getText(statsURL(homeID, cid, lid)),
    ]);
    const awayRows = parseSkaterTable(awayHtml), homeRows = parseSkaterTable(homeHtml);
    const awayTop = top3(awayRows), homeTop = top3(homeRows);
    // Preload every asset (both logos + all 6 photos) before touching the DOM — same
    // principle as activity-banner's gated reveal. On a refresh tick this means the
    // OLD (already-complete) render just keeps showing on screen for the extra second
    // or two this takes; it never gets torn down until the new one is fully ready, so
    // nothing ever flashes to initials/blank over the broadcast.
    const [wh, assets] = await Promise.all([
      fetchWarehouse(league).catch(()=>null),
      preloadAssets(awayTop, homeTop, awayID, homeID, cid, lid),
    ]);
    const leagueShort = league==="nzwihl" ? "NZWIHL" : "NZIHL";
    assignDescriptors(
      [{top:awayTop, totalPts:awayRows.reduce((s,r)=>s+r.pts,0), teamID:awayID},
       {top:homeTop, totalPts:homeRows.reduce((s,r)=>s+r.pts,0), teamID:homeID}],
      wh, leagueShort, gm.gameid
    );
    hideMsg();
    render({
      away: {id:awayID, top:awayTop},
      home: {id:homeID, top:homeTop},
      venue: gm.venue || vis(homeID).venue || "",
      leagueShort,
      leagueName: league==="nzwihl" ? "New Zealand Women's Ice Hockey League" : "New Zealand Ice Hockey League",
      logoAImg: assets.logoAImg,
      logoBImg: assets.logoBImg,
    });
    renderedOnce = true; fitWindow();
    document.getElementById("stage").classList.add("ready"); // reveal only once real content is on screen
  } catch(e){
    if(!renderedOnce) showMsg("Couldn’t load season stats — retrying…");
    console.error(e);
  } finally {
    if(dot){ const wait = Math.max(0, 900-(Date.now()-t0)); setTimeout(()=>dot.classList.remove("scraping"), wait); }
  }
}

async function start(){
  await loadNameOverrides();
  fitWindow();
  TARGET = await resolve();
  if(!TARGET) return;
  await tick();
  const t0 = Date.now();
  // Season stats move at most a few times a day — poll every 5 minutes
  // (not Game Summary's 15s), auto-stop after ~3h15m like the other pages.
  const iv = setInterval(() => { if(Date.now()-t0 > 3.25*3600*1000){ clearInterval(iv); return; } tick(); }, 5*60*1000);
}
start();
</script>
